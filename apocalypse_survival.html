  if((S._campLevel||1)<CAMP_LEVELS.length)h+=`<div class="treatment-row" style="margin-top:4px;"><button class="treatment-btn" onclick="closeModal();showExpandInfo();">🏗️ 扩建营地</button></div>`;

  h+=`<div class="btn-row"><button class="btn small" onclick="closeModal()">关闭</button></div>`;
  modal.innerHTML=h;ov.classList.add('active');
}

let _selectedBuild=null,_selectedTrap=null;
function selectBuild(id){_selectedBuild=id;_selectedTrap=null;setStatus('点击营地空格放置建筑');closeModal();showCampView();}
function selectTrap(id){_selectedTrap=id;_selectedBuild=null;setStatus('点击营地空格布置陷阱');closeModal();showCampView();}

function buildOnCell(x,y){
  if(!atCamp()){setStatus('你不在营地，无法建造！');return;}
  const cell=S.campGrid[y][x];if(!cell||cell.type!=='empty'){setStatus('此处无法建造');return;}
  if(_selectedBuild){
    const b=BUILDINGS.find(b=>b.id===_selectedBuild);if(!b)return;
    if(b.requireIdentity&&S.identity&&S.identity.id!==b.requireIdentity){setStatus('只有工程师才能建造实验室！');return;}
    const discount=S.identity&&S.identity.bonus&&S.identity.bonus.buildCost?S.identity.bonus.buildCost:1;
    const adjCost={};for(const [n,q]of Object.entries(b.cost))adjCost[n]=Math.max(1,Math.floor(q*discount));
    if(!Object.entries(adjCost).every(([n,q])=>hasItem(n,q))){setStatus('材料不足');return;}
    for(const [n,q]of Object.entries(adjCost))removeItem(n,q);
    cell.type='building';cell.id=b.id;S._campDefMod=(S._campDefMod||0)+b.def;
    addStory(`🔨 建造了<strong>${b.icon} ${b.name}</strong>（+${b.def}防御）`,'camp');modRep(3,'营地建设');
    _selectedBuild=null;updateUI();showCampView();
  }else if(_selectedTrap){
    const t=TRAPS.find(t=>t.id===_selectedTrap);if(!t)return;
    if(!Object.entries(t.cost).every(([n,q])=>hasItem(n,q))){setStatus('材料不足');return;}
    for(const [n,q]of Object.entries(t.cost))removeItem(n,q);
    cell.type='trap';cell.id=t.id;cell.charges=1;
    addStory(`🪤 布置了<strong>${t.icon} ${t.name}</strong>`,'camp');
    _selectedTrap=null;updateUI();showCampView();
  }
}

function calcTotalDefense(){
  let def=S.camp.defense+(S._campDefMod||0);
  for(let y=0;y<5;y++)for(let x=0;x<5;x++){const c=S.campGrid[y][x];if(c.type==='building'){const b=BUILDINGS.find(b=>b.id===c.id);if(b)def+=b.def;}}
  return def;
}
function countTraps(){let n=0;for(let y=0;y<5;y++)for(let x=0;x<5;x++)if(S.campGrid[y][x].type==='trap')n++;return n;}
function countBuildings(){let n=0;for(let y=0;y<5;y++)for(let x=0;x<5;x++)if(S.campGrid[y][x].type==='building')n++;return n;}

// ===== ENEMY ATTACK (OVERHAULED) =====
function enemyAttackPlayer(){
  if(S.enemyCamps.length===0)return;
  // If incoming attack already exists, check arrival
  if(S._incomingAttack){
    S._incomingAttack.arriveHour--;
    if(S._incomingAttack.arriveHour<=0){executeBattle(S._incomingAttack);S._incomingAttack=null;return;}
    return; // Don't spawn new attacks while one is incoming
  }
  // Can only detect attack if someone is at camp (player or teammate)
  const someoneAtCamp=atCamp()||S.party.some(p=>p.alive&&p.activity==='guard');
  if(!someoneAtCamp)return; // attack still happens but you won't know!
  if(Math.random()>0.08*repAttackMod())return; // 8% base, modified by reputation
  const ec=pick(S.enemyCamps.filter(c=>c.alive!==false));if(!ec)return;
  const dirs=['N','S','E','W','NE','NW','SE','SW'];const dir=pick(dirs);
  const hours=rand(4,12);
  S._incomingAttack={enemyCamp:ec,arriveHour:hours,dir,alerted:false};
  addStory(`⚔️ <strong>侦察预警！${ec.name}来袭！</strong>预计<strong style="color:var(--danger)">${hours}小时</strong>后从<strong style="color:var(--danger)">${dir}方</strong>抵达营地！`,'danger');
  setChoices(['紧急返回营地防守','派队友回防自己在外面','不理会继续当前行动']);
  S._currentEvent={ev:{id:'attack_warning'},choices:[
    {text:'紧急返回营地防守',ch:{dist:-S.distance,outcome:'你全速赶回营地，准备迎战。'}},
    {text:'派队友回防自己在外面',ch:{outcome:'你让队友回去防守，自己留在外面。希望他们能守住。'}},
    {text:'不理会继续当前行动',ch:{outcome:'你选择相信营地的防御。如果营地失守，后果自负。'}},
  ]};
}

function executeBattle(attack){
  const{enemyCamp:ec,dir}=attack;let enemyPower=ec.size*2+ec.defense*0.5;
  const playerPresent=atCamp();addStory(`⚔️ <strong>${ec.name}抵达！战斗开始！</strong>${playerPresent?'你亲自指挥防御。':'你不在营地，队友独自应战！'}`,'danger');
  // Battle rounds
  let battleLog='';let myLosses=0,enemyLosses=0;
  for(let round=1;round<=rand(3,6);round++){
    // Traps trigger first round
    if(round===1){
      const trapCells=getTrapCellsInDir(dir);let trapDmg=0;
      for(const tc of trapCells){const cell=S.campGrid[tc.y][tc.x];if(cell.type!=='trap')continue;const t=TRAPS.find(t=>t.id===cell.id);if(!t)continue;if(t.alert)attack.alerted=true;trapDmg+=t.dmg||0;cell.type='ruin';cell.id=null;battleLog+=`💥 ${t.icon}${t.name}触发！(-${t.dmg}) `;}
      enemyPower=Math.max(0,enemyPower-trapDmg*3);if(trapDmg>0)battleLog+=`陷阱造成${trapDmg}伤害！\n`;
    }
    // Combat exchange
    const myPwr=calcTotalDefense()/10+(playerPresent?3:1)+S.party.filter(p=>p.alive).length*(playerPresent?2:1);
    const enPwr=enemyPower/5;const myRoll=rand(0,Math.floor(myPwr));const enRoll=rand(0,Math.floor(enPwr));
    if(myRoll>enRoll){enemyLosses+=rand(1,4);enemyPower-=rand(3,10);battleLog+=`🔫 第${round}轮：你方占优！敌方-${enemyLosses}人。\n`;}
    else{myLosses+=rand(0,2);battleLog+=`💢 第${round}轮：敌方猛攻！我方损伤。\n`;}
    // Teammate casualties
    if(Math.random()<0.25){const n=S.party.find(p=>p.alive&&Math.random()<0.5);if(n){partyInjure(n.id,rand(10,35));battleLog+=`🤕 ${n.name}在战斗中受伤！\n`;}}
    if(Math.random()<0.08){const n=S.party.find(p=>p.alive);if(n){n.alive=false;n.health=0;battleLog+=`💀 <strong>${n.name}战死了！</strong>\n`;}}
    // Player injury risk (body part specific)
    if(playerPresent&&Math.random()<0.2){const pid=pick(BODY_PARTS);const sev=rand(1,3);const injuries={head:['头部被弹片擦伤','一颗子弹擦过太阳穴','碎石击中了额头'],chest:['胸口被子弹击中——防弹衣救了你一命','弹片嵌入了肋骨','被冲击波震伤了内脏'],leftArm:['左臂被流弹击中，鲜血顺着袖子流下','左肩被碎片划开一道深口','左前臂中弹'],rightArm:['右臂被弹片击中','右手被流弹贯穿','右肩遭到重击'],leftLeg:['左腿中弹，钻心的疼痛','左膝被碎片击中','左大腿被划开'],rightLeg:['右腿被弹片击中，跌倒在地','右脚踝遭到重击','右小腿中弹']};const desc=pick(injuries[pid]||[`${PL[pid]}受伤`]);const sevDesc=sev===3?'严重':sev===2?'中度':'轻微';addWound(pid,sev,desc,sev>=2);S.blood=clamp(S.blood-sev*8,0,100);battleLog+=`🩸 <strong>${PL[pid]}受伤！</strong>${desc}（${sevDesc}伤，-${sev*8}生命）\n`;if(S.blood<=0){battleLog+=`💀 <strong>你倒在了战场上...</strong>\n`;die();return;}}
    if(enemyPower<=0){battleLog+='🎉 敌军溃散！\n';break;}
  }
  addStory(battleLog.replace(/\n/g,'<br>'),'medical');
  // Result
  const victory=enemyPower<=0||myLosses<enemyLosses*2;
  if(victory){
    addStory(`🛡️ <strong>防守成功！</strong>${ec.name}损失惨重撤退了。我方损失${myLosses}人。`,'camp');modRep(8,'成功防御营地');
    const totalLoot=ec.supplies;ec.supplies=0;const lootCount=rand(3,8);
    for(let i=0;i<lootCount;i++){const n=pick(['弹药','罐头','金属片','武器零件','医疗包','净水']);addItem(n,rand(1,4));}
    addStory(`🎁 缴获战利品！从敌方营地缴获了大量物资（原库存${totalLoot}）。`,'action');
    S.enemyCamps=S.enemyCamps.filter(x=>x.id!==ec.id);
  }else{
    addStory(`💔 <strong>营地失守！</strong>${ec.name}占领了营地。`,playerPresent?'danger':'danger');modRep(-12,'营地失守');
    S.camp.condition=clamp(S.camp.condition-rand(30,50),0,100);
    // Destroy buildings
    for(let y=0;y<S.campGrid.length;y++)for(let x=0;x<S.campGrid.length;x++){const c=S.campGrid[y][x];if(c.type==='building'&&Math.random()<0.5){c.type='ruin';c.id=null;}}
    // Lose camp supplies
    const campKeys=Object.keys(S.camp.supplies);const lostCount=Math.min(campKeys.length,rand(3,8));
    for(let i=0;i<lostCount;i++){const k=campKeys[rand(0,campKeys.length-1)];if(S.camp.supplies[k]){const q=Math.min(rand(1,5),S.camp.supplies[k].qty);removeItem(k,q,true);addStory(`📤 损失营地物资：${k}×${q}`,'danger');}}
    // Teammates captured
    if(!playerPresent&&S.party.filter(p=>p.alive).length>0){
      const captured=S.party.filter(p=>p.alive);addStory(`🔗 ${captured.map(p=>p.name).join('、')}被敌人俘虏！`,'danger');
      if(Math.random()<0.5){addStory('几天后，被俘的队友趁机逃回了营地。','party');}else{addStory('你试图交涉赎回队友...但废土上没有仁慈。','danger');S.party=S.party.filter(p=>!p.alive||Math.random()<0.3);}
    }
    const fpid=pick(BODY_PARTS);addWound(fpid,rand(1,3),`营地攻防战中${PL[fpid]}受伤`,true);S.blood=clamp(S.blood-rand(10,25),0,100);
  }
  updateUI();checkDeath();
}

function getTrapCellsInDir(dir){
  const cells=[];const gs=S.campGrid?S.campGrid.length:5;const m=gs-1;
  // Dynamic perimeter based on grid size
  const checks={};
  checks.N=[];for(let i=0;i<gs;i++)checks.N.push([i,0]);
  checks.S=[];for(let i=0;i<gs;i++)checks.S.push([i,m]);
  checks.E=[];for(let i=0;i<gs;i++)checks.E.push([m,i]);
  checks.W=[];for(let i=0;i<gs;i++)checks.W.push([0,i]);
  checks.NE=[[m,0],[m-1,0],[m,1]];checks.NW=[[0,0],[1,0],[0,1]];
  checks.SE=[[m,m-1],[m,m],[m-1,m]];checks.SW=[[0,m-1],[0,m],[1,m]];
  const positions=checks[dir]||[];
  for(const [x,y]of positions){if(S.campGrid&&S.campGrid[y]&&S.campGrid[y][x]&&S.campGrid[y][x].type==='trap')cells.push({x,y});}
  return cells;
}

S._equipDura={};
function useDurability(name){
  const info=ITEMS[name];if(!info||!info.dura)return;
  if(!S._equipDura[name])S._equipDura[name]=info.dura;
  S._equipDura[name]--;
  if(S._equipDura[name]<=0){removeItem(name,1);delete S._equipDura[name];addStory(`💔 <strong>${name}</strong>彻底损坏了！`,'danger');return true;}
  return false;
}
function repairAtBench(name){
  if(!hasItem(name,1)){setStatus('你没有'+name);return;}
  const info=ITEMS[name];if(!info||!info.dura)return;
  const cost=Math.ceil((info.dura-(S._equipDura[name]||0))/10)||1;
  if(!hasItem('金属片',cost)&&!hasItem('胶带',cost)){setStatus('需要金属片或胶带×'+cost);return;}
  const m=hasItem('金属片',cost)?'金属片':'胶带';removeItem(m,cost);
  S._equipDura[name]=info.dura;addStory(`🔧 修复了<strong>${name}</strong>（消耗${m}×${cost}）`,'action');updateUI();
}

function doBroadcast(band){

    else{msg='⚠️ 广播被掠夺者截获！一队武装人员正在接近...';if(!S._incomingAttack&&S.enemyCamps.length>0){const ec=pick(S.enemyCamps.filter(c=>c.alive!==false));if(ec)S._incomingAttack={enemyCamp:ec,arriveHour:rand(2,5),dir:pick(['N','S','E','W']),alerted:false};}}
  }else if(band==='military'){
    if(Math.random()<0.5){msg='🔐 收到军方加密回复——附近有一个未被标记的物资空投点。';addItem('军用口粮',rand(2,4));addItem('弹药',rand(1,3));}
    else{msg='🔐 军用频段只有静电噪音。军方要么撤离了，要么沉默了。';}
  }else if(band==='raider'){

    else{msg='💀 广播发出，无人回应——附近没有敌对营地。';}

}

// ===== EVENT ENGINE =====
function selectEvent(){
  const ctx={minDist:S.distance,maxDist:S.distance,night:isNight(),day:isDaytime(),seasons:[S.season?.id],weather:[S.weather.precipType],atCamp:atCamp(),injured:S.blood<50||BODY_PARTS.some(p=>getPartStatus(p)!=='healthy'),hasParty:S.party.filter(p=>p.alive).length>0,pain:S.pain>30,tired:S.fatigue>55,hungry:S.nutrition<30,thirsty:S.hydration<30};
  let candidates=EVENTS.filter(ev=>{
    const c=ev.ctx;if(c.atCamp!==undefined&&c.atCamp!==ctx.atCamp)return false;if(c.night&&!ctx.night)return false;if(c.day&&!ctx.day)return false;
    if(c.seasons&&!c.seasons.some(s=>ctx.seasons.includes(s)))return false;if(c.weather&&!c.weather.some(w=>ctx.weather.includes(w)))return false;
    if(c.injured&&!ctx.injured)return false;if(c.hasParty&&!ctx.hasParty)return false;if(c.pain&&ctx.pain<c.pain)return false;
    if(c.tired&&!ctx.tired)return false;if(c.hungry&&!ctx.hungry)return false;if(c.thirsty&&!ctx.thirsty)return false;
    if(c.minDist!==undefined&&ctx.maxDist<c.minDist)return false;if(c.maxDist!==undefined&&ctx.minDist>c.maxDist)return false;
    return true;
  });
  // Filter out recently used events (keep memory of last 12)
  let fresh=candidates.filter(ev=>!S.recentEvents.includes(ev.id));
  if(fresh.length>0)candidates=fresh;
  // Prefer categories not recently used
  let diffCat=candidates.filter(ev=>!S.recentCats.includes(ev.cat));
  if(diffCat.length>0)candidates=diffCat;
  if(candidates.length===0){candidates=EVENTS.filter(ev=>!S.recentEvents.includes(ev.id));}
  if(candidates.length===0){candidates=EVENTS;}
  if(candidates.length===0)return EVENTS[0];
  const ev=pick(candidates);
  S.recentEvents.push(ev.id);if(S.recentEvents.length>12)S.recentEvents.shift();
  S.recentCats.push(ev.cat);if(S.recentCats.length>4)S.recentCats.shift();
  return ev;
}

function processEvent(ev){
  addStory(ev.narr,'ai');
  const choices=ev.choices.map((ch,i)=>{
    let disabled='';if(ch.need&&!hasItem(ch.need,1))disabled='disabled';
    return{text:ch.text,disabled:!!(ch.need&&!hasItem(ch.need,1)),idx:i,ch:ch};
  });
  // Always add "return to camp" option (hidden when already at camp)
  if(!atCamp())choices.push({text:'🏕️ 返回营地',disabled:false,idx:choices.length,ch:{outcome:'你决定先回营地再说。',dist:-S.distance,eff:{fatigue:S.distance*2}}});
  S._currentEvent={ev,choices};
  setChoices(choices.map(c=>c.disabled?`${c.text}（需要${c.ch.need}）`:c.text));
}

function applyEffects(eff,result){
  if(!eff)return;
  if(eff.health){S.blood=clamp(S.blood+(eff.health||0),0,100);result.effects.push({k:'health',v:eff.health});}
  if(eff.nutrition){S.nutrition=clamp(S.nutrition+(eff.nutrition||0),0,100);result.effects.push({k:'nutrition',v:eff.nutrition});}
  if(eff.hydration){S.hydration=clamp(S.hydration+(eff.hydration||0),0,100);result.effects.push({k:'hydration',v:eff.hydration});}
  if(eff.fatigue){S.fatigue=clamp(S.fatigue+(eff.fatigue||0),0,100);result.effects.push({k:'fatigue',v:eff.fatigue});}
  if(eff.infection){S.infectionLevel=clamp(S.infectionLevel+(eff.infection||0),0,100);}
  if(eff.pain){S.pain=clamp(S.pain+(eff.pain||0),0,100);}
  if(eff.bodyWet){S.bodyWetness=clamp(S.bodyWetness+(eff.bodyWet||0),0,100);}
  // Auto-wound: health loss >=5 creates a visible injury
  if(eff.health&&eff.health<=-5){
    var pids=BODY_PARTS.filter(p=>getPartStatus(p)==='healthy');if(pids.length===0)pids=BODY_PARTS;
    var pid=pids[rand(0,pids.length-1)];var sev=eff.health<=-15?3:eff.health<=-8?2:1;
    addWound(pid,sev,'战斗中受伤',sev>=2);
  }
}
function applyItems(items,result){
  if(!items)return false;
  for(const it of items){let n=it.n;let q=Array.isArray(it.q)?rand(it.q[0],it.q[1]):(it.q||1);
    if(q<0&&!hasItem(n,Math.abs(q)))return false;} // cost check failed
  for(const it of items){let n=it.n;let q=Array.isArray(it.q)?rand(it.q[0],it.q[1]):(it.q||1);
    if(q<0){removeItem(n,Math.abs(q));result.itemsLost.push({n,q:Math.abs(q)});}}
  for(const it of items){let n=it.n;let q=Array.isArray(it.q)?rand(it.q[0],it.q[1]):(it.q||1);
    if(q>0){addItem(n,q);result.itemsGained.push({n,q});}}
  return true;
}

function resolveChoice(idx){
  const data=S._currentEvent;if(!data||!data.choices||!data.choices[idx])return null;
  const ch=data.choices[idx].ch;if(!ch||ch.disabled)return null;
  const result={itemsGained:[],itemsLost:[],effects:[],distChange:0};
  let selectedOutcome=null;

  // NEW: Multi-outcome system (randomized results)
  if(ch.outcomes&&Array.isArray(ch.outcomes)&&ch.outcomes.length>0){
    selectedOutcome=pickW(ch.outcomes);
    applyEffects(selectedOutcome.eff,result);
    if(selectedOutcome.wound){var w=selectedOutcome.wound;addWound(w.part||pick(BODY_PARTS),w.sev||1,w.desc||'受伤',w.bleed!==false);}
    if(selectedOutcome.adoptChild){const cgender=pick(['男','女']);const cnames=cgender==='男'?['小光','石头','阿勇','小杰','晨晨']:['小花','小草','阿美','小雪','星星'];S.children.push({name:pick(cnames),gender:cgender,age:rand(5,10),alive:true});modRep(3,'收养孤儿');}
    if(selectedOutcome.recruit){recruitNPC();}
    if(selectedOutcome.items&&!applyItems(selectedOutcome.items,result)){
      addStory(`❌ <strong>运气不佳！</strong>事情没有按预期发展——物资不足无法完成。`,'danger');return null;}
    if(selectedOutcome.lose){const names=Object.keys(S.inventory);for(let i=0;i<selectedOutcome.lose&&names.length>0;i++){const ln=names[rand(0,names.length-1)];removeItem(ln,1);result.itemsLost.push({n:ln,q:1});}}
    if(selectedOutcome.dist)S.distance=clamp(S.distance+(selectedOutcome.dist||0),0,20);
    if(selectedOutcome.need&&hasItem(selectedOutcome.need,1)){removeItem(selectedOutcome.need,1);result.itemsLost.push({n:selectedOutcome.need,q:1});}
    // Add randomness: sometimes lose a random item when searching/scavenging
    if(Math.random()<0.15&&Object.keys(S.inventory).length>0&&!selectedOutcome.lose){
      const rk=Object.keys(S.inventory)[rand(0,Object.keys(S.inventory).length-1)];
      if(Math.random()<0.5){removeItem(rk,1);result.itemsLost.push({n:rk,q:1});}
    }
    return selectedOutcome.desc||ch.outcome||buildOutcomeText(result);
  }

  // OLD: Deterministic format (backward compatible)
  applyEffects(ch.eff,result);
  if(ch.items&&!applyItems(ch.items,result)){
    addStory(`❌ <strong>交易失败！</strong>背包中没有足够的物资。`,'danger');return null;}
  if(ch.lose){const names=Object.keys(S.inventory);for(let i=0;i<ch.lose&&names.length>0;i++){const ln=names[rand(0,names.length-1)];removeItem(ln,1);result.itemsLost.push({n:ln,q:1});}}
  if(ch.dist){S.distance=clamp(S.distance+(ch.dist||0),0,20);result.distChange=ch.dist;}
  if(ch.need&&hasItem(ch.need,1)){removeItem(ch.need,1);result.itemsLost.push({n:ch.need,q:1});}
  // Random mishap chance
  if(Math.random()<0.12&&Object.keys(S.inventory).length>0&&!ch.lose){
    const rk=Object.keys(S.inventory)[rand(0,Object.keys(S.inventory).length-1)];
    if(Math.random()<0.4){removeItem(rk,1);result.itemsLost.push({n:rk,q:1});}
  }

  return ch.outcome||buildOutcomeText(result);
}

function buildOutcomeText(result){
  let o='';
  if(result.itemsGained.length>0){const names=result.itemsGained.map(i=>`${ITEMS[i.n]?.e||''}${i.n}×${i.q}`).join('、');o+=`你找到了${names}。`;}
  if(result.itemsLost.length>0){const names=result.itemsLost.map(i=>`${i.n}×${i.q}`).join('、');o+=`你失去了${names}。`;}
  if(result.distChange>0)o+=`你向废土深处推进了${result.distChange.toFixed(1)}km。`;
  else if(result.distChange<0)o+=`你往营地返回了${Math.abs(result.distChange).toFixed(1)}km。`;
  const he=result.effects.find(e=>e.k==='health');if(he&&he.v<0)o+=`行动中受了些伤。`;
  const fe=result.effects.find(e=>e.k==='fatigue');if(fe&&fe.v>8)o+=`你感到相当疲惫。`;
  if(!o)o='你环顾四周，废土依旧沉默。';
  return o;
}

// ===== VITAL RATES =====
function getVitalRates(){
  let bloodRate=0,bleedCount=0;for(const pid of BODY_PARTS)for(const w of S.body[pid].wounds){if(w.bleeding&&!w.bandaged){bloodRate-=w.severity*3;bleedCount++;}}
  let hydRate=-3;if(S.weather.temperature>30)hydRate-=2;if(S.weather.temperature>38)hydRate-=2;if(S.weather.windSpeed>20)hydRate-=1;
  let nutRate=-2;if(S.weather.temperature<5)nutRate-=1;if(S.weather.temperature<-10)nutRate-=1;
  let fatRate=3;if(S.weather.temperature<5)fatRate+=2;if(S.pain>40)fatRate+=1;if(isNight())fatRate+=1;
  const feels=getFeelsLike();const tempDrift=(feels+2-S.coreTemp)*0.3;
  let wetRate=0;const p=S.weather.precipType;if(p==='drizzle')wetRate=5;else if(p==='rain')wetRate=15;else if(p==='heavy_rain')wetRate=30;else if(S.weather.isSnow)wetRate=8;else wetRate=-10;if(S.hasCampfire)wetRate-=15;
  let infRate=0;const hi=BODY_PARTS.some(p=>S.body[p].wounds.some(w=>w.infected));if(hi)infRate=2;if(!hi&&S.infectionLevel>0)infRate=-3;
  return{bloodRate,bleedCount,hydRate,nutRate,fatRate,tempRate:tempDrift,wetRate,infRate};
}
function vLabel(k,v){if(k==='blood')return v>80?'充足':v>60?'正常':v>40?'偏低':v>20?'不足':'危险';if(k==='nutrition')return v>80?'饱足':v>55?'正常':v>30?'偏低':v>15?'饥饿':'极度饥饿';if(k==='hydration')return v>80?'充足':v>55?'正常':v>30?'偏低':v>15?'口渴':'脱水';if(k==='fatigue')return v<20?'充沛':v<35?'正常':v<50?'略累':v<70?'疲惫':'极度疲惫';if(k==='pain')return v<10?'无':v<25?'轻微':v<45?'中度':v<65?'较重':v<85?'剧烈':'无法忍受';if(k==='infectionLevel')return v<5?'无':v<20?'轻微':v<45?'中度':v<70?'严重':'危急';return'';}
function vColor(k,v){if(k==='blood')return v>60?'v-good':v>30?'v-warn':'v-danger';if(k==='nutrition')return v>55?'v-good':v>25?'v-warn':'v-danger';if(k==='hydration')return v>55?'v-good':v>25?'v-warn':'v-danger';if(k==='fatigue')return v<50?'v-good':v<70?'v-warn':'v-danger';if(k==='coreTemp')return v>35.5&&v<38?'v-good':(v>33&&v<40)?'v-warn':'v-danger';if(k==='pain')return v<25?'v-good':v<50?'v-warn':'v-danger';if(k==='infectionLevel')return v<20?'v-good':v<45?'v-warn':'v-danger';return'v-info';}
function fmtRate(rate,unit=''){if(Math.abs(rate)<0.05)return'→稳定';const arrow=rate<0?'↓':'↑';const abs=Math.abs(rate);if(abs>=1)return`${arrow}${abs.toFixed(0)}${unit}/h`;return`${arrow}${abs.toFixed(1)}${unit}/h`;}
function timeToCritical(key,val,rate){if(rate>=0)return null;let th;if(key==='blood')th=20;if(key==='nutrition')th=15;if(key==='hydration')th=15;if(!th)return null;const h=Math.abs((val-th)/rate);if(h>48)return null;if(h<1)return'⚠️即将危急';return`≈${h.toFixed(0)}h后危急`;}

    if(w.severity>=2&&(hasItem('医疗包',1)||hasItem('缝合针线',1)||hasItem('手术刀',1)||hasItem('烧伤膏',1)))h+=`<button class="treatment-btn" onclick="doTreat('${pid}','${w.id}','treat')">💊治疗</button>`;
    if(w.infected&&(hasItem('抗生素',1)||hasItem('退烧药',1)||hasItem('抗病毒药',1)||hasItem('青霉素',1)))h+=`<button class="treatment-btn" onclick="doTreat('${pid}','${w.id}','antibiotic')">💉抗生素</button>`;
    if((pid==='leftLeg'||pid==='rightLeg')&&w.severity>=2&&hasItem('夹板',1))h+=`<button class="treatment-btn" onclick="doTreat('${pid}','${w.id}','splint')">🪵上夹板</button>`;
    if((pid==='leftArm'||pid==='rightArm')&&w.severity>=2&&hasItem('支架',1))h+=`<button class="treatment-btn" onclick="doTreat('${pid}','${w.id}','brace')">🔩上支架</button>`;
    if(pid==='chest'&&w.severity>=3&&hasItem('手术包',1))h+=`<button class="treatment-btn" onclick="doTreat('${pid}','${w.id}','treat')">🏥紧急手术</button>`;
    if(!w.bandaged&&w.bleeding&&!hasItem('绷带',1)&&!hasItem('止血带',1)&&!hasItem('止血粉',1))h+='<span style="font-size:0.6em;color:var(--danger)">需要绷带类物品！</span>';
    h+='</div></div>';});
  if(S.pain>25&&(hasItem('止痛药',1)||hasItem('吗啡',1)))h+=`<div class="treatment-row" style="margin-top:5px"><button class="treatment-btn" onclick="doTreat(null,null,'painkiller')">💊止痛药</button></div>`;

// ===== QUICK USE =====
function quickUse(name){
  if(S.isDead||S.busy)return;const info=ITEMS[name];if(!info)return;
  // Guns need ammo
  if(name==='手枪'||name==='步枪'){useGun(name);return;}
  // Map items
  if(info.use&&info.use.map){useMap(name);return;}
  // Assembled radio - view broadcasts
  if(name==='收音机'){checkRadio();setStatus('收音机在工作——推进时可能收到广播');return;}
  // Clothing
  if(info.slot){const old=S.clothing[info.slot];if(old&&old.name!=='无'){addItem(old.name,1);}removeItem(name,1);S.clothing[info.slot]={name,warmth:info.warmth||0,wp:info.wp||0,armor:info.armor||0,rad:info.rad||0,stealth:info.stealth||0,wet:false};const st=[info.warmth?`🔥${info.warmth}`:'',info.wp?`💧${info.wp}%`:'',info.armor?`🛡️${info.armor}`:'',info.rad?`☢️${info.rad}`:'',info.stealth?`👻${info.stealth>0?'+'+info.stealth:info.stealth}`:''].filter(Boolean).join(' ');addStory(`🧥 装备了<strong>${name}</strong>（${st}）`,'action');updateUI();return;}
  if(info.med){
    // 净水/酒等可饮用也可医疗的物品：优先饮用
    if(name==='净水'){if(!removeItem(name,1))return;S.hydration=clamp(S.hydration+18,0,100);addStory('💧 喝了一瓶净水，补充了水分。','action');updateUI();checkDeath();return;}
    if(name==='酒'){if(!removeItem(name,1))return;S.fatigue=clamp(S.fatigue-5,0,100);addStory('🍺 喝了一口酒，身体暖和了些。','action');updateUI();checkDeath();return;}
    // Pure medical items: open wound treatment
    const wp=BODY_PARTS.filter(p=>S.body[p].wounds.length>0);if(wp.length>0)showBodyDetail(wp[0]);else setStatus('没有需要治疗的伤口');return;
  }
  if(info.use){if(!removeItem(name,1))return;const eff=info.use;if(eff.nutrition)S.nutrition=clamp(S.nutrition+eff.nutrition,0,100);if(eff.fatigue)S.fatigue=clamp(S.fatigue+(eff.fatigue||0),0,100);if(eff.hydration)S.hydration=clamp(S.hydration+(eff.hydration||0),0,100);if(eff.morale){}addStory(`🎒 使用了<strong>${name}</strong>`,'action');if(name==='变异兽肉'&&Math.random()<0.3){S.infectionLevel=clamp(S.infectionLevel+15,0,100);addStory('🤢 变异兽肉带来副作用…','medical');}updateUI();checkDeath();return;}
  setStatus(name+' 无法直接使用');
}

// ===== RETURN TO CAMP =====
async function returnToCamp(){
  if(S.isDead||S.busy||atCamp())return;
  const db=getInjuryDebuffs();if(db.cantLeave&&!atCamp()){setStatus(db.cantLeaveReason+'，无法移动！先治疗或休息。');return;}
  S.busy=true;btnDisabled(true);setStatus('🏃 返回营地...');setChoices([]);
  const dist=S.distance;const hours=Math.ceil(dist/3);for(let i=0;i<hours;i++)advanceHour(1);
  S.distance=0;S.hasCampfire=false;
  teammateTurn(); // teammates also traveled
  addStory(`🏕️ 经过${hours}小时跋涉，在<strong>${timeString()}</strong>回到了营地。熟悉的围栏和篝火痕迹让你稍微安心。`,'camp');
  // Auto-rest on return
  S.fatigue=clamp(S.fatigue-20,0,100);S.coreTemp=clamp(S.coreTemp+(S.coreTemp<37?1.5:-0.5),30,43);
  S.bodyWetness=clamp(S.bodyWetness-30,0,100);
  for(const s of['head','upper','lower','feet'])S.clothing[s].wet=false;
  addStory('😴 回到营地让你放松了不少。你脱下湿衣服烤火，身体渐渐暖和起来。','camp');
  progressWounds();checkDeath();if(S.isDead){S.busy=false;btnDisabled(false);return;}
  // Camp rest event
  if(S.fatigue>30||S.blood<70||S.coreTemp<36||S.coreTemp>38){
    addStory('营地的安全让你有机会好好休整一下。你生起篝火，坐下来检查装备和伤口。','camp');
    S.fatigue=clamp(S.fatigue-15,0,100);
    if(S.blood<80)S.blood=clamp(S.blood+8,0,100);
    S.coreTemp=clamp(S.coreTemp+(S.coreTemp<37?2:-1),30,43);
    if(S.pain>0)S.pain=clamp(S.pain-10,0,100);
  }
  updateUI();S.busy=false;btnDisabled(false);
  // Camp menu - player chooses next action, no auto-event
  S._currentEvent=null;
  setChoices(['😴 休息恢复体力','🔧 整备营地(建造/储物/升级)','🌍 外出探索废土','⚔️ 查看敌对营地']);
}

// ===== REST AT CAMP =====
async function restAtCamp(){
  if(S.isDead||S.busy||!atCamp())return;S.busy=true;btnDisabled(true);setStatus('😴 休息中...');setChoices([]);
  advanceHour(rand(2,4));teammateTurn();
  S.fatigue=clamp(S.fatigue-30,0,100);
  S.blood=clamp(S.blood+10,0,100);
  S.coreTemp=clamp(S.coreTemp+(S.coreTemp<37?2.5:-1),30,43);
  S.bodyWetness=clamp(S.bodyWetness-40,0,100);
  S.pain=clamp(S.pain-15,0,100);
  for(const s of['head','upper','lower','feet'])S.clothing[s].wet=false;
  if(S.infectionLevel>0)S.infectionLevel=clamp(S.infectionLevel-5,0,100);
  addStory('😴 你在营地安心休息了几个小时。篝火噼啪作响，驱散了废土的寒意。身体的疲惫在慢慢消退。','camp');
  const feels=getFeelsLike();
  if(feels<10)addStory('🔥 你往篝火里添了几根木柴，火焰跳得更高了。','camp');

  progressWounds();updateUI();checkDeath();
  if(S.isDead){S.busy=false;btnDisabled(false);return;}
  S.busy=false;btnDisabled(false);setStatus('休息完毕');
  S._currentEvent=null;

}

// ===== TIME =====
function advanceHour(hours){
  for(let h=0;h<hours;h++){S.hour++;if(S.hour>=24){S.hour=0;S.day++;S.seasonDay++;
    if(S.seasonDay>15){S.seasonDay=1;const si=SEASONS.findIndex(s=>s.id===S.season?.id);S.season=SEASONS[(si+1)%4];addStory(`🌸🍂 <strong>季节更替：${S.season.icon} ${S.season.name}季</strong>`,'weather');}
    S.nutrition=clamp(S.nutrition+rand(-10,-3),0,100);S.hydration=clamp(S.hydration+rand(-8,-3),0,100);S.fatigue=clamp(S.fatigue+rand(2,8),0,100);
    if(!atCamp()&&campUnderAttack())resolveCampAttack();S.hasCampfire=false;}S.minute=0;}
  generateWeather();applyWetness();updateCoreTemp();checkDeath();
}

  const modal=document.getElementById('modal'),ov=document.getElementById('modal-overlay');

  let anyAvailable=false;
  for(const r of RECIPES){
    const canCraft=Object.entries(r.need).every(([n,q])=>hasItem(n,q));
    if(canCraft)anyAvailable=true;
    const needText=Object.entries(r.need).map(([n,q])=>{const info=ITEMS[n];return`${info?.e||''}${n}×${q} ${hasItem(n,q)?'✅':'❌'}`;}).join(' ');
    const btnCls=canCraft?'treatment-btn':'treatment-btn';
    const btnStyle=canCraft?'':'opacity:0.4;cursor:not-allowed;';
    h+=`<div class="wound-card" style="border-left-color:${canCraft?'var(--success)':'#555'}"><strong>${r.desc}</strong><br><span style="font-size:0.65em;color:var(--text-dim)">需要：${needText}</span><div class="treatment-row"><button class="${btnCls}" style="${btnStyle}" onclick="${canCraft?`doCraft('${r.id}')`:'return'}" ${canCraft?'':'disabled'}>🔨 制作</button></div></div>`;
  }
  if(!anyAvailable)h+='<p style="color:var(--text-dim);font-size:0.75em;">暂无足够材料制作任何物品。<br>收集更多物资后再来吧。</p>';
  // Repair section
  h+=`<div style="margin-top:8px;"><strong>🔧 修复装备：</strong><div class="treatment-row">`;
  const repairable=Object.entries(S.inventory).filter(([n,d])=>ITEMS[n]&&ITEMS[n].dura&&(S._equipDura[n]||ITEMS[n].dura)<ITEMS[n].dura);
  if(repairable.length===0)h+='<span style="font-size:0.65em;color:var(--text-dim)">无待修复装备</span>';
  else repairable.forEach(([n])=>{const d=S._equipDura[n]||ITEMS[n].dura;const max=ITEMS[n].dura;h+=`<button class="treatment-btn" onclick="repairAtBench('${n}')" style="font-size:0.6em;">🔧${n}(${d}/${max})</button>`;});
  h+=`</div></div>`;
  h+=`<div class="btn-row"><button class="btn small" onclick="closeModal()">关闭</button></div>`;
  modal.innerHTML=h;ov.classList.add('active');
}

function doCraft(recipeId){
  const r=RECIPES.find(x=>x.id===recipeId);if(!r)return;
  if(!Object.entries(r.need).every(([n,q])=>hasItem(n,q))){setStatus('材料不足！');return;}
  // Consume materials
  for(const [n,q]of Object.entries(r.need))removeItem(n,q);
  // Grant results
  for(const [n,q]of Object.entries(r.result))addItem(n,q);
  // Special effects
  if(r.campDef){S.camp.defense=clamp(S.camp.defense+r.campDef,0,100);addStory('🔨 加固了营地围栏！防御力提升。','camp');}
  if(r.fire){addStory('🔨 制作了一支火把，夜间行动更方便了。','action');}
  addStory(`🔨 制作完成：<strong>${r.desc}</strong>`,'action');
  updateUI();openCrafting(); // refresh modal
}

// ===== MAP SYSTEM =====
S.discoveredLocations=[];S.locationVisits={};
function hasMap(){return hasItem('区域地图',1)||hasItem('军事地图',1)||hasItem('完整地图',1);}
function getMapTags(){const tags=[];if(hasItem('区域地图',1))tags.push('local');if(hasItem('军事地图',1))tags.push('military');if(hasItem('完整地图',1))tags.push('local','civilian','military','special');return[...new Set(tags)];}

function useMap(mapItemName){
  if(S.isDead||S.busy)return;
  if(!hasItem(mapItemName,1)){setStatus('你没有这种地图');return;}
  removeItem(mapItemName,1);
  const mt=MAP_TYPES[mapItemName];if(!mt)return;
  const tags=getMapTags();
  const eligible=MAP_LOCATIONS.filter(l=>!S.discoveredLocations.includes(l.id)&&l.tags.some(t=>tags.includes(t)));
  if(eligible.length===0){addStory('🗺️ 这种地图上没有新地点了。','system');updateUI();return;}
  const count=Math.min(rand(2,4),eligible.length);const discovered=[];
  for(let i=0;i<count;i++){const loc=eligible.splice(rand(0,eligible.length-1),1)[0];S.discoveredLocations.push(loc.id);S.locationVisits[loc.id]=0;discovered.push(loc);}
  addStory(`🗺️ 你打开<strong>${mapItemName}</strong>仔细研究。发现了${discovered.length}个新地点：`,'system');
  discovered.forEach(l=>{addStory(`${l.icon} <strong>${l.name}</strong> — ${l.dir}方${l.dist}km，${l.desc}`,'system');});
  updateUI();showMapView();
}

function showMapView(){
  const modal=document.getElementById('modal'),ov=document.getElementById('modal-overlay');
  let h='<h3>🗺️ 废土地图</h3>';
  h+=`<div style="text-align:center;font-size:0.8em;line-height:1.6;background:#111;border-radius:6px;padding:10px;">`;
  h+=`<div>🏕️ <strong>营地</strong>（你在这里）</div>`;
  const discovered=MAP_LOCATIONS.filter(l=>S.discoveredLocations.includes(l.id));
  if(discovered.length===0){
    h+=`<div style="color:var(--text-dim);margin-top:6px;">地图还是一片空白。<br>找到「地图」物品来发现附近地点。</div>`;
  }else{
    discovered.forEach(l=>{const visits=S.locationVisits[l.id]||0;const depleted=visits>=l.maxVisits;
      h+=`<div style="margin-top:4px;display:flex;justify-content:space-between;align-items:center;gap:6px;"><span>${l.icon} <strong>${l.name}</strong> — ${l.dir} ${l.dist}km <span style="color:var(--text-dim);font-size:0.8em;">${l.desc}</span> <span style="font-size:0.65em;color:${depleted?'var(--danger)':'var(--text-dim)'}">${depleted?'[已搜刮空]':`[${visits}/${l.maxVisits}]`}</span></span>${depleted?'':`<button class="treatment-btn" onclick="travelToLocation('${l.id}')" style="font-size:0.6em;white-space:nowrap;">🚶前往</button>`}</div>`;});
  }
  h+=`</div>`;
  if(discovered.length>0)h+=`<p style="font-size:0.7em;color:var(--text-dim);margin-top:6px;">💡 点击「前往」可消耗时间前往该地点获取物资。</p>`;
  h+=`<div class="btn-row"><button class="btn small" onclick="closeModal()">关闭</button></div>`;
  modal.innerHTML=h;ov.classList.add('active');
}

function travelToLocation(locId){
  if(S.isDead||S.busy)return;
  const loc=MAP_LOCATIONS.find(l=>l.id===locId);if(!loc)return;
  const visits=S.locationVisits[loc.id]||0;if(visits>=loc.maxVisits){setStatus('此地已被搜刮一空');return;}
  S.busy=true;btnDisabled(true);setStatus(`前往${loc.name}...`);setChoices([]);closeModal();
  const travelHours=Math.ceil(loc.dist/2);for(let i=0;i<travelHours;i++)advanceHour(1);
  S.distance=clamp(S.distance+loc.dist,0,20);S.fatigue=clamp(S.fatigue+loc.dist*2,0,100);
  S.locationVisits[loc.id]=(S.locationVisits[loc.id]||0)+1;
  addStory(`📍 经过${travelHours}小时跋涉，你到达了<strong>${loc.icon} ${loc.name}</strong>。（第${S.locationVisits[loc.id]}次探索）`,'system');
  // Grant items (diminishing after each visit)
  const factor=Math.max(0.2,1-(visits*0.3));let found=[];
  for(const it of loc.items){const q=Math.max(1,Math.floor((Array.isArray(it.q)?rand(it.q[0],it.q[1]):(it.q||1))*factor));if(q>0){addItem(it.n,q);found.push(`${ITEMS[it.n]?.e||''}${it.n}×${q}`);}}
  if(found.length>0)addStory(`🎁 搜索收获：${found.join('、')}`,'action');else addStory('📭 这个地方已经被搜刮得差不多了...','system');
  if(S.locationVisits[loc.id]>=loc.maxVisits)addStory(`📭 <strong>${loc.name}已被彻底搜刮一空。</strong>没有再来探索的必要了。`,'system');
  progressWounds();updateUI();S.busy=false;btnDisabled(false);
  if(S.isDead)return;
  const ev=selectEvent();processEvent(ev);
}

// ===== RADIO SYSTEM =====
function checkRadio(){
  if(!hasItem('收音机',1))return;
  // 30% chance per "continue" to receive a broadcast
  if(Math.random()>0.3)return;
  const msg=pick(RADIO_MSGS);
  const cls=msg.type==='distress'?'danger':msg.type==='static'?'system':'party';
  addStory(`📻 <strong>收音机广播：</strong>${msg.msg}`,cls);
  if(msg.type==='news'){
    // News sometimes reveals a map location
    if(Math.random()<0.3){
      const unknown=MAP_LOCATIONS.filter(l=>!S.discoveredLocations.includes(l.id));
      if(unknown.length>0){
        const loc=pick(unknown);S.discoveredLocations.push(loc.id);
        addStory(`🗺️ 广播中提到了一个地点：${loc.icon} <strong>${loc.name}</strong>（${loc.dir}方${loc.dist}km）`,'system');
      }
    }
  }
  if(msg.type==='distress'&&Math.random()<0.5){
    addStory('💭 广播中的求救信号让你感到不安。也许你应该去看看？','system');
    setChoices(['前往求救信号源','忽略继续当前路线']);
    S._currentEvent={ev:{id:'radio_distress'},choices:[
      {text:'前往求救信号源',ch:{eff:{fatigue:10,morale:5},dist:rand(3,8),outcome:'你循着信号源的方向前进。废土上每个求救信号都可能意味着危险——或者机遇。'}},
      {text:'忽略继续当前路线',ch:{eff:{},outcome:'你关掉了收音机。在废土上，自保永远是第一位的。'}},
    ]};
  }
}

// ===== TRANSITION NARRATION =====
function generateTransition(){
  const parts=[];
  // Time awareness
  const h=S.hour;
  if(h>=5&&h<8)parts.push(pick(['天刚蒙蒙亮，晨光穿透废墟的缝隙','黎明降临废土，空气清冷','东边的天际泛起鱼肚白']));
  else if(h>=8&&h<12)parts.push(pick(['太阳逐渐升高，废土在阳光下暴露出狰狞的面目','上午的废土稍微平静了些','阳光驱散了夜晚的寒意']));
  else if(h>=12&&h<15)parts.push(pick(['日头爬到头顶，是一天中最热的时候','正午的废土像一座烤箱','影子缩到脚下，热浪扭曲着远方的地平线']));
  else if(h>=15&&h<18)parts.push(pick(['太阳开始西斜，影子被拉得很长','午后的风吹过废墟发出呜咽','天色还早，但你知道白天不多了']));
  else if(h>=18&&h<20)parts.push(pick(['夕阳给废土镀上一层血色','黄昏降临，阴影吞噬着废墟','天色渐暗，是时候考虑今晚的安排']));
  else if(h>=20||h<5)parts.push(pick(['夜幕完全笼罩了废土','黑暗中只有风声和远处偶尔的嚎叫','月光冷冷地洒在废墟上']));

  // Body state
  const bodyParts=[];
  if(S.blood<45)bodyParts.push(pick(['失血让你有些头晕','伤口还在隐隐作痛','你感到虚弱，需要处理伤口']));
  if(S.nutrition<35)bodyParts.push(pick(['肚子饿得咕咕叫','胃里空空的，需要找点吃的','饥饿让你的手微微发抖']));
  if(S.hydration<35)bodyParts.push(pick(['嘴唇干裂，喉咙发紧','口干舌燥，急需找到水源','脱水的感觉越来越强烈']));
  if(S.fatigue>65)bodyParts.push(pick(['疲惫像铅块一样压在身上','每一步都变得沉重','眼皮打架，你需要休息']));
  if(S.coreTemp<35)bodyParts.push(pick(['寒冷深入骨髓','你裹紧衣服，但依然瑟瑟发抖','手指冻得有些不听使唤']));
  if(S.coreTemp>39)bodyParts.push(pick(['额头滚烫，浑身发冷','高烧让你视线模糊','身体像被火烧一样']));
  if(S.bodyWetness>50)bodyParts.push(pick(['湿透的衣服贴在身上，冰冷刺骨','你拧了拧衣角，水珠滴落','潮湿让寒意加倍']));
  if(S.pain>45)bodyParts.push(pick(['疼痛让你咬紧牙关','每动一下都伴随着刺痛','伤口的疼痛分散了你的注意力']));
  if(bodyParts.length===0)bodyParts.push(pick(['身体状态还行','目前还算撑得住','暂时还扛得住']));
  parts.push(pick(bodyParts));

  // Position awareness
  if(atCamp())parts.push(pick(['你站在营地的围栏边，望向废土','营地的篝火为你提供了一小片安全区','从营地向外望去，废墟在阳光下沉默']));
  else if(S.distance<3)parts.push(pick(['营地就在身后不远处','回头还能隐约看到营地的轮廓','离营地不远，空气中还有篝火的味道']));
  else if(S.distance<8)parts.push(pick(['营地已经在好几公里外了','废土在脚下延伸，营地变得遥不可及','走了不短的距离，四周的废墟越来越密集']));
  else parts.push(pick(['营地远在后方，这里完全是未知区域','你已经深入到很少有人踏足的区域','远处的营地几乎成了记忆']));
  if(isNight()&&!atCamp()&&!S.hasCampfire)parts.push('黑暗中危机四伏，你在考虑要不要生一堆篝火。');
  if(S.hasCampfire)parts.push('篝火噼啪作响，驱散了些许黑暗。');

  // Reflection
  if(S.history.length>0){
    const last=S.history[S.history.length-1];
    if(last)parts.push(pick(['刚才的经历还在脑海中回放','你回想了一下之前发生的事','废土上的每一刻都不会白费']));
  }

  // Party mention
  const alive=S.party.filter(p=>p.alive);
  if(alive.length>0){
    parts.push(pick([`${alive.map(p=>p.name).join('和')}在你身边`,'队友的存在让你感到些许安心','有同伴在，废土没那么孤独']));
  }else if(S.party.length===0&&S.history.length>2){
    parts.push('独自一人走在废土上，寂静是最忠实的伴侣。');
  }

  return parts.filter(Boolean).join('。')+'。';
}

// ===== MAIN LOOP =====
async function continueStory(){
  if(S.isDead||S.busy)return;
  // At camp: show camp menu instead of random events
  if(atCamp()&&!S._currentEvent&&S.history.length>0){
    setChoices(['😴 休息恢复体力','🔧 整备营地(建造/储物/升级)','🌍 外出探索废土','⚔️ 查看敌对营地']);
    S._currentEvent=null;setStatus('在营地');return;
  }
  S.busy=true;btnDisabled(true);setStatus('⏳ 时间流逝...');setChoices([]);
  // Auto-increase distance when exploring (not at camp and not first turn)
  if(!atCamp()&&(S.day>1||S.history.length>0)){S.distance=clamp(S.distance+randF(0.5,2),0,20);}
  if(S.day===1&&S.hour===8&&S.distance===0&&S.history.length===0){
    generateWeather();addStory(`<strong>━━━ 📅 第1天 ${timeString()} | ${S.season.icon}${S.season.name}季 | ${S.weather.icon}${S.weather.temperature}°C ${S.weather.desc} ━━━</strong>`,'system');
    addStory(`核战第7年。你——一个${S.playerAge}岁的${S.playerGender=='男'?'男人':'女人'}——在营地中醒来。你的营地位于<strong>${S.currentBiome?.icon} ${S.currentBiome?.name}</strong>。${S.currentBiome?.desc||''}。物资匮乏，危险四伏——但希望还在。`,'system');
    addStory(`外面<strong>${S.weather.temperature}°C</strong>，体感<strong>${getFeelsLike()}°C</strong>。${S.enemyCamps.length>0?`附近有${S.enemyCamps.length}个敌对营地——小心行事。`:''}你背起背包，走向围栏边。`,'system');
  }else{
    advanceHour(rand(1,3));addStory(`<strong>━━━ 第${S.day}天 ${timeString()} | ${S.season.icon}${S.season.name} | ${S.weather.icon}${S.weather.temperature}°C ${S.weather.desc} | 体感${getFeelsLike()}°C ━━━</strong>`,'system');
    if(isNight()&&!atCamp()&&!S.hasCampfire)addStory('🌙 <strong>夜色笼罩。</strong>没有篝火的夜晚，危险潜伏在每个阴影中。','system');
    if(S.bodyWetness>50)addStory('💦 衣服湿透了，寒意渗透骨髓。','weather');
    // Transition narration
    const trans=generateTransition();
    if(trans)addStory(trans,'system');
  }
  progressWounds();teammateTurn();campStabilityCheck();tryHaveChild();growChildren();tickProduction();simulateCampEcology();checkCampDestroyed();checkAutoRecruit();updateUI();if(S.isDead){S.busy=false;btnDisabled(false);return;}
  // Injury movement check
  const db=getInjuryDebuffs();if(db.cantLeave&&!atCamp()){addStory(`🚫 <strong>${db.cantLeaveReason}</strong>——必须先治疗才能继续。`,'medical');S.busy=false;btnDisabled(false);setChoices(['尝试休息恢复','使用医疗物品治疗']);return;}
  if(db.needSurgery&&atCamp())addStory('🏥 <strong>胸部重伤！</strong>需要手术包或医疗包紧急手术。','medical');
  // Enemy attack on player camp
  // Stealth attack: if no one at camp, attacks happen silently (damage found on return)
  if(!atCamp()&&!S.party.some(p=>p.alive&&p.activity==='guard')){
    if(S._incomingAttack){S._incomingAttack.arriveHour--;if(S._incomingAttack.arriveHour<=0){executeBattle(S._incomingAttack);S._incomingAttack=null;}}
    else if(S.enemyCamps.length>0&&Math.random()<0.08){const ec=pick(S.enemyCamps.filter(c=>c.alive!==false));if(ec&&!S._silentAttack){S._silentAttack=ec;}}
  }
  if(atCamp())enemyAttackPlayer();
  // Silent attack result when returning to camp
  if(atCamp()&&S._silentAttack){addStory(`💔 回到营地你发现<strong>${S._silentAttack.name}</strong>趁你不在时袭击了营地！物资被盗，建筑受损...`,'danger');S.camp.condition=clamp(S.camp.condition-rand(10,25),0,100);const ck=Object.keys(S.camp.supplies);for(let i=0;i<Math.min(3,ck.length);i++){const k=ck[rand(0,ck.length-1)];removeItem(k,rand(1,3),true);}S._silentAttack=null;}
  // Check radio broadcasts
  checkRadio();
  // Check weather warnings first
  if(!checkWeatherWarning()){
    // Select & process event
    const ev=selectEvent();processEvent(ev);
    S.history.push({day:S.day,summary:ev.id});
  }
  updateUI();S.busy=false;btnDisabled(false);checkDeath();
}

async function pickChoice(idx){
  if(S.isDead||S.busy)return;
  const data=S._currentEvent;
  // Handle camp menu choices (no active event)
  if(!data||!data.choices||!data.choices[idx]){
    const btns=document.querySelectorAll('.choice-btn');const ct=btns[idx]?.textContent?.replace(/^\d+\.\s*/,'')||'';
    if(ct.includes('休息恢复')){S.busy=false;btnDisabled(false);setStatus('');await restAtCamp();return;}
    if(ct.includes('整备营地')){S.busy=false;btnDisabled(false);setStatus('');setChoices(['🏕️ 查看营地布局','📦 管理仓库','🔨 工作台制作','📦 升级储物箱']);return;}
    if(ct.includes('外出探索')){S.distance=0.5;S.busy=false;btnDisabled(false);setStatus('');await continueStory();return;}
    if(ct.includes('查看敌对')){S.busy=false;btnDisabled(false);setStatus('');showEnemyCamps();return;}
    if(ct.includes('加固营地')){S.busy=false;btnDisabled(false);setStatus('');upgradeDefense();return;}
    if(ct.includes('查看营地布局')){S.busy=false;btnDisabled(false);setStatus('');showCampView();return;}
    if(ct.includes('管理仓库')){S.busy=false;btnDisabled(false);setStatus('');openStorageUI();return;}
    if(ct.includes('工作台制作')){S.busy=false;btnDisabled(false);setStatus('');openCrafting();return;}
    if(ct.includes('升级储物箱')){S.busy=false;btnDisabled(false);setStatus('');upgradeChest();return;}
    if(ct.includes('继续推进')){S.distance=0.5;S.busy=false;btnDisabled(false);setStatus('');await continueStory();return;}
    S.busy=false;setStatus('');btnDisabled(false);
    await continueStory();
    return;
  }
  S.busy=true;btnDisabled(true);setStatus('⏳ 命运展开中...');
  const ct=data.choices[idx].text;setChoices([]);addStory(`<strong>👉 ${ct}</strong>`,'action');

  const outcome=resolveChoice(idx);
  advanceHour(rand(1,3));progressWounds();teammateTurn();applyWetness();updateCoreTemp();

  if(outcome)addStory(outcome,'ai');
  if(S.isDead){S.busy=false;btnDisabled(false);setStatus('');return;}

  // Don't auto-chain — show "continue" button so narrative stays coherent
  S._currentEvent=null;
  setChoices(['▶ 继续推进']);
  S.busy=false;btnDisabled(false);setStatus('');updateUI();checkDeath();
}

// ===== DEATH =====
function checkDeath(){if(S.blood<=0){S.causeOfDeath='失血过多';die();}if(S.infectionLevel>=95){S.causeOfDeath='败血症';die();}if(S.coreTemp<30){S.causeOfDeath='失温症（冻死）';die();}if(S.coreTemp>43){S.causeOfDeath='高热致死';die();}if(S.nutrition<=0){S.causeOfDeath='饥饿';die();}if(S.hydration<=0){S.causeOfDeath='脱水';die();}}
function die(){
  S.isDead=true;updateUI();btnDisabled(true);setChoices([]);
  const ov=document.getElementById('death-overlay');ov.querySelector('.death-days').textContent=`☠️ 存活 ${S.day} 天 | ${S.season?.name||''}季 | 死因：${S.causeOfDeath} | 小队${S.party.filter(p=>p.alive).length}人`;
  ov.querySelector('.death-info').textContent=`废土吞噬了又一个灵魂。${S.party.filter(p=>p.alive).map(p=>p.name).join('、')||'没有人'}记得你最后的样子。`;ov.classList.add('active');
}

// ===== RESET =====
function resetGame(){
  S.day=1;S.hour=8;S.minute=0;S.season=SEASONS[0];S.seasonDay=1;S.distance=0;S.hasCampfire=false;
  S.blood=100;S.nutrition=80;S.hydration=85;S.fatigue=15;S.pain=0;S.infectionLevel=0;S.coreTemp=37;S.bodyWetness=0;
  S.clothing=getDefaultEquip();
  S.inventory={};S.camp={supplies:{},defense:0,condition:100,governance:'dictatorship',stability:60};S.party=[];S.history=[];S.recentEvents=[];S.recentCats=[];S.discoveredLocations=[];S.locationVisits={};S.enemyCamps=[];S.currentBiome=randomBiome();for(let i=0;i<rand(1,3);i++)S.enemyCamps.push(generateEnemyCamp());S.campGrid=null;S._campDefMod=0;S._campLevel=1;initCampGrid();S.spouse=null;S.children=[];S.backpackSlots=4;S._incomingAttack=null;S._silentAttack=null;S._campDestroyed=false;S.locationVisits={};S.chestLevel=1;S.chestSlots=10;S._gunBonus=0;S.reputation=10;S.isDead=false;S.causeOfDeath='';S.busy=false;S._currentEvent=null;
  BODY_PARTS.forEach(p=>{S.body[p].wounds=[];});
  generateWeather();addItem('绷带',2);addItem('净水',2);addItem('罐头',2);addItem('木材',3);
  document.getElementById('death-overlay').classList.remove('active');document.getElementById('story-box').innerHTML='';document.getElementById('choices-area').innerHTML='';
  addStory('<strong>🗺️ 核战第7年。春天。你在营地中醒来。</strong>','system');addStory('关注天气变化，寒冷时添衣，雨天注意防水。天黑后可以生篝火过夜。探索、搜刮、招募队友、加固营地——活下来。','system');
  btnDisabled(false);updateUI();setStatus('🔄 点击「继续推进」开始...');
}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='n'){e.preventDefault();continueStory();}
  if(e.key==='1'){const b=document.querySelectorAll('.choice-btn');if(b[0])pickChoice(0);}
  if(e.key==='2'){const b=document.querySelectorAll('.choice-btn');if(b[1])pickChoice(1);}
  if(e.key==='3'){const b=document.querySelectorAll('.choice-btn');if(b[2])pickChoice(2);}
  if(e.key==='Escape')closeModal();
});

// ===== INIT =====
function init(){
  S.season=SEASONS[0];S.seasonDay=1;
  document.getElementById('death-overlay').classList.remove('active');
  document.getElementById('story-box').innerHTML='';
  document.getElementById('choices-area').innerHTML='';
  document.getElementById('inv-row').innerHTML='';
  document.getElementById('status-line').textContent='选择初始身份';
  // Show identity choices as regular buttons
  let btns='';
  IDENTITIES.forEach((id,i)=>{
    btns+=`<button class="choice-btn" onclick="pickIdentity('${id.id}')">${i+1}. ${id.icon} <strong>${id.name}</strong> — ${id.desc}<br><span style="font-size:0.7em;color:var(--text-dim)">初始：${id.items.map(x=>x.n+'×'+x.q).join('、')}</span></button>`;
  });
  document.getElementById('choices-area').innerHTML=btns;
}

function pickIdentity(id){
  const iden=IDENTITIES.find(i=>i.id===id);if(!iden)return;
  S.identity=iden;
  if(iden.age)S.playerAge=iden.age;
  // Reset game with identity items
  S.day=1;S.hour=8;S.minute=0;S.seasonDay=1;S.distance=0;S.hasCampfire=false;
  S.blood=100;S.nutrition=80;S.hydration=85;S.fatigue=15;S.pain=0;S.infectionLevel=0;S.coreTemp=37;S.bodyWetness=0;
  S.clothing=getDefaultEquip();
  S.inventory={};S.camp={supplies:{},defense:0,condition:100,governance:'dictatorship',stability:60};S.party=[];S.history=[];S.recentEvents=[];S.recentCats=[];S.discoveredLocations=[];S.locationVisits={};S.enemyCamps=[];
  S.currentBiome=randomBiome();for(let i=0;i<rand(1,3);i++)S.enemyCamps.push(generateEnemyCamp());
  S.campGrid=null;S._campDefMod=0;S._campLevel=1;initCampGrid();S.spouse=null;S.children=[];
  S.backpackSlots=4;S._incomingAttack=null;S._silentAttack=null;S._campDestroyed=false;
  S.chestLevel=1;S.chestSlots=10+(iden.bonus.extraStorage||0);S._gunBonus=(iden.bonus.combatPower||0);S.reputation=10;S.isDead=false;S.causeOfDeath='';S.busy=false;S._currentEvent=null;
  // Apply identity bonuses
  if(iden.bonus.freeMedTent){if(S.campGrid)S.campGrid[1][2]={type:'building',id:'medtent'};}
  if(iden.bonus.freeGreenhouse){if(S.campGrid)S.campGrid[3][2]={type:'building',id:'greenhouse'};}
  BODY_PARTS.forEach(p=>{S.body[p]={wounds:[]};});
  generateWeather();
  for(const it of iden.items)addItem(it.n,it.q);
  addItem('木材',3);
  document.getElementById('story-box').innerHTML='';document.getElementById('choices-area').innerHTML='';
  addStory(`<strong>━━━ 📅 第1天 ${timeString()} | ${S.season.icon}${S.season.name}季 | ${S.weather.icon}${S.weather.temperature}°C ${S.weather.desc} ━━━</strong>`,'system');
  addStory(`${iden.icon} <strong>${iden.name}</strong>，${S.playerAge}岁。${iden.intro}`,'system');
  addStory(`你的营地位于<strong>${S.currentBiome.icon} ${S.currentBiome.name}</strong>。${S.currentBiome.desc}。外面${S.weather.temperature}°C，体感${getFeelsLike()}°C。`,'system');
  addStory('物资匮乏，危险四伏——但希望还在。','system');
  btnDisabled(false);updateUI();setStatus('点击「继续推进」开始');
}
