<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>末日求生 - 废土纪元</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');
:root{--bg:#0c0c0c;--panel:#151515;--border:#282828;--accent:#ff6b35;--accent2:#ff4500;--danger:#e63946;--success:#2ecc71;--warning:#f39c12;--text:#bbb;--text-bright:#eee;--text-dim:#777;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 15% 40%,rgba(255,107,53,0.04) 0%,transparent 55%),radial-gradient(ellipse at 85% 30%,rgba(255,69,0,0.03) 0%,transparent 55%);}
#header{text-align:center;padding:6px 20px 2px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(21,21,21,0.98) 0%,rgba(12,12,12,0) 100%);}
#header h1{font-family:'Orbitron',sans-serif;font-size:1.3em;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#ff6b35,#ff4500,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#header .sub{font-size:0.55em;color:var(--text-dim);letter-spacing:3px;}
#info-bar{display:flex;gap:6px;padding:4px 10px;max-width:1100px;margin:0 auto;justify-content:center;flex-wrap:wrap;align-items:center;font-size:0.68em;}
.info-chip{padding:4px 8px;background:#111;border:1px solid #222;border-radius:14px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.info-chip .ic-emoji{font-size:1em;}.info-chip .ic-val{font-weight:700;color:var(--text-bright);}
.info-chip.warn{border-color:var(--warning);}.info-chip.danger{border-color:var(--danger);animation:pulse-border 1.5s infinite;}
@keyframes pulse-border{0%,100%{border-color:var(--danger)}50%{border-color:transparent}}
#main{display:flex;gap:10px;padding:6px 10px;max-width:1100px;margin:0 auto;min-height:calc(100vh - 210px);}
@media(max-width:850px){#main{flex-direction:column;align-items:center;}}
#left-col{width:270px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
#right-bar{width:130px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;}#right-bar button{display:block;width:100%;margin:1px 0;padding:4px 5px;font-size:0.6em;background:#111;border:1px solid #333;color:#ccc;border-radius:3px;cursor:pointer;font-family:inherit;text-align:left;}#right-bar button:hover{background:#222;border-color:var(--accent);}@media(max-width:850px){#left-col{width:100%;max-width:340px;}}
#char-container{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center;position:relative;}
#char-title{font-family:'Orbitron',sans-serif;font-size:0.6em;letter-spacing:2px;color:var(--text-dim);margin-bottom:2px;}
#char-svg{width:120px;height:240px;}
.bp{cursor:pointer;transition:all 0.3s;}.bp:hover{filter:brightness(1.5);}
.bp-healthy{fill:#3d4a3d;stroke:#4a5a4a;}.bp-minor{fill:#6b5a1a;stroke:#8a7a2a;animation:pulse-yel 1.5s infinite;}
.bp-wound{fill:#8b2a1a;stroke:#aa3a2a;animation:pulse-red 1s infinite;}.bp-severe{fill:#6b0000;stroke:#aa0000;animation:pulse-red 0.6s infinite;}
.bp-infected{fill:#5b1a5b;stroke:#8b2a8b;animation:pulse-pur 1.2s infinite;}.bp-bandaged{fill:#5a5a5a;stroke:#7a7a7a;}
@keyframes pulse-red{0%,100%{filter:drop-shadow(0 0 3px rgba(255,0,0,0.4))}50%{filter:drop-shadow(0 0 10px rgba(255,0,0,0.8))}}
@keyframes pulse-yel{0%,100%{filter:drop-shadow(0 0 2px rgba(255,180,0,0.3))}50%{filter:drop-shadow(0 0 6px rgba(255,180,0,0.6))}}
@keyframes pulse-pur{0%,100%{filter:drop-shadow(0 0 3px rgba(180,0,180,0.4))}50%{filter:drop-shadow(0 0 8px rgba(180,0,180,0.7))}}
.blood-drip{animation:drip 0.8s ease-in infinite;}
@keyframes drip{0%{opacity:0;transform:translateY(0)}30%{opacity:1}100%{opacity:0;transform:translateY(12px)}}
.bp-tooltip{position:absolute;pointer-events:none;background:#000;color:#fff;padding:3px 7px;border-radius:4px;font-size:0.6em;white-space:nowrap;display:none;z-index:50;border:1px solid #444;}
.side-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:0.68em;}
.sp-title{font-family:'Orbitron',sans-serif;font-size:0.65em;letter-spacing:1px;color:var(--accent);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid #222;}
.sp-section{margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #1a1a1a;}.sp-section:last-child{border-bottom:none;margin-bottom:0;}
.sp-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;}
.sp-label{color:var(--text-dim);}.sp-val{font-weight:700;}
.v-good{color:var(--success);}.v-warn{color:var(--warning);}.v-danger{color:var(--danger);}.v-info{color:#3498db;}
.cloth-slot{padding:3px 6px;background:#111;border-radius:4px;margin-top:2px;display:flex;justify-content:space-between;align-items:center;font-size:0.75em;}
.cloth-slot .cs-part{color:var(--text-dim);min-width:28px;}.cloth-slot .cs-name{color:var(--text-bright);flex:1;margin:0 6px;}.cloth-slot .cs-stat{font-size:0.7em;margin-left:3px;}.cloth-slot.wet{background:#1a2530;border-left:2px solid #3498db;}
.party-member{padding:3px 6px;background:#111;border-radius:4px;margin-top:2px;display:flex;justify-content:space-between;align-items:center;font-size:0.75em;}
.party-member .pm-name{font-weight:700;color:var(--text-bright);}.party-member .pm-skill{font-size:0.75em;color:var(--text-dim);margin-left:4px;}
#story-panel{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
#story-box{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-y:auto;max-height:48vh;min-height:150px;line-height:1.7;font-size:0.82em;}
#story-box::-webkit-scrollbar{width:4px;}#story-box::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
.msg{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #1a1a1a;animation:fadeIn 0.4s;}
.msg.ai{color:#c9b1ff;}.msg.system{color:var(--text-dim);font-size:0.72em;font-style:italic;}
.msg.action{color:var(--accent);font-size:0.72em;}.msg.medical{color:#ff8888;font-size:0.72em;border-left:2px solid var(--danger);padding-left:8px;}
.msg.camp{color:#ffbb88;font-size:0.72em;border-left:2px solid var(--warning);padding-left:8px;}
.msg.party{color:#88ccff;font-size:0.72em;border-left:2px solid #3498db;padding-left:8px;}
.msg.weather{color:#aaddaa;font-size:0.72em;border-left:2px solid var(--success);padding-left:8px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
#choices-area{display:flex;flex-direction:column;gap:5px;}
.choice-btn{width:100%;text-align:left;padding:9px 12px;background:#111;border:1px solid #2a2a2a;border-radius:6px;color:var(--text);font-size:0.78em;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans SC',sans-serif;}
.choice-btn:hover{border-color:var(--accent);background:#1a1a1a;color:#fff;}.choice-btn:active{transform:scale(0.98);}.choice-btn:disabled{opacity:0.3;cursor:not-allowed;}
#bottom{display:flex;gap:6px;padding:4px 10px 10px;max-width:1100px;margin:0 auto;justify-content:center;flex-wrap:wrap;align-items:center;}
.btn{font-family:'Orbitron',sans-serif;font-size:0.6em;font-weight:700;letter-spacing:1px;padding:7px 14px;border:2px solid var(--accent);background:transparent;color:var(--accent);border-radius:6px;cursor:pointer;transition:all 0.3s;text-transform:uppercase;}
.btn:hover{background:var(--accent);color:#000;box-shadow:0 0 14px rgba(255,107,53,0.25);}.btn:active{transform:scale(0.96);}.btn.primary{background:var(--accent);color:#000;}
.btn.primary:hover{box-shadow:0 0 20px rgba(255,69,0,0.35);}.btn.small{padding:4px 8px;font-size:0.5em;}.btn:disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}
#status-line{text-align:center;font-size:0.65em;color:var(--warning);min-height:16px;padding:0 10px;}
#inv-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center;font-size:0.68em;color:var(--text-dim);}
.inv-chip{padding:2px 7px;background:#111;border:1px solid #2a2a2a;border-radius:10px;cursor:pointer;transition:all 0.2s;white-space:nowrap;font-size:0.72em;}
.inv-chip:hover{border-color:var(--accent);color:#fff;}.inv-chip.usable{border-color:#3a5a3a;}
#modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;justify-content:center;align-items:center;}
#modal-overlay.active{display:flex;}
#modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;max-width:400px;width:90%;max-height:80vh;overflow-y:auto;}
#modal h3{font-family:'Orbitron',sans-serif;color:var(--accent);margin-bottom:6px;letter-spacing:2px;font-size:0.8em;}
#modal .wound-card{padding:6px 8px;background:#111;border-radius:4px;margin-bottom:5px;border-left:3px solid var(--danger);font-size:0.72em;line-height:1.4;}
#modal .wound-card.bandaged{border-left-color:#888;opacity:0.7;}.wound-card.infected{border-left-color:#b44;}
#modal .treatment-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
#modal .treatment-btn{font-size:0.62em;padding:3px 7px;border:1px solid var(--success);background:transparent;color:var(--success);border-radius:4px;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans SC',sans-serif;}
#modal .treatment-btn:hover{background:var(--success);color:#000;}
#modal .btn-row{display:flex;gap:5px;justify-content:flex-end;margin-top:8px;}
#death-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(100,0,0,0.93);z-index:200;justify-content:center;align-items:center;flex-direction:column;}
#death-overlay.active{display:flex;}
#death-overlay h2{font-family:'Orbitron',sans-serif;font-size:2.2em;color:#fff;letter-spacing:8px;margin-bottom:4px;}
#death-overlay .death-info{color:#ffaaaa;margin:6px 20px;text-align:center;line-height:1.7;max-width:460px;font-size:0.8em;}
#death-overlay .death-days{color:#ccc;margin-bottom:12px;font-size:0.82em;}
.typing::after{content:'▊';animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<div id="header"><h1>废 土 纪 元</h1><div class="sub">W A S T E L A N D &nbsp; S U R V I V A L</div></div>

<div id="info-bar">
  <div class="info-chip"><span class="ic-emoji" id="ib-se-icon">🌸</span><span id="ib-season">春</span><span>第</span><span class="ic-val" id="ib-day">1</span><span>天</span></div>
  <div class="info-chip"><span class="ic-emoji" id="ib-biome-icon">🏘️</span><span id="ib-biome">郊区</span></div>
  <div class="info-chip"><span class="ic-emoji">🕐</span><span class="ic-val" id="ib-time">08:00</span></div>
  <div class="info-chip"><span>🌡️</span><span class="ic-val" id="ib-temp">22</span><span>°C</span></div>
  <div class="info-chip"><span>💧</span><span class="ic-val" id="ib-hum">55</span><span>%</span></div>
  <div class="info-chip" id="ib-precip-chip"><span class="ic-emoji" id="ib-precip-icon">☀️</span><span class="ic-val" id="ib-precip">晴</span></div>
  <div class="info-chip"><span>💨</span><span class="ic-val" id="ib-wind">微风</span></div>
  <div class="info-chip"><span>📍</span><span>距营地</span><span class="ic-val" id="ib-dist">0</span><span>km</span></div>
  <div class="info-chip" id="ib-camp-chip"><span class="ic-emoji">🏕️</span><span class="ic-val" id="ib-camp-status">在营地</span></div>
  <div class="info-chip"><span class="ic-emoji">👥</span><span>小队</span><span class="ic-val" id="ib-party">1</span><span>人</span></div>
  <div class="info-chip"><span class="ic-emoji" id="ib-rep-icon">🌱</span><span id="ib-rep">无名</span></div>
  <div class="info-chip" id="ib-fire-chip" style="display:none"><span class="ic-emoji">🔥</span><span>篝火</span></div>
</div>

<div id="main">
  <div id="left-col">
    <div id="char-container">
      <div id="char-title">🫀 身体状况</div>
      <div id="status-fx" style="font-size:0.65em;text-align:left;padding:2px 6px;min-height:18px;"></div>
      <svg id="char-svg" viewBox="0 0 120 240" xmlns="http://www.w3.org/2000/svg">
        <ellipse id="bp-head" class="bp bp-healthy" cx="60" cy="24" rx="18" ry="22" stroke-width="1.5"/><circle cx="55" cy="20" r="2" fill="#1a1a1a"/><circle cx="65" cy="20" r="2" fill="#1a1a1a"/><path d="M55 32 Q60 36 65 32" fill="none" stroke="#1a1a1a" stroke-width="1"/><rect id="bp-neck" class="bp bp-healthy" x="54" y="44" width="12" height="8" rx="2" stroke-width="1"/>
        <path id="bp-chest" class="bp bp-healthy" d="M42 52 Q38 52 36 60 L32 120 Q32 130 40 134 L80 134 Q88 130 88 120 L84 60 Q82 52 78 52 Z" stroke-width="1.5"/>
        <path id="bp-leftArm" class="bp bp-healthy" d="M40 54 L20 72 Q14 78 15 96 L16 112 Q17 118 22 120 L26 120 Q28 118 28 113 L27 96 Q28 82 34 74 L42 64 Z" stroke-width="1.5"/><ellipse cx="23" cy="124" rx="7" ry="5" fill="#3d4a3d" stroke="#4a5a4a" stroke-width="1"/>
        <path id="bp-rightArm" class="bp bp-healthy" d="M80 54 L100 72 Q106 78 105 96 L104 112 Q103 118 98 120 L94 120 Q92 118 92 113 L93 96 Q92 82 86 74 L78 64 Z" stroke-width="1.5"/><ellipse cx="97" cy="124" rx="7" ry="5" fill="#3d4a3d" stroke="#4a5a4a" stroke-width="1"/>
        <path id="bp-leftLeg" class="bp bp-healthy" d="M44 132 L38 148 Q34 164 32 184 L30 210 Q30 220 36 222 L45 224 Q52 224 51 218 L50 184 Q49 164 54 148 L60 134 Z" stroke-width="1.5"/><ellipse cx="41" cy="228" rx="10" ry="4.5" fill="#3d4a3d" stroke="#4a5a4a" stroke-width="1"/>
        <path id="bp-rightLeg" class="bp bp-healthy" d="M76 132 L82 148 Q86 164 88 184 L90 210 Q90 220 84 222 L75 224 Q68 224 69 218 L70 184 Q71 164 66 148 L60 134 Z" stroke-width="1.5"/><ellipse cx="79" cy="228" rx="10" ry="4.5" fill="#3d4a3d" stroke="#4a5a4a" stroke-width="1"/>
        <circle id="drip-head" class="blood-drip" cx="60" cy="48" r="2" fill="#f00" display="none"/><circle id="drip-chest" class="blood-drip" cx="60" cy="136" r="2" fill="#f00" display="none"/><circle id="drip-leftArm" class="blood-drip" cx="23" cy="126" r="2" fill="#f00" display="none"/><circle id="drip-rightArm" class="blood-drip" cx="97" cy="126" r="2" fill="#f00" display="none"/><circle id="drip-leftLeg" class="blood-drip" cx="41" cy="230" r="2" fill="#f00" display="none"/><circle id="drip-rightLeg" class="blood-drip" cx="79" cy="230" r="2" fill="#f00" display="none"/>
      </svg>
      <div id="bp-tooltip" class="bp-tooltip"></div>
    </div>
    <div class="side-panel"><div class="sp-title">💉 生命体征</div><div id="vitals-list"></div></div>
    <div class="side-panel">
      <div class="sp-title">🧥 穿着 <span style="font-weight:400;font-size:0.7em;color:var(--text-dim)" id="cloth-warmth"></span></div>
      <div id="clothing-list"></div>
      <div style="margin-top:3px;font-size:0.7em;color:var(--text-dim)">💦 身体湿度: <span id="body-wetness">0%</span></div>
      <div style="font-size:0.7em;color:var(--text-dim)">🔥 体感温度: <span id="feels-like">22°C</span></div>
    </div>
    <div class="side-panel">
      <div class="sp-title">🏕️ 营地 & 👥 小队</div>
      <div class="sp-section"><div class="sp-row"><span class="sp-label">营地状态</span><span id="cp-condition" class="v-good">完好</span></div><div class="sp-row"><span class="sp-label">防御</span><span id="cp-defense">无</span></div><div class="sp-row"><span class="sp-label">仓库</span><span id="cp-supplies">0件</span></div></div>
      <div class="sp-section"><div id="party-list"></div></div>
    </div>
  </div>
  <div id="story-panel"><div id="story-box"></div><div id="choices-area"></div></div>
  <div id="right-bar"></div>
</div>

<div id="status-line"></div>
<div id="bottom">
  <div id="inv-row">🎒<span style="color:var(--text-dim)">随身:</span></div>
</div>

<div id="modal-overlay"><div id="modal"></div></div>
<div id="death-overlay"><h2>💀 你死了</h2><div class="death-days"></div><div class="death-info"></div><button class="btn primary" onclick="resetGame()">🔄 重新开始</button></div>

<script>
// ============================================================
// 废土纪元 — 完全内置，百种物资 + 百种事件
// ============================================================
const BODY_PARTS=['head','chest','leftArm','rightArm','leftLeg','rightLeg'];
const PL={head:'头部',chest:'躯干',leftArm:'左臂',rightArm:'右臂',leftLeg:'左腿',rightLeg:'右腿'};
const SEASONS=[
  {id:'spring',name:'春',icon:'🌸',baseTemp:{min:8,max:22},tempRange:[5,28],humRange:[40,80],rainChance:0.25,dayLen:{rise:6,set:19}},
  {id:'summer',name:'夏',icon:'☀️',baseTemp:{min:20,max:38},tempRange:[15,45],humRange:[30,90],rainChance:0.20,dayLen:{rise:5,set:20}},
  {id:'autumn',name:'秋',icon:'🍂',baseTemp:{min:5,max:20},tempRange:[0,25],humRange:[35,75],rainChance:0.30,dayLen:{rise:6,set:18}},
  {id:'winter',name:'冬',icon:'❄️',baseTemp:{min:-15,max:3},tempRange:[-25,8],humRange:[20,60],rainChance:0.15,snowChance:0.30,dayLen:{rise:8,set:16}},
];

// ===== 生物群系 =====
const BIOMES=[
  {id:'city_center',name:'市中心',icon:'🏙️',desc:'高楼林立危机四伏，物资密集但掠夺者横行',food:3,water:2,danger:8,materials:6,sp:[{n:'电子零件',q:[1,3]},{n:'武器零件',q:[1,2]},{n:'弹药',q:[1,3]}]},
  {id:'suburb',name:'郊区',icon:'🏘️',desc:'居民区废墟，物资分散但相对安全',food:5,water:4,danger:4,materials:5,sp:[{n:'罐头',q:[1,3]},{n:'工具',q:[1,1]},{n:'布料',q:[1,2]}]},
  {id:'farmland',name:'农田',icon:'🌾',desc:'开阔农业区，食物充沛但缺乏其他物资',food:9,water:5,danger:3,materials:3,sp:[{n:'种子',q:[1,3]},{n:'罐头',q:[2,4]},{n:'变异兽肉',q:[1,3]}]},
  {id:'desert',name:'沙漠',icon:'🏜️',desc:'干旱贫瘠，水和食物极度匮乏',food:1,water:1,danger:6,materials:2,sp:[{n:'电池',q:[1,2]},{n:'金属片',q:[1,3]},{n:'机油',q:[1,2]}]},
  {id:'forest',name:'森林',icon:'🌲',desc:'茂密森林木材丰富，有水源但野兽出没',food:4,water:6,danger:5,materials:7,sp:[{n:'木材',q:[2,5]},{n:'草药',q:[1,2]},{n:'蘑菇干',q:[1,3]}]},
  {id:'mountain',name:'山区',icon:'⛰️',desc:'崎岖山地易守难攻，矿产丰富',food:2,water:3,danger:4,materials:8,sp:[{n:'金属片',q:[2,4]},{n:'铁皮',q:[1,2]},{n:'武器零件',q:[1,2]}]},
  {id:'wasteland',name:'辐射荒原',icon:'☢️',desc:'重度辐射区遗物遍地，但空气都在杀人',food:2,water:2,danger:9,materials:4,sp:[{n:'防辐射药',q:[1,2]},{n:'军用口粮',q:[1,3]},{n:'电子零件',q:[2,5]}]},
  {id:'coast',name:'海岸',icon:'🌊',desc:'海边废墟，可捕鱼但海风潮湿寒冷',food:6,water:3,danger:5,materials:3,sp:[{n:'鱼干',q:[1,3]},{n:'净水',q:[1,2]},{n:'绳子',q:[1,2]}]},
];

// ===== 营地治理 =====
const GOVERN_TYPES={
  dictatorship:{name:'独裁',icon:'👑',desc:'你一人说了算。效率高但民心不稳。',loyaltyDecay:2,decisionBonus:'可直接决定所有事务'},
  democracy:{name:'民主',icon:'🗳️',desc:'集体决策。民心稳定但决策缓慢。',loyaltyDecay:0,loyaltyGrowth:2,decisionBonus:'重大决定需队友投票'},

  {id:'survivor_campfire',cat:'npc',ctx:{minDist:3,maxDist:12},narr:'远处升起了炊烟。走近发现是几个幸存者围坐在篝火旁。他们看起来疲惫但友好，朝你招手示意可以过来一起取暖。',

  {id:'radioactive_pool',cat:'danger',ctx:{minDist:4,maxDist:16},narr:'前方出现了一个荧光绿色的水潭。水面上飘着奇异的雾气，空气中弥漫着刺鼻的金属味。盖革计数器疯狂作响。',

  {id:'old_warehouse',cat:'discovery',ctx:{minDist:5,maxDist:15},narr:'一座废弃的大型仓库矗立在荒野中。卷帘门半开着，里面黑暗中隐约能看到堆叠的货架。这是一座未被完全搜刮的宝藏。',

  {id:'military_checkpoint',cat:'discovery',ctx:{minDist:6,maxDist:18},narr:'战前军方设置的一个检查站出现在眼前。沙袋工事后面能看到弹药箱和一些武器零件散落。这里似乎发生过激烈交火。',

  {id:'landslide',cat:'danger',ctx:{minDist:5,maxDist:15,weather:['rain','heavy_rain']},narr:'连续的雨水让前方的山坡变得松软。突然，一阵轰隆声响起——山体滑坡！石块和泥土朝着你的方向滚滚而来。',

  {id:'solar_panels',cat:'discovery',ctx:{minDist:4,maxDist:14,day:true},narr:'一栋建筑的屋顶上安装着几块太阳能板，在阳光下熠熠生辉。连接线缆虽然老旧但看起来还能用。这可是珍贵的电力来源。',
    choices:[{text:'爬上去拆卸太阳能板',eff:{fatigue:12},items:[{n:'太阳能板',q:[1,2]},{n:'电子零件',q:[1,2]}]},{text:'检查连接设备',eff:{fatigue:6},items:[{n:'电池',q:[1,3]}]},{text:'太危险了',eff:{}}]},

  // === 远距离探索 (12-20km) ===
  {id:'hospital_ruins',cat:'discovery',ctx:{minDist:10,maxDist:20},narr:'一座废弃的战前医院耸立在远处。虽然大部分建筑已经坍塌，但药房区域似乎还保存完好。这里是医疗物资的天堂。',

  {id:'bandit_ambush',cat:'danger',ctx:{minDist:8,maxDist:20},narr:'嗖——一支箭矢擦过耳边钉在了旁边的墙上！三个掠夺者从废墟高处朝你射击。他们早就发现了你，一直在等你进入射程。',

  {id:'underground_bunker',cat:'discovery',ctx:{minDist:10,maxDist:20},narr:'地面上一个厚厚的铁门引起了你的注意。打开后，一条向下的楼梯通向一个战前建造的地下掩体。电力系统居然还在运作。',

      {w:3,eff:{fatigue:10},items:[{n:'罐头',q:[1,2]}],desc:'掩体深处传来奇怪的声响——有什么东西在里面。你不想冒险，匆匆拿了些物资就离开了。'},
    ]},{text:'保持警惕慢慢搜索',outcomes:[
      {w:5,eff:{fatigue:8},items:[{n:'罐头',q:[2,3]},{n:'净水',q:[1,2]}],desc:'你的谨慎得到了回报——在入口附近就找到了足够的物资，没有触发任何潜在的陷阱。'},
      {w:3,eff:{fatigue:8},items:[{n:'罐头',q:[1,1]}],desc:'花了不少时间检查每个角落，但安全第一。找到的物资不多，好在毫发无伤。'},
      {w:2,eff:{fatigue:8},desc:'你在掩体里遇到了一只变异老鼠——它被你的出现吓到，慌不择路地跑进了深处。你们俩都空手而归。'},
    ]},{text:'这里可能有人住',eff:{},outcome:'你注意到墙角有新鲜的脚印和没燃尽的蜡烛。这里确实有人——也许是暂时离开了。你决定不惹麻烦快速离开。'}]},
  {id:'radiation_storm',cat:'danger',ctx:{minDist:5,maxDist:20,weather:['sandstorm']},narr:'天空变成了诡异的橙色。辐射风暴即将来临——狂风夹带着发光的辐射尘埃，铺天盖地地席卷而来。你必须立刻寻找掩护！',
    choices:[{text:'冲进最近的建筑',eff:{fatigue:10,health:-8}},{text:'用衣服遮盖口鼻趴下',eff:{fatigue:5,health:-15}},{text:'服用防辐射药硬抗',eff:{health:-5},need:'防辐射药'}]},
  {id:'wasteland_beast',cat:'danger',ctx:{minDist:10,maxDist:20},narr:'地面震动——一只三层楼高的巨型变异生物从废墟中站起。它似乎没有注意到你，但每走一步都在震动大地。这是废土的真正统治者。',
    choices:[{text:'躲在废墟中等它离开',eff:{fatigue:8}},{text:'观察它的行动路线',eff:{fatigue:3,morale:-3}},{text:'冒险绕过继续前进',eff:{fatigue:12}}]},

  // === 夜间事件 ===
  {id:'night_howl',cat:'danger',ctx:{night:true},narr:'夜幕中传来狼嚎——或者是什么更可怕的生物的叫声。声音此起彼伏，似乎在互相交流。它们正在靠近。',

  {id:'stranger_night',cat:'npc',ctx:{night:true,minDist:0,maxDist:10},narr:'黑暗中一个人影踉踉跄跄地朝你走来。借着月光，你看到这是一个受了伤的幸存者，身上有明显的咬伤。"帮帮我…"他的声音虚弱。',

  {id:'night_loot',cat:'discovery',ctx:{night:true,minDist:2,maxDist:12},narr:'月光下，你注意到一栋建筑的窗户里透出微弱的光——不是电灯，而是某种荧光。这种光通常意味着里面有放射性物质或发光的变异生物。',

  {id:'campfire_glow',cat:'npc',ctx:{night:true,minDist:2,maxDist:10},narr:'远处的黑暗中有一团篝火的光芒。走近后你看到两个人影围坐在火旁，烤着什么东西。香味飘过来，令人垂涎。',

  // === 天气相关事件 ===
  {id:'rain_collection',cat:'discovery',ctx:{weather:['rain','heavy_rain']},narr:'雨水顺着建筑的排水管哗哗流下。虽然是雨水，但在废土上每一滴水都弥足珍贵。你可以趁机收集大量用水。',

  {id:'lightning_strike',cat:'danger',ctx:{weather:['heavy_rain']},narr:'一道闪电劈在不远处的一棵枯树上，瞬间点燃了树干。在暴雨中形成一个诡异的火柱。附近建筑的金属结构嗡嗡作响。',

  {id:'snow_shelter',cat:'discovery',ctx:{weather:['snow'],seasons:['winter']},narr:'大雪覆盖了一切。你发现了一处被积雪半掩的洞穴。进入后，里面干燥温暖——似乎有地热活动。这是冬季废土上难得的避风港。',

  // === 营地事件 ===

    choices:[{text:'给他绷带换罐头',items:[{n:'绷带',q:[-1,-2]},{n:'罐头',q:[2,3]}]},{text:'给医疗包换更多物资',items:[{n:'医疗包',q:[-1,-1]},{n:'罐头',q:[3,4]},{n:'净水',q:[1,2]}]},{text:'免费帮他治疗',eff:{morale:10},items:[{n:'绷带',q:[-1,-1]}]}]},

  {id:'camp_garden',cat:'camp',ctx:{atCamp:true,seasons:['spring','summer']},narr:'营地角落的土地看起来可以开垦。你还保留着一些种子，也许可以试着种点什么——虽然废土的土壤可能已经被污染。',

  // === 受伤相关事件 ===

  {id:'school_ruins',cat:'discovery',ctx:{minDist:4,maxDist:16},narr:'一所废弃学校的残骸。教室里的桌椅散乱，黑板上还留着战前最后的板书。图书馆和医务室可能还有值得搜刮的东西。',

  {id:'river_crossing',cat:'danger',ctx:{minDist:5,maxDist:18},narr:'一条湍急的河流挡住了去路。桥梁早已坍塌，剩下的桥墩上锈迹斑斑。河对岸隐约能看到一些建筑和物资。',

  {id:'sandstorm_coming',cat:'danger',ctx:{weather:['sandstorm']},narr:'远处地平线上升起了一道巨大的沙墙——沙尘暴正在逼近。狂风夹杂着带辐射的沙粒，能见度骤降到几乎为零。',

  {id:'friendly_encounter',cat:'npc',ctx:{minDist:2,maxDist:14},narr:'一个年轻的幸存者从废墟中探出头。"嘿！你也是单独行动的吗？废土上独自生存太难了。也许我们可以结伴？"他眼中充满了渴望。',

      {w:5,eff:{},desc:'他欣喜若狂地跟上了你。多一个人多一份力——废土上，同伴比黄金更珍贵。',recruit:true},

      {w:5,eff:{},items:[{n:'罐头',q:[-1,-1]}],desc:'你把一罐罐头递给他。他感激地接过去，眼眶有点湿润。"谢谢你，好心人。我会记住的。"'},
      {w:3,eff:{},items:[{n:'罐头',q:[-1,-1]}],desc:'他接过罐头后犹豫了一下，从口袋里掏出一张皱巴巴的地图。"这个可能对你有用..."'},
      {w:2,eff:{},items:[{n:'罐头',q:[-1,-1]}],desc:'他拿了罐头后头也不回地走了。连声谢谢都没有——这就是废土，不是每个人都有感恩的心。'},
    ]},{text:'拒绝他自己走了',outcomes:[
      {w:6,eff:{},desc:'你摇了摇头继续前行。废土上不能随便相信陌生人——这个道理你早就学会了。'},

    ]}]},
  {id:'food_trap',cat:'danger',ctx:{minDist:3,maxDist:12},narr:'一间小屋的桌上摆着几罐完好的罐头，看起来像是有人遗落的。但地面有不自然的痕迹——这可能是一个陷阱。',
    choices:[{text:'小心检查陷阱',outcomes:[
      {w:5,eff:{fatigue:6},items:[{n:'罐头',q:[2,3]}],desc:'你的谨慎得到了回报。你发现了绊线并安全解除，不仅拿到了桌上的罐头，还在柜子里发现了更多。'},
      {w:3,eff:{fatigue:6},desc:'检查后发现这根本不是什么陷阱——只是风吹倒了家具留下的痕迹。但桌上只有空罐子。白费力气。'},
      {w:2,eff:{fatigue:6,health:-5},desc:'你虽然发现了绊线，但触碰时引发了另一个隐藏机关。碎玻璃从天而降划破了你的手臂。没拿到罐头。'},
    ]},{text:'直接用长棍挑开',outcomes:[
      {w:4,eff:{fatigue:3},items:[{n:'罐头',q:[1,2]}],desc:'你用长棍小心翼翼地把罐头拨了过来——安全！轻松拿到了两罐。'},
      {w:4,eff:{fatigue:3,health:-3},desc:'长棍碰到了机关——啪！一个捕兽夹弹了起来，碎片溅到你腿上。还好威力不大。没拿到罐头。'},
      {w:2,eff:{fatigue:3,health:-10},desc:'轰！这不是简单的陷阱——桌子下面埋了炸药！冲击波把你掀翻在地。耳朵嗡嗡作响了好一阵。'},
    ]},{text:'陷阱太危险了',eff:{fatigue:1},outcome:'你果断放弃了这块诱饵。废土上死于贪心的人比死于饥饿的人还多。'}]},
  {id:'wounded_animal',cat:'hunt',ctx:{minDist:2,maxDist:14},narr:'一只受伤的变异鹿躺在草地上，后腿有明显的撕裂伤。它已经跑不动了，但还在挣扎着想要站起来。这是送上门的食物。',
    choices:[{text:'人道地结束它的痛苦',eff:{morale:-3},items:[{n:'变异兽肉',q:[4,8]}]},{text:'尝试救治它',eff:{morale:8,fatigue:6}},{text:'不管它继续走',eff:{}}]},
  {id:'found_map',cat:'discovery',ctx:{minDist:5,maxDist:18},narr:'一张手绘的地图被钉在墙上。上面标注了附近几个重要地点：水源、物资储藏点、危险区域。虽然有些过时，但非常有用。',
    choices:[{text:'仔细研究地图',eff:{fatigue:3},items:[{n:'地图碎片',q:[1,2]}]},{text:'按照地图去最近标记点',eff:{fatigue:8},items:[{n:'罐头',q:[1,2]},{n:'净水',q:[1,2]}]},{text:'拿走地图备用',eff:{},items:[{n:'地图碎片',q:[1,1]}]}]},

  // === 最后一批 ===
  {id:'raider_corpse',cat:'discovery',ctx:{minDist:3,maxDist:15},narr:'一个掠夺者的尸体横在路边，看样子死了大概两三天。身上的武器已经被拿走，但背包还在。',
    choices:[{text:'搜索背包',eff:{morale:-3},items:[{n:'弹药',q:[1,3]},{n:'罐头',q:[1,2]}]},{text:'埋葬尸体',eff:{morale:5,fatigue:6}},{text:'无视继续走',eff:{}}]},
  {id:'frozen_lake',cat:'danger',ctx:{minDist:5,maxDist:18,seasons:['winter']},narr:'一片冻结的湖面横跨在前方。远处湖对岸能看到一间小屋。冰面看起来很厚，但废土上的冰层可能不太稳定。',
    choices:[{text:'小心穿过冰面',eff:{fatigue:12,bodyWet:30}},{text:'绕湖一圈',eff:{fatigue:18}},{text:'测试冰层厚度',eff:{fatigue:4}}]},
  {id:'tunnel_entrance',cat:'discovery',ctx:{minDist:5,maxDist:18},narr:'一个废弃的地铁隧道入口从瓦砾中露出来。隧道深处漆黑一片，但空气中有股霉味——说明内部空间很大。',
    choices:[{text:'打手电进入探索',eff:{fatigue:14},items:[{n:'电池',q:[1,2]},{n:'工具',q:[1,2]},{n:'电子零件',q:[1,3]}]},{text:'只在入口附近搜索',eff:{fatigue:5},items:[{n:'金属片',q:[1,2]}]},{text:'太黑了不安全',eff:{}}]},
  {id:'radio_transmission',cat:'mystery',ctx:{minDist:5,maxDist:20},narr:'你的收音机突然收到了信号——一个声音在重复播放："这里是第七避难所，我们还有空间和物资。坐标在..."信号断断续续，但听起来像是真的。',
    choices:[{text:'尝试追踪信号',eff:{fatigue:8},items:[{n:'电子零件',q:[1,1]}]},{text:'记下坐标日后探索',eff:{morale:10}},{text:'可能是陷阱',eff:{}}]},
  {id:'berry_bush_field',cat:'discovery',ctx:{minDist:3,maxDist:10,seasons:['summer','autumn']},narr:'一大片野莓灌木丛。成熟的红色浆果挂满枝头，足够采摘好一阵子。几只小鸟正在啄食——说明它们是可以吃的。',
    choices:[{text:'大量采摘',eff:{fatigue:8},items:[{n:'干粮',q:[2,4]},{n:'种子',q:[1,2]}]},{text:'吃个饱',eff:{nutrition:16}},{text:'采一些带走',eff:{fatigue:3},items:[{n:'干粮',q:[1,2]}]}]},
  {id:'collapsed_bridge',cat:'danger',ctx:{minDist:5,maxDist:20},narr:'前方必经之路上的一座桥彻底坍塌了。桥下是深达数十米的峡谷。唯一的办法是从谷底绕过去或寻找其他路径。',
    choices:[{text:'冒险从峡谷边缘攀爬下去',eff:{fatigue:20,health:-5}},{text:'寻找其他路线',eff:{fatigue:12}},{text:'用工具搭建简易通道',eff:{fatigue:15},need:'工具'}]},
  // === 新增：环境威胁 ===
  {id:'toxic_smoke',cat:'danger',ctx:{minDist:3,maxDist:15,weather:['none']},narr:'前方废墟中冒出滚滚浓烟——不知是火灾还是化学泄漏。刺鼻的气味隔着老远都能闻到，浓烟正朝你的方向蔓延。',
    choices:[{text:'绕道避开浓烟区',eff:{fatigue:8}},{text:'用湿布捂住口鼻快速穿过',eff:{fatigue:6,health:-5},need:'净水'},{text:'原地等待烟雾散去',eff:{fatigue:3}}]},
  {id:'quake_aftershock',cat:'danger',ctx:{minDist:3,maxDist:18},narr:'地面突然剧烈震动——余震！附近的建筑物发出不祥的嘎吱声，碎玻璃和瓦砾从高处坠落。你必须立刻做出反应。',
    choices:[{text:'冲向开阔地带',eff:{fatigue:10}},{text:'躲在坚固的桌子或门框下',eff:{fatigue:5}},{text:'护住头部原地蹲下',eff:{fatigue:3,health:-3}}]},
  {id:'swarm_rats',cat:'danger',ctx:{minDist:2,maxDist:12,night:true},narr:'黑暗中传来窸窣声——几十只变异老鼠从下水道涌出，密密麻麻地填满了小巷。它们的眼睛在黑暗中闪着红光。',
    choices:[{text:'点燃火把驱赶',eff:{fatigue:5},need:'打火机'},{text:'爬上高处躲避',eff:{fatigue:8}},{text:'快速冲过去',eff:{health:-5,fatigue:6}}]},
  {id:'dust_storm_warning',cat:'danger',ctx:{minDist:5,maxDist:20,weather:['none']},narr:'天际线变成了一片褐色——巨大的沙尘暴正在逼近。空气中已经能闻到尘土的味道，能见度正在迅速下降。遮天蔽日的沙墙越来越近。',
    choices:[{text:'立即寻找掩体',eff:{fatigue:8}},{text:'用衣物包裹全身趴下',eff:{bodyWet:10,fatigue:3}},{text:'趁还能看到路赶紧跑',eff:{fatigue:15,health:-5}}]},
  {id:'flood_warning',cat:'danger',ctx:{minDist:3,maxDist:14,weather:['rain','heavy_rain']},narr:'连续降雨让附近的河流水位暴涨。浑浊的洪水正从上游奔涌而来，淹没了低洼地带。你现在站的位置很快也会被淹没。',
    choices:[{text:'向高处转移',eff:{fatigue:10}},{text:'涉水快速通过',eff:{bodyWet:50,fatigue:8}},{text:'寻找漂浮物',eff:{fatigue:6}}]},
  // === 新增：社交遭遇 ===
  {id:'trader_caravan',cat:'npc',ctx:{minDist:3,maxDist:15},narr:'远处传来驼铃声——一支小型贸易商队正沿着废土公路缓缓前行。三辆改装过的装甲车，车顶架着机枪。一个商人朝你挥手。"需要什么吗，幸存者？我们有武器零件和医疗用品，可以用弹药或食物来换。"',
    choices:[{text:'用弹药交换医疗用品',items:[{n:'弹药',q:[-3,-3]},{n:'医疗包',q:[1,2]},{n:'绷带',q:[2,3]}]},{text:'用罐头交换武器零件',items:[{n:'罐头',q:[-3,-3]},{n:'武器零件',q:[1,2]},{n:'弹药',q:[1,2]}]},{text:'打听情报就离开',eff:{morale:5}}]},
  {id:'refugee_family',cat:'npc',ctx:{minDist:1,maxDist:10},narr:'一家三口缩在废墟角落里——父亲、母亲和一个小女孩。他们的物资已经耗尽，小女孩饿得脸色苍白。父亲看到你，眼中闪过一丝希望。',
    choices:[{text:'分一些食物给他们',eff:{morale:15,nutrition:-8}},{text:'指引他们去你的营地',eff:{morale:10}},{text:'抱歉无法帮忙',eff:{morale:-5}}]},
  {id:'rival_scavenger',cat:'npc',ctx:{minDist:4,maxDist:16},narr:'一个全副武装的拾荒者从废墟另一侧走出来。他冷冷地盯着你，手指搭在扳机上。"这片区域是我的地盘。你最好离开。"气氛骤然紧张。',
    choices:[{text:'友好协商共享区域',eff:{fatigue:2},items:[{n:'罐头',q:[1,1]}],outcome:'你举起双手表示没有敌意。"废土够大，没必要自相残杀。"他犹豫了一下，最终放下枪。你们各自分头搜索，他还给你指了一个有物资的方向。'},{text:'展示武力不退让',eff:{fatigue:8,health:-3},outcome:'你也握紧了武器。两人对峙了几秒，他啐了一口转身走了——但你知道这种人不会善罢甘休。'},{text:'换个方向避开冲突',eff:{fatigue:3},outcome:'多一事不如少一事。你默默退出了这片区域，绕道继续前进。在废土上，活下来比面子重要。'}]},
  {id:'lost_child',cat:'npc',ctx:{minDist:1,maxDist:8},narr:'废墟中传来小孩的哭声。一个七八岁的男孩蜷缩在角落里，身上脏兮兮的，脚上只有一只鞋。他看到你时本能地缩了缩身子。"我...我找不到我妈妈了..."',
    choices:[{text:'安抚他带他回营地',outcomes:[
      {w:5,eff:{},desc:'你蹲下来轻声安慰他。孩子犹豫了一下，最终握住了你的手。在废土上挽救一个孩子——无论结果如何，这都让你觉得自己还是个人。营地现在多了一个小成员。',adoptChild:true},
      {w:3,eff:{},desc:'就在你准备带他走时，一个女人从废墟中冲了出来——是他的母亲！她紧紧抱住孩子，泣不成声。"谢谢你照顾他...这些给你。"她塞给你一些物资。',items:[{n:'罐头',q:[1,2]},{n:'净水',q:[1,1]}]},
      {w:2,eff:{health:-5},desc:'孩子突然狠狠咬了你一口，挣脱后拔腿就跑。远处传来几个成年人的笑声——这是个诱饵！你被引到了掠夺者的埋伏圈边缘。赶紧撤离。'},
    ]},{text:'给他一些食物和水',outcomes:[
      {w:5,eff:{nutrition:-3},desc:'孩子狼吞虎咽地吃着，脸上终于有了一丝血色。他指了指一个方向说妈妈往那边走了。你把他留在一个相对安全的地方，留下了一些食物。'},
      {w:3,eff:{nutrition:-3},desc:'他吃完后沉默了一会儿，然后从口袋里掏出一个小东西递给你——是一枚战前的徽章。虽然没什么用，但这是他最珍贵的东西了。'},
      {w:2,eff:{nutrition:-3},desc:'食物刚递过去，几个成年人突然从拐角冲出来——又是个陷阱！他们抢走了你身上的一些物资后带着孩子跑了。',lose:1},
    ]},{text:'帮他寻找母亲',outcomes:[
      {w:4,eff:{fatigue:10},items:[{n:'罐头',q:[1,2]}],desc:'你带着孩子在废墟中找了几个小时。没有找到他的母亲，但在一栋废弃公寓里发现了一些物资。你把孩子带回了营地——至少这里有篝火和食物。',adoptChild:true},
      {w:3,eff:{fatigue:8},desc:'搜索无果。孩子累了，靠在你肩上睡着了。你在黄昏前返回了营地。也许明天可以继续找。'},
      {w:3,eff:{fatigue:12,health:-5},wound:{part:'leftLeg',sev:2,desc:'从二楼摔下扭伤了左腿',bleed:false},desc:'搜寻时你踩到了一块松动的楼板，从二楼摔了下去。孩子吓坏了但没受伤。你的左腿扭伤了，走路一瘸一拐。'},
    ]}]},
  {id:'radio_distress',cat:'mystery',ctx:{minDist:5,maxDist:20},narr:'收音机里突然传来紧急呼叫——"这里是第七医疗队，我们有重伤员，需要紧急援助！重复，需要紧急援助！坐标是..."信号来自西北方向大约三公里处。',
    choices:[{text:'赶往信号源救人',eff:{fatigue:12,morale:10}},{text:'谨慎靠近先观察',eff:{fatigue:6}},{text:'可能是掠夺者的陷阱',eff:{}}]},
  // === 新增：神秘/发现 ===
  {id:'prewar_lab',cat:'discovery',ctx:{minDist:8,maxDist:20},narr:'一栋不起眼的建筑后面隐藏着一个战前生物实验室的入口。门上贴着生物危害标志，但已经被人撬开过。里面可能还有有价值的医疗和研究设备。',
    choices:[{text:'穿防护装备进入',eff:{fatigue:12},items:[{n:'医疗包',q:[1,3]},{n:'抗生素',q:[1,2]},{n:'防辐射药',q:[1,2]}]},{text:'只在门口搜索',eff:{fatigue:5},items:[{n:'绷带',q:[1,2]}]},{text:'太危险了放弃',eff:{}}]},
  {id:'working_vending',cat:'discovery',ctx:{minDist:3,maxDist:14},narr:'一台奇迹般还在运作的自动售货机孤零零地立在废墟中。屏幕闪烁着微弱的蓝光，里面还有不少存货。看来有人用电池给它供过电。',
    choices:[{text:'用工具撬开取货',eff:{fatigue:5},items:[{n:'罐头',q:[1,3]},{n:'能量饮料',q:[1,2]}]},{text:'检查电路看能否利用',eff:{fatigue:8},items:[{n:'电池',q:[1,2]},{n:'电子零件',q:[1,2]}]},{text:'留作纪念走了',eff:{}}]},
  {id:'strange_lights',cat:'mystery',ctx:{minDist:6,maxDist:20,night:true},narr:'夜空中出现了奇异的蓝绿色光带，像是极光但更近。光带在地平线上缓缓飘动，照亮了整片废墟。空气中弥漫着微弱的臭氧味。',
    choices:[{text:'朝光源方向探索',eff:{fatigue:10,morale:5},items:[{n:'电子零件',q:[1,2]}]},{text:'远远观察记录',eff:{morale:8}},{text:'可能是辐射现象远离',eff:{}}]},
  {id:'graffiti_clue',cat:'mystery',ctx:{minDist:2,maxDist:14},narr:'墙上有一幅新鲜的涂鸦——箭头指向东边，下方写着"安全区域，有净水"。字迹还很新，大概是最近几天画的。但这可能是善意指引，也可能是陷阱。',
    choices:[{text:'按照指引探索',eff:{fatigue:6},items:[{n:'净水',q:[1,3]}]},{text:'反方向探索',eff:{fatigue:6}},{text:'无视继续原路线',eff:{}}]},
  {id:'old_bunker_door',cat:'discovery',ctx:{minDist:7,maxDist:20},narr:'一个厚重的圆形钢门半埋在土里——这是战前政府建造的防辐射掩体。门上装有密码锁，但旁边有人用喷漆写下了密码。里面可能保存着完好的战前物资。',
    choices:[{text:'输入密码打开',eff:{fatigue:14},items:[{n:'军用口粮',q:[2,5]},{n:'净水',q:[2,4]},{n:'武器零件',q:[1,3]},{n:'急救手册',q:[1,1]}]},{text:'小心检查是否有警报',eff:{fatigue:6},items:[{n:'罐头',q:[1,2]}]},{text:'门太重了打不开',eff:{}}]},
  // === 新增：营地事件 ===
  {id:'camp_weatherproof',cat:'camp',ctx:{atCamp:true,weather:['rain','heavy_rain']},narr:'雨水从营地屋顶的裂缝滴落。几处漏水让地面变得泥泞。趁雨还没下大，也许该修补一下屋顶和防水。',
    choices:[{text:'用防水布修补屋顶',eff:{fatigue:8},need:'防水布'},{text:'用木材临时加固',eff:{fatigue:6},need:'木材'},{text:'等雨停了再说',eff:{bodyWet:10}}]},
  {id:'camp_strange_sound',cat:'camp',ctx:{atCamp:true,night:true},narr:'夜深了，营地外传来奇怪的声音——不是野兽，更像是金属刮擦的声响。有什么东西在营地外围游荡。篝火的光芒似乎让它不敢靠近。',
    choices:[{text:'拿起武器出去查看',outcomes:[
      {w:3,eff:{fatigue:8},items:[{n:'金属片',q:[1,3]}],desc:'原来是一只变异穿山甲在翻垃圾。你赶走了它，还在它刨过的地方找到了几块废金属。'},
      {w:4,eff:{fatigue:8},desc:'你举着火把在营地外转了一圈——什么都没发现。可能是风声，也可能是什么东西已经跑了。'},
      {w:3,eff:{fatigue:8,health:-8},desc:'黑暗中一个黑影扑了过来！你和一个变异犬缠斗了几个回合，虽然赶走了它但手臂被咬了一口。'},
    ]},{text:'往篝火里加柴保持明亮',outcomes:[
      {w:5,eff:{fatigue:2},desc:'你往篝火里添了几根木柴，火焰蹿得更高了。外面的声音渐渐远去——光明是废土最好的护身符。',need:'木材'},
      {w:5,eff:{fatigue:3},desc:'没有木柴可加。你只能握紧武器盯着黑暗，祈祷篝火撑到天亮。声音在半小时后消失了。'},
    ]},{text:'待在营地不出声',outcomes:[
      {w:5,eff:{},desc:'你屏住呼吸一动不动。半小时后，声音渐渐远去。不管那是什么，它没有发现你。'},
      {w:3,eff:{},lose:1,desc:'第二天早上，你发现营地外围的一些物资不见了。看来那东西是来觅食的——而你的物资刚好在它的菜单上。'},
      {w:2,eff:{health:-5},desc:'半夜的时候那个东西摸进了营地——一只变异獾。它咬伤了你的小腿后逃走了。伤口需要处理。'},

// ===== HELPERS =====
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function randF(min,max){return Math.random()*(max-min)+min;}
function pick(arr){return arr[rand(0,arr.length-1)];}
function pickW(items){const t=items.reduce((s,i)=>s+(i.w||1),0);let r=Math.random()*t;for(const it of items){r-=(it.w||1);if(r<=0)return it;}return items[items.length-1];}
function atCamp(){return S.distance<=0;}
function isDaytime(){const s=S.season||SEASONS[0];return S.hour>=s.dayLen.rise&&S.hour<s.dayLen.set;}
function isNight(){return!isDaytime();}
function timeString(){return String(S.hour).padStart(2,'0')+':'+String(S.minute).padStart(2,'0');}

// ===== INJURY DEBUFFS =====
function getInjuryDebuffs(){
  const d={cantLeave:false,cantLeaveReason:'',slotPenalty:0,fatigueExtra:0,needSurgery:false,needSplint:[],needBrace:[]};
  for(const pid of BODY_PARTS){
    const ws=S.body[pid].wounds;if(ws.length===0)continue;
    const maxSev=Math.max(...ws.map(w=>w.severity));
    const hasBleed=ws.some(w=>w.bleeding&&!w.bandaged);
    // Legs: severe wounds prevent leaving camp
    if((pid==='leftLeg'||pid==='rightLeg')&&maxSev>=2){d.cantLeave=true;d.cantLeaveReason=`${PL[pid]}重伤，无法行走`;if(!ws.every(w=>w.bandaged&&w.cleaned))d.needSplint.push(pid);}
    // Chest: severe wounds prevent leaving + need surgery
    if(pid==='chest'&&maxSev>=3){d.cantLeave=true;d.cantLeaveReason='胸部重伤，必须手术治疗';d.needSurgery=true;}
    if(pid==='chest'&&maxSev>=2){d.cantLeave=true;d.cantLeaveReason='胸部受伤，不宜行动';}
    // Arms: reduce slots + need brace
    if((pid==='leftArm'||pid==='rightArm')&&maxSev>=2){d.slotPenalty+=1;d.fatigueExtra+=3;if(!ws.every(w=>w.bandaged&&w.cleaned))d.needBrace.push(pid);}
    if((pid==='leftArm'||pid==='rightArm')&&maxSev>=1){d.fatigueExtra+=2;}
    // Head: minor effects
    if(pid==='head'&&maxSev>=2){d.fatigueExtra+=4;}
  }
  return d;
}

// ===== INVENTORY (with backpack slots) =====
function maxSlots(){let s=S.backpackSlots;if(hasItem('背包',1))s+=3;if(S.fatigue>70)s-=1;s-=getInjuryDebuffs().slotPenalty;return Math.max(1,s);}
function addItem(name,qty,toCamp=false){
  if(!name||qty<=0)return;const store=toCamp?S.camp.supplies:S.inventory;
  if(!toCamp&&Object.keys(S.inventory).length>=maxSlots()&&!S.inventory[name]){
    // Bag full - auto-store to camp if at camp, otherwise drop
    if(atCamp()){addItem(name,qty,true);setStatus(`背包满了，「${name}」已存入营地仓库`);return;}
    addStory(`⚠️ <strong>背包已满(${maxSlots()}格)！</strong>「${name}」无法携带。${atCamp()?'存入营地仓库吧。':'丢弃或使用一些物品腾出空间。'}`,'danger');setStatus(`背包满了！无法获取「${name}」`);return;
  }
  const info=ITEMS[name]||{};
  if(!store[name])store[name]={qty:0,e:info.e||'📦',d:info.d||'',cat:info.cat||'misc',clothing:!!info.slot,med:!!info.med,usable:!!info.use};
  store[name].qty+=qty;
}
function removeItem(name,qty,fromCamp=false){const store=fromCamp?S.camp.supplies:S.inventory;if(!store[name]||store[name].qty<qty)return false;store[name].qty-=qty;if(store[name].qty<=0)delete store[name];return true;}
function hasItem(name,qty,fromCamp=false){const store=fromCamp?S.camp.supplies:S.inventory;return store[name]&&store[name].qty>=qty;}
function invCount(){return Object.values(S.inventory).reduce((s,i)=>s+i.qty,0);}
function campSCount(){return Object.values(S.camp.supplies).reduce((s,i)=>s+i.qty,0);}

// ===== WEATHER =====
function generateWeather(){
  const se=S.season||SEASONS[0];const hour=S.hour;
  const b=S.currentBiome; // biome affects weather
  const baseT=randF(se.tempRange[0],se.tempRange[1]);const timeMod=-3*Math.cos((hour-4)*Math.PI/12);
  // Biome temperature modifiers
  let bioTemp=0,bioHum=0,bioRain=1;
  if(b){if(b.id==='desert'){bioTemp=8;bioHum=-30;bioRain=0.05;}else if(b.id==='forest'){bioTemp=-2;bioHum=10;bioRain=1.5;}else if(b.id==='coast'){bioHum=5;bioRain=1.3;}else if(b.id==='mountain'){bioTemp=-5;bioRain=0.8;}else if(b.id==='wasteland'){bioTemp=3;bioRain=0.4;}}
  let temp=clamp(baseT+timeMod+randF(-3,3)+bioTemp,-30,48);
  let hum=clamp(randF(se.humRange[0],se.humRange[1])+randF(-10,10)+bioHum,10,100);
  let pt='none',pi=0,isS=false;const r=Math.random();
  let rainChance=(se.rainChance||0.2)*bioRain;let snowChance=(se.snowChance||0)*bioRain;
  if(r<rainChance+snowChance){
    if(r<rainChance){const r2=Math.random();if(r2<0.3){pt='drizzle';pi=rand(10,30);temp=clamp(temp-1,-30,48);}else if(r2<0.75){pt='rain';pi=rand(30,60);temp=clamp(temp-3,-30,48);}else{pt='heavy_rain';pi=rand(60,100);temp=clamp(temp-6,-30,48);}if(temp<2){pt='snow';isS=true;}}
    else{pt='snow';isS=true;pi=rand(20,80);temp=clamp(temp-2,-20,2);}hum=clamp(hum+20,10,100);}
  let wind,ws;const wr=Math.random();if(wr<0.4){wind='calm';ws=rand(0,8);}else if(wr<0.75){wind='breeze';ws=rand(8,20);}else if(wr<0.92){wind='strong';ws=rand(20,40);temp=clamp(temp-2,-30,48);}else{wind='gale';ws=rand(40,70);temp=clamp(temp-5,-30,48);}
  if(ws>15)temp=clamp(temp-Math.floor(ws/10),-30,48);
  let icon,desc;if(pt==='none'){icon=hour>=6&&hour<18?'☀️':'🌙';desc=wind==='calm'?'平静':wind==='breeze'?'微风徐徐':wind==='strong'?'大风呼啸':'狂风大作';}
  else if(pt==='drizzle'){icon='🌦️';desc='细雨蒙蒙';}else if(pt==='rain'){icon='🌧️';desc='雨水不断';}else if(pt==='heavy_rain'){icon='⛈️';desc='暴雨倾盆';}else if(pt==='snow'&&pi<50){icon='🌨️';desc='雪花飘落';}else{icon='❄️';desc='大雪纷飞';}
  S.weather={temperature:Math.round(temp),humidity:Math.round(hum),precipType:pt,precipIntensity:Math.round(pi),wind,windSpeed:Math.round(ws),icon,desc,isSnow:isS};
}

// ===== CLOTHING =====
function totalArmor(){let a=0;for(const s of['head','upper','lower','feet','body','hands','mask']){const c=S.clothing[s];if(c)a+=c.armor||0;}return a;}
function totalRadResist(){let r=0;for(const s of['head','upper','lower','feet','body','hands','mask']){const c=S.clothing[s];if(c)r+=c.rad||0;}return r;}
function totalWarmth(){let w=0;for(const s of['head','upper','lower','feet','body','hands','mask']){const c=S.clothing[s];if(c){w+=c.warmth;if(c.wet)w=Math.floor(w*0.4);}}return w;}
function getFeelsLike(){let t=S.weather.temperature;if(S.weather.windSpeed>15)t-=Math.floor(S.weather.windSpeed/8);if(S.bodyWetness>0)t-=Math.floor(S.bodyWetness/10);t+=Math.floor(totalWarmth()/3);if(S.hasCampfire)t+=5;return Math.round(t);}
function applyWetness(){
  const p=S.weather.precipType;if(p==='none'&&!S.hasCampfire){S.bodyWetness=clamp(S.bodyWetness-8,0,100);return;}
  let wg=0;if(p==='drizzle')wg=5;else if(p==='rain')wg=15;else if(p==='heavy_rain')wg=30;else if(S.weather.isSnow)wg=8;
  for(const s of['head','upper','lower','feet','body','hands','mask']){const c=S.clothing[s];if(!c)continue;const resist=(c.wp||0)/100;const aw=wg*(1-resist);if(aw>3&&Math.random()<aw/20)c.wet=true;else if(aw<5&&c.wet&&Math.random()<0.4)c.wet=false;}
  S.bodyWetness=clamp(S.bodyWetness+wg,0,100);if(p==='none')S.bodyWetness=clamp(S.bodyWetness-10,0,100);
  if(S.hasCampfire&&S.bodyWetness>0){S.bodyWetness=clamp(S.bodyWetness-15,0,100);for(const s of['head','upper','lower','feet'])if(S.clothing[s].wet&&Math.random()<0.5)S.clothing[s].wet=false;}
}
function updateCoreTemp(){var feels=getFeelsLike();var target=clamp(feels+1,35,39);var drift=0.3;
  // Wetness accelerates temperature change
  if(S.bodyWetness>80)drift=1.2;else if(S.bodyWetness>55)drift=0.8;else if(S.bodyWetness>25)drift=0.5;
  // Cold environment + wet = dangerous rapid cooling
  if(S.weather.temperature<5&&S.bodyWetness>40)drift*=2;
  if(S.weather.temperature<-10)drift*=1.5;
  if(S.coreTemp>target)S.coreTemp=clamp(S.coreTemp-drift,30,43);else if(S.coreTemp<target)S.coreTemp=clamp(S.coreTemp+drift*0.7,30,43);
  if(S.infectionLevel>30)S.coreTemp=clamp(S.coreTemp+0.3,30,43);
  if(S.coreTemp<34)addStory('❄️ <strong>体温过低！</strong>你开始剧烈发抖，手指失去了知觉。'+(S.bodyWetness>40?'湿透的衣服正在加速夺走你的体温！':''),'medical');
}

// ===== WOUNDS =====
function addWound(pid,severity,desc,bleeding=true){const w={id:nwid(),desc,severity:clamp(severity,1,3),bleeding,infected:false,bandaged:false,cleaned:false,turns_old:0};S.body[pid].wounds.push(w);return w;}
function getPartStatus(pid){const ws=S.body[pid].wounds;if(ws.length===0)return'healthy';let maxS=0,hB=false,hI=false,allB=true;for(const w of ws){if(!w.bandaged)allB=false;if(w.bleeding)hB=true;if(w.infected)hI=true;if(w.severity>maxS)maxS=w.severity;}if(allB&&!hI)return'bandaged';if(hI)return'infected';if(hB&&maxS>=3)return'severe';if(hB)return'wound';if(maxS>=2)return'wound';return'minor';}
function getPartCSS(pid){const m={healthy:'bp-healthy',minor:'bp-minor',wound:'bp-wound',severe:'bp-severe',infected:'bp-infected',bandaged:'bp-bandaged'};return m[getPartStatus(pid)]||'bp-healthy';}
function progressWounds(){
  let tb=0;for(const pid of BODY_PARTS)for(const w of S.body[pid].wounds){w.turns_old++;
    if(w.bleeding&&!w.bandaged)tb+=w.severity*3;
    if(!w.infected&&!w.cleaned&&!w.bandaged&&Math.random()*100<w.severity*5+w.turns_old*2){w.infected=true;addStory(`🦠 <strong>${PL[pid]}伤口感染！</strong>出现红肿化脓`,'medical');}
    if(w.infected){S.infectionLevel=clamp(S.infectionLevel+w.severity*2,0,100);}if(w.infected&&w.turns_old>6&&!w.bandaged)tb+=w.severity*1;}
  if(tb>0){S.blood=clamp(S.blood-tb,0,100);addStory(`🩸 失血 <strong>-${tb}</strong>`,'medical');}
  let tp=0;for(const pid of BODY_PARTS)for(const w of S.body[pid].wounds){tp+=w.bandaged?w.severity*2:w.severity*6;if(w.infected)tp+=8;}S.pain=clamp(tp,0,100);
  for(const pid of BODY_PARTS)S.body[pid].wounds=S.body[pid].wounds.filter(w=>{if(w.bandaged&&w.cleaned&&!w.infected&&w.turns_old>12)return false;return true;});
}
function treatWound(pid,wid,act){
  const w=S.body[pid].wounds.find(x=>x.id===wid);if(!w)return false;
  switch(act){
    case'bandage':if(!hasItem('绷带',1)&&!hasItem('止血带',1)&&!hasItem('止血粉',1))return false;removeItem(hasItem('绷带',1)?'绷带':hasItem('止血带',1)?'止血带':'止血粉',1);w.bandaged=true;w.bleeding=false;addStory(`🩹 包扎了<strong>${PL[pid]}</strong>，止住了流血。`,'medical');break;
    case'treat':if(!hasItem('医疗包',1)&&!hasItem('缝合针线',1)&&!hasItem('手术刀',1)&&!hasItem('烧伤膏',1))return false;const tn=hasItem('医疗包',1)?'医疗包':hasItem('缝合针线',1)?'缝合针线':hasItem('手术刀',1)?'手术刀':'烧伤膏';removeItem(tn,1);w.cleaned=true;w.severity=Math.max(1,w.severity-1);w.bleeding=false;w.bandaged=true;addStory(`💊 使用${tn}处理了<strong>${PL[pid]}</strong>。`,'medical');break;
    case'antibiotic':const ab=hasItem('抗生素',1)?'抗生素':hasItem('退烧药',1)?'退烧药':hasItem('抗病毒药',1)?'抗病毒药':null;if(!ab)return false;removeItem(ab,1);w.infected=false;w.cleaned=true;S.infectionLevel=clamp(S.infectionLevel-20,0,100);addStory(`💉 ${PL[pid]}使用${ab}，感染得到控制。`,'medical');break;
    case'clean':const cl=hasItem('净水',1)?'净水':hasItem('消毒酒精',1)?'消毒酒精':hasItem('碘伏',1)?'碘伏':hasItem('草药',1)?'草药':null;if(!cl)return false;removeItem(cl,1);w.cleaned=true;w.infected=false;addStory(`💧 用${cl}清洗了<strong>${PL[pid]}</strong>。`,'medical');break;
    case'painkiller':const pk=hasItem('止痛药',1)?'止痛药':hasItem('吗啡',1)?'吗啡':null;if(!pk)return false;removeItem(pk,1);S.pain=clamp(S.pain-25,0,100);addStory(`💊 服用${pk}，疼痛减轻。`,'medical');break;
    case'splint':if(!hasItem('夹板',1))return false;removeItem('夹板',1);w.bandaged=true;w.bleeding=false;w.cleaned=true;w.severity=Math.max(1,w.severity-1);addStory(`🪵 用夹板固定了<strong>${PL[pid]}</strong>，恢复速度加快。`,'medical');break;
    case'brace':if(!hasItem('支架',1))return false;removeItem('支架',1);w.bandaged=true;w.bleeding=false;w.cleaned=true;w.severity=Math.max(1,w.severity-1);addStory(`🔩 用支架固定了<strong>${PL[pid]}</strong>，恢复速度加快。`,'medical');break;
    default:return false;
  }return true;
}

// ===== CAMP =====
function buildCampfire(){if(!hasItem('木材',2)&&!hasItem('打火机',1)){setStatus('需要木材×2 或 打火机来生篝火');return;}if(hasItem('打火机',1)&&!hasItem('木材',1)&&!hasItem('书籍',1)){setStatus('需要燃料（木材或书籍）');return;}const fuel=hasItem('木材',1)?'木材':hasItem('书籍',1)?'书籍':null;if(fuel)removeItem(fuel,1);if(hasItem('打火机',1)){/*keep lighter*/}else if(hasItem('木材',2))removeItem('木材',2);S.hasCampfire=true;addStory('🔥 篝火燃起来了。火焰驱散了黑暗和寒冷。','camp');updateUI();}
function campUnderAttack(){if(atCamp())return false;const base=5+S.distance*2+(isNight()?10:0);return Math.random()*100<base;}
function resolveCampAttack(){
  if(Math.random()*100<S.camp.defense){addStory('🏕️ <strong>营地遭袭！</strong>但防御工事挡住了掠夺者。','camp');return;}
  const names=Object.keys(S.camp.supplies);if(names.length>0){const lost=[];for(let i=0;i<Math.min(3,names.length);i++){const n=names[rand(0,names.length-1)];const lq=Math.min(rand(1,3),S.camp.supplies[n]?.qty||0);if(lq>0){removeItem(n,lq,true);lost.push(n+'×'+lq);}}addStory(`🏕️ <strong>⚠️ 营地被洗劫！</strong>丢失：${lost.join('、')}`,'camp');}
  S.camp.condition=clamp(S.camp.condition-rand(10,25),0,100);if(S.camp.defense>0)S.camp.defense=clamp(S.camp.defense-rand(5,15),0,100);
}

// ===== PARTY (expanded) =====
const NPC_STATUSES={
  normal:{icon:'🙂',d:'状态正常'},
  injured:{icon:'🤕',d:'受伤需要治疗'},
  hungry:{icon:'🍖',d:'饥饿需要食物'},
  thirsty:{icon:'💧',d:'口渴需要饮水'},
  exhausted:{icon:'😫',d:'疲惫需要休息'},
  depressed:{icon:'😞',d:'心情低落，可能离队'},
  angry:{icon:'😠',d:'不满，可能背叛'},
  sick:{icon:'🤒',d:'生病发烧'},
  hopeful:{icon:'😊',d:'充满希望，工作效率提升'},
  scared:{icon:'😨',d:'恐惧，忠诚度下降'},
};
function getNpcStatus(n){
  if(!n.alive)return{icon:'💀',d:'已死亡'};
  if(n.health<25)return NPC_STATUSES.injured;
  if(n.health<50&&n.hunger<30)return NPC_STATUSES.sick;
  if(n.hunger<20)return NPC_STATUSES.hungry;
  if(n.thirst<20)return NPC_STATUSES.thirsty;
  if(n.fatigue>75)return NPC_STATUSES.exhausted;
  if(n.morale<25)return NPC_STATUSES.depressed;
  if(n.loyalty<25)return NPC_STATUSES.angry;
  if(n.morale>75)return NPC_STATUSES.hopeful;
  if(n.morale<40)return NPC_STATUSES.scared;
  return NPC_STATUSES.normal;
}

function recruitNPC(name){
  let t;if(name){t=NPC_DB.find(n=>n.name===name);}if(!t){const avail=NPC_DB.filter(n=>!S.party.find(p=>p.name===n.name));if(avail.length===0){addStory('🤷 广播发出去了，但没有人回应——附近的幸存者可能都已经加入了你的队伍。','system');return;}t=pick(avail);}
  if(S.party.find(p=>p.name===t.name))return;
  const npc={id:'n'+Date.now()+rand(0,999),...t,health:100,hunger:70+rand(0,20),thirst:75+rand(0,15),fatigue:rand(10,30),morale:rand(45,75),loyalty:rand(40,80),alive:true,inventory:{},activity:'idle',activityTurns:0,wounds:[]};
  addItemToNpc(npc,'罐头',rand(1,2));addItemToNpc(npc,'净水',rand(1,1));
  S.party.push(npc);addStory(`👥 <strong>${npc.e} ${npc.name}加入了小队！</strong>特长：${npc.sn}。${npc.d}`,'party');updateUI();
}

function addItemToNpc(npc,name,qty){if(!npc||qty<=0)return;if(!npc.inventory[name])npc.inventory[name]={qty:0};npc.inventory[name].qty+=qty;}
function removeItemFromNpc(npc,name,qty){if(!npc||!npc.inventory[name]||npc.inventory[name].qty<qty)return false;npc.inventory[name].qty-=qty;if(npc.inventory[name].qty<=0)delete npc.inventory[name];return true;}
function npcHasItem(npc,name,qty){return npc&&npc.inventory[name]&&npc.inventory[name].qty>=qty;}

function partyInjure(nid,injury){
  const n=S.party.find(p=>p.id===nid);if(!n||!n.alive)return;
  n.health=clamp(n.health-injury,0,100);
  if(n.health<=0){n.alive=false;addStory(`💀 <strong>${n.name}伤重不治...</strong>`,'party');}
  else{addStory(`🤕 <strong>${n.name}</strong>受伤(-${injury})`,'party');n.wounds.push({desc:'战斗中受伤',severity:Math.ceil(injury/15),bleeding:injury>15,bandaged:false,infected:false,cleaned:false});}
}

// ===== TEAMMATE UI =====
function showTeammateDetail(nid){
  const n=S.party.find(p=>p.id===nid);if(!n)return;
  const modal=document.getElementById('modal'),ov=document.getElementById('modal-overlay');
  const st=getNpcStatus(n);
  let h=`<h3>${n.e} ${n.name} — ${n.sn}</h3>`;
  h+=`<div style="font-size:0.78em;line-height:1.6;margin-bottom:8px;">`;
  h+=`<span>${n.gender||'?'}性 ${n.age||'?'}岁</span> | `;
  const rel=getRelationship(n);h+=`<span>${rel.icon} ${rel.name}</span> | `;
  h+=`<span>${st.icon} ${st.d}</span> | <span>❤️生命 ${n.health}</span> | <span>🍖${n.hunger}</span> | <span>💧${n.thirst}</span> | <span>⚡${n.fatigue}</span>`;
  h+=` | <span>😊士气 ${n.morale}</span> | <span>🤝忠诚 ${n.loyalty}</span>`;
  if(n.activity!=='idle')h+=` | <span>🔧${n.activity==='scout'?'侦察中':n.activity==='gather'?'搜刮中':'守卫中'}</span>`;
  h+=`</div>`;

  // Wounds
  if(n.wounds&&n.wounds.length>0){
    h+=`<div style="font-size:0.72em;margin-bottom:6px;"><strong>🤕 伤势：</strong>`;
    n.wounds.forEach((w,i)=>{h+=`<span style="color:${w.bleeding&&!w.bandaged?'var(--danger)':w.infected?'#b44':'var(--text-dim)'}">${w.desc}${w.bleeding&&!w.bandaged?'(流血)':''}${w.infected?'(感染)':''}${w.bandaged?'(已包扎)':''}</span> `;});h+=`</div>`;}

  // Their inventory
  h+=`<div style="font-size:0.72em;margin-bottom:6px;"><strong>🎒 ${n.name}的背包：</strong>`;
  const nitems=Object.entries(n.inventory||{});
  if(nitems.length===0)h+='空';
  else nitems.forEach(([nm,d])=>{h+=`${ITEMS[nm]?.e||'📦'}${nm}×${d.qty} `;});h+=`</div>`;

  // Give items
  h+=`<div style="font-size:0.72em;margin-bottom:6px;"><strong>🎁 给予物品：</strong><div class="treatment-row">`;
  const myItems=Object.entries(S.inventory);
  if(myItems.length===0)h+='<span style="color:var(--text-dim)">你背包空空</span>';
  else myItems.forEach(([nm,d])=>{
    h+=`<button class="treatment-btn" onclick="giveToNpc('${n.id}','${nm}',1)" style="font-size:0.6em;">${d.e}${nm}×1</button>`;
  });h+=`</div></div>`;

  // Treat wounds
  if(n.wounds&&n.wounds.some(w=>w.bleeding&&!w.bandaged)&&npcHasItem(n,'绷带',1)){
    h+=`<button class="treatment-btn" onclick="npcSelfTreat('${n.id}','bandage')">🩹 让${n.name}自己包扎</button> `;}
  if(n.wounds&&n.wounds.some(w=>!w.cleaned)&&npcHasItem(n,'净水',1)){
    h+=`<button class="treatment-btn" onclick="npcSelfTreat('${n.id}','clean')">💧 让${n.name}清洗伤口</button> `;}

  // Marriage
  if(!S.spouse&&n.gender!==S.playerGender&&getRelationship(n).level>=3){
    h+=`<div style="margin-top:6px;"><button class="treatment-btn" onclick="proposeMarriage('${n.id}')" style="color:#ff69b4;border-color:#ff69b4;">💍 求婚</button></div>`;}
  if(S.spouse===n.id)h+=`<div style="margin-top:4px;color:#ff69b4;font-size:0.72em;">💍 配偶 | `+(S.children.length>0?`孩子：${S.children.filter(c=>c.alive).map(c=>c.name+'('+c.age.toFixed(0)+'岁)').join('、')}`:'尚未有孩子')+`</div>`;
  // Activity
  h+=`<div style="margin-top:6px;"><strong>🔧 分配任务：</strong><div class="treatment-row">`;
  h+=`<button class="treatment-btn" onclick="assignNpc('${n.id}','scout')">👀侦察</button>`;
  h+=`<button class="treatment-btn" onclick="assignNpc('${n.id}','gather')">🔍搜刮</button>`;
  h+=`<button class="treatment-btn" onclick="assignNpc('${n.id}','guard')">🛡️守卫</button>`;
  h+=`<button class="treatment-btn" onclick="assignNpc('${n.id}','idle')">😴休息</button>`;
  h+=`</div></div>`;

  h+=`<div class="btn-row" style="margin-top:6px;"><button class="btn small" onclick="closeModal()">关闭</button></div>`;
  modal.innerHTML=h;ov.classList.add('active');
}

function giveToNpc(nid,itemName,qty){
  const n=S.party.find(p=>p.id===nid);if(!n||!n.alive)return;
  if(!hasItem(itemName,qty)){setStatus('背包中没有足够的'+itemName);return;}
  removeItem(itemName,qty);addItemToNpc(n,itemName,qty);
  addStory(`🎁 给了<strong>${n.name}</strong> ${ITEMS[itemName]?.e||''}${itemName}×${qty}`,'party');
  updateUI();showTeammateDetail(nid);
}

function npcSelfTreat(nid,action){
  const n=S.party.find(p=>p.id===nid);if(!n||!n.alive)return;
  const wound=n.wounds.find(w=>action==='bandage'?w.bleeding&&!w.bandaged:!w.cleaned);
  if(!wound)return;
  const item=action==='bandage'?'绷带':'净水';
  if(!removeItemFromNpc(n,item,1))return;
  if(action==='bandage'){wound.bandaged=true;wound.bleeding=false;}
  else{wound.cleaned=true;wound.infected=false;}
  addStory(`${n.e} <strong>${n.name}</strong>自己处理了伤口。`,'party');
  updateUI();showTeammateDetail(nid);
}

function assignNpc(nid,activity){
  const n=S.party.find(p=>p.id===nid);if(!n||!n.alive)return;
  n.activity=activity;n.activityTurns=0;
  const actName={scout:'侦察',gather:'搜刮',guard:'守卫营地',idle:'休息'};
  addStory(`🔧 <strong>${n.name}</strong>开始${actName[activity]||activity}。`,'party');
  updateUI();showTeammateDetail(nid);
}

// ===== TEAMMATE AUTONOMY =====
function teammateTurn(){
  for(const n of S.party){
    if(!n.alive)continue;
    // === Self-care: use items from own inventory ===
    if(n.hunger<40&&npcHasItem(n,'罐头',1)){removeItemFromNpc(n,'罐头',1);n.hunger=clamp(n.hunger+22,0,100);}
    else if(n.hunger<40&&npcHasItem(n,'干粮',1)){removeItemFromNpc(n,'干粮',1);n.hunger=clamp(n.hunger+14,0,100);}
    if(n.thirst<40&&npcHasItem(n,'净水',1)){removeItemFromNpc(n,'净水',1);n.thirst=clamp(n.thirst+18,0,100);}
    // Self-treat wounds
    const bleedW=n.wounds.find(w=>w.bleeding&&!w.bandaged);
    if(bleedW&&npcHasItem(n,'绷带',1)){removeItemFromNpc(n,'绷带',1);bleedW.bandaged=true;bleedW.bleeding=false;}
    const dirtyW=n.wounds.find(w=>!w.cleaned);
    if(dirtyW&&npcHasItem(n,'净水',1)){removeItemFromNpc(n,'净水',1);dirtyW.cleaned=true;}

    // === Vital decay ===
    n.hunger=clamp(n.hunger+rand(-5,-2),0,100);n.thirst=clamp(n.thirst+rand(-4,-2),0,100);n.fatigue=clamp(n.fatigue+rand(1,4),0,100);
    // Wound effects
    for(const w of n.wounds){if(w.bleeding&&!w.bandaged)n.health=clamp(n.health-w.severity*2,0,100);if(w.infected)n.health=clamp(n.health-3,0,100);}

    // === Activity effects ===
    n.activityTurns++;
    if(n.activity==='idle'){n.fatigue=clamp(n.fatigue-8,0,100);if(n.health<80)n.health=clamp(n.health+3,0,100);}
    else if(n.activity==='scout'&&n.activityTurns%3===0){// Every 3 turns, chance to discover location
      const unknown=MAP_LOCATIONS.filter(l=>!S.discoveredLocations.includes(l.id));
      if(unknown.length>0&&Math.random()<0.4){const loc=pick(unknown);S.discoveredLocations.push(loc.id);addStory(`👀 <strong>${n.name}</strong>侦察发现了新地点：${loc.icon} <strong>${loc.name}</strong>（${loc.dir}方${loc.dist}km）`,'party');}}
    else if(n.activity==='gather'&&n.activityTurns%2===0){
      const loots=[{n:'罐头',q:[1,2]},{n:'净水',q:[1,2]},{n:'木材',q:[1,2]},{n:'布料',q:[1,1]},{n:'弹药',q:[1,2]}];
      const lt=pick(loots);const q=Array.isArray(lt.q)?rand(lt.q[0],lt.q[1]):lt.q;
      addItemToNpc(n,lt.n,q);if(Math.random()<0.3){addStory(`🔍 <strong>${n.name}</strong>找到了${ITEMS[lt.n]?.e||''}${lt.n}×${q}`,'party');}}
    else if(n.activity==='guard'){if(n.activityTurns%4===0)S.camp.defense=clamp(S.camp.defense+2,0,100);}

    // === Morale & Loyalty shifts ===
    if(n.hunger<25)n.morale=clamp(n.morale-5,0,100);if(n.thirst<25)n.morale=clamp(n.morale-4,0,100);
    if(n.health<40)n.morale=clamp(n.morale-3,0,100);if(n.fatigue>70)n.morale=clamp(n.morale-3,0,100);
    if(n.hunger>60&&n.thirst>60&&n.health>60)n.morale=clamp(n.morale+2,0,100);
    if(atCamp()&&n.activity==='idle')n.morale=clamp(n.morale+2,0,100);
    if(S.weather&&S.weather.temperature<0)n.morale=clamp(n.morale-2,0,100);
    // Give items to teammate raises loyalty
    if(n.morale<25)n.loyalty=clamp(n.loyalty-3,0,100);

    // === Consequences ===
    // Desertion: low morale + low loyalty
    if(n.morale<15&&n.loyalty<30&&Math.random()<0.15){
      addStory(`💔 <strong>${n.name}离开了团队。</strong>"对不起...我撑不下去了。"${n.name}带着自己的背包消失在废土中。`,'party');
      // Drop their items
      for(const [nm,d]of Object.entries(n.inventory||{})){for(let i=0;i<d.qty;i++)addItem(nm,1);}
      n.alive=false;continue;}
    // Betrayal: very low loyalty
    if(n.loyalty<15&&Math.random()<0.1){
      addStory(`💔 <strong>${n.name}背叛了你！</strong>趁着夜色偷走了一些物资，消失得无影无踪。`,'party');
      const myKeys=Object.keys(S.inventory);for(let i=0;i<Math.min(3,myKeys.length);i++){const k=myKeys[rand(0,myKeys.length-1)];removeItem(k,rand(1,2));}
      n.alive=false;continue;}
    // Death from neglect
    if(n.health<=0){n.alive=false;addStory(`💀 <strong>${n.name}倒下了。</strong>你没能及时照顾队友。`,'party');continue;}
    if(n.hunger<=0){n.health=clamp(n.health-20,0,100);if(n.health<=0){n.alive=false;addStory(`💀 <strong>${n.name}饿死了...</strong>`,'party');}}
    if(n.thirst<=0){n.health=clamp(n.health-25,0,100);if(n.health<=0){n.alive=false;addStory(`💀 <strong>${n.name}脱水而死...</strong>`,'party');}}

    // Heal old wounds
    n.wounds=n.wounds.filter(w=>{if(w.bandaged&&w.cleaned&&!w.infected&&Math.random()<0.3)return false;return true;});
  }
}

// ===== RELATIONSHIP & FAMILY =====
function getRelationship(npc){
  if(S.spouse===npc.id)return{icon:'💍',name:'配偶',level:5};
  if(npc.loyalty>80&&npc.morale>70)return{icon:'❤️',name:'亲密',level:4};
  if(npc.loyalty>60&&npc.morale>50)return{icon:'😊',name:'好友',level:3};
  if(npc.loyalty>35)return{icon:'🙂',name:'同伴',level:2};
  return{icon:'🤝',name:'认识',level:1};
}
function proposeMarriage(nid){
  const n=S.party.find(p=>p.id===nid);if(!n||!n.alive)return;
  if(S.spouse){setStatus('你已经结婚了！');return;}
  if(n.gender===S.playerGender){setStatus('同性无法在废土繁衍后代...');return;}
  const rel=getRelationship(n);
  if(rel.level<4){setStatus(`${n.name}和你的关系还不够亲密（需要❤️亲密）`);return;}
  if(n.loyalty<70){setStatus(`${n.name}的忠诚度不够（需要>70）`);return;}
  closeModal();S.spouse=n.id;n.morale=clamp(n.morale+20,0,100);n.loyalty=clamp(n.loyalty+15,0,100);
  addStory(`💍 <strong>${n.name}接受了你的求婚！</strong>在废土上，两个人的承诺是最奢侈的东西。你们在篝火前交换了誓言。`,'party');
  updateUI();
}
function tryHaveChild(){
  if(!S.spouse)return;
  const spouse=S.party.find(p=>p.id===S.spouse);if(!spouse||!spouse.alive)return;
  // ~5% chance per day when at camp with spouse
  if(!atCamp()||Math.random()>0.05)return;
  const childGender=pick(['男','女']);
  const childNames=childGender==='男'?['小光','石头','阿勇','小杰','晨晨']:['小花','小草','阿美','小雪','星星'];
  const child={name:pick(childNames),gender:childGender,age:0,alive:true};
  S.children.push(child);
  addStory(`👶 <strong>${spouse.name}怀孕了！</strong>九个月后，${child.gender=='男'?'儿子':'女儿'}<strong>${child.name}</strong>出生了。废土上诞生了一个新生命——这简直是奇迹。`,'party');
}
function growChildren(){
  for(const c of S.children){
    if(!c.alive)continue;c.age+=0.5;

// ===== PRODUCTION BUILDING TICK =====
let _prodTicks=0;
function tickProduction(){
  _prodTicks++;if(_prodTicks%2!==0)return; // tick every 2 turns
  if(!S.campGrid)return;
  for(let y=0;y<5;y++)for(let x=0;x<5;x++){
    const cell=S.campGrid[y][x];if(cell.type!=='building')continue;
    const b=BUILDINGS.find(b=>b.id===cell.id);if(!b||!b.produces)continue;
    cell._prodCounter=(cell._prodCounter||0)+1;
    if(cell._prodCounter>=b.produces.interval){
      cell._prodCounter=0;const q=Array.isArray(b.produces.qty)?rand(b.produces.qty[0],b.produces.qty[1]):b.produces.qty;
      addItem(b.produces.item,q,true); // store in camp
    }
  }
}

// ===== CAMP ECOLOGY SIMULATION =====
const CAMP_EVENTS=[
  {type:'grow',name:'发现物资仓库',icon:'📦',eff:{size:[3,8],defense:[5,15],supplies:[10,30]},msg:'{camp}在废墟中发现了战前物资仓库，实力大增。'},
  {type:'grow',name:'招募新成员',icon:'👥',eff:{size:[2,6],supplies:[5,15]},msg:'{camp}从流民中招募了一批新成员。'},
  {type:'grow',name:'发现军工厂',icon:'🏭',eff:{size:[5,10],defense:[10,25],supplies:[15,40]},msg:'{camp}发现了一座废弃军工厂！武器装备和物资大幅增加。',rare:true},
  {type:'decline',name:'掠夺者袭击',icon:'⚔️',eff:{size:[-5,-2],defense:[-15,-5],supplies:[-20,-10]},msg:'{camp}遭到掠夺者袭击，损失惨重。'},
  {type:'decline',name:'内部叛乱',icon:'💔',eff:{size:[-8,-3],defense:[-20,-10],loyalty:[-30,-15]},msg:'{camp}发生了内部叛乱，分裂为两派。'},
  {type:'decline',name:'疾病爆发',icon:'🤒',eff:{size:[-4,-1],loyalty:[-15,-5]},msg:'{camp}爆发了传染病，多人病倒。'},
  {type:'destroy',name:'暴风雪摧毁',icon:'❄️',seasons:['winter'],msg:'一场猛烈的暴风雪彻底摧毁了{camp}的营地。幸存者四散而去。'},
  {type:'destroy',name:'被变异兽群摧毁',icon:'🐺',msg:'大群变异兽袭击了{camp}，营地被夷为平地。'},
  {type:'destroy',name:'辐射泄漏',icon:'☢️',msg:'{camp}的营地地下发生了辐射泄漏，所有人被迫撤离。'},
  {type:'merge',name:'吞并',icon:'🤝',msg:'{camp1}吞并了{camp2}，实力进一步壮大。'},
];

function simulateCampEcology(){
  if(Math.random()>0.25)return; // 25% chance per turn to trigger ecology events
  // Get all camps in current biome
  const camps=S.enemyCamps.filter(ec=>ec.alive!==false);
  if(camps.length===0)return;

  const ev=pick(CAMP_EVENTS);

  if(ev.type==='merge'&&camps.length>=2){
    // Two camps merge
    const a=camps[rand(0,camps.length-1)];let b;
    do{b=camps[rand(0,camps.length-1)];}while(b===a);
    a.size+=b.size;a.defense=Math.max(a.defense,b.defense)+rand(5,15);a.supplies+=b.supplies;
    b.alive=false;_reportIntel([a,b],ev.msg.replace('{camp1}',`<strong>${a.name}</strong>`).replace('{camp2}',`<strong>${b.name}</strong>`));
  }else if(ev.type==='destroy'){
    if(ev.seasons&&!ev.seasons.includes(S.season?.id))return;
    const c=pick(camps);c.alive=false;
    _reportIntel([c],ev.msg.replace('{camp}',`<strong>${c.name}</strong>`));
    // Clean up dead camps occasionally
    S.enemyCamps=S.enemyCamps.filter(ec=>ec.alive!==false||Math.random()>0.5);
  }else if(ev.type==='grow'||ev.type==='decline'){
    if(ev.rare&&Math.random()>0.15)return; // rare events are less common
    const c=pick(camps);
    if(ev.eff.size){const v=ev.eff.size;c.size=clamp(c.size+(Array.isArray(v)?rand(v[0],v[1]):v),1,50);}
    if(ev.eff.defense){const v=ev.eff.defense;c.defense=clamp(c.defense+(Array.isArray(v)?rand(v[0],v[1]):v),0,100);}
    if(ev.eff.supplies){const v=ev.eff.supplies;c.supplies=clamp(c.supplies+(Array.isArray(v)?rand(v[0],v[1]):v),0,100);}
    if(ev.eff.loyalty){const v=ev.eff.loyalty;c.loyalty=clamp(c.loyalty+(Array.isArray(v)?rand(v[0],v[1]):v),0,100);}
    _reportIntel([c],ev.msg.replace('{camp}',`<strong>${c.name}</strong>`));
  }

  // New camp formation (small chance)
  if(Math.random()<0.08&&camps.length<6){
    const nc=generateEnemyCamp();nc._new=true;S.enemyCamps.push(nc);
    // Report via radio or scout
    if(hasItem('收音机',1)){addStory(`📻 收音机报道：一个新的幸存者营地——<strong>${nc.name}</strong>在附近成立了。`,'party');}
  }
}

function _reportIntel(camps,msg){
  // Only report if player has intel on at least one affected camp
  const hasIntel=camps.some(c=>c.scouted||c.spy);
  if(!hasIntel&&!hasItem('收音机',1))return; // no intel at all
  if(hasIntel)addStory(`📡 ${msg}`,'party');
  else if(hasItem('收音机',1)&&Math.random()<0.5)addStory(`📻 收音机消息：${msg}`,'party');
  // General "something happened" if no detail
  const unknown=camps.filter(c=>!c.scouted&&!c.spy);
  if(unknown.length>0&&hasItem('收音机',1)&&Math.random()<0.3){
    addStory(`📻 收音机提到附近有营地发生了变化，但细节不明——也许该派侦察去看看。`,'system');
  }
}

const CAMP_LEVELS=[
  {level:1,size:5,cost:{},name:'小型营地',icon:'🏕️'},
  {level:2,size:7,cost:{'木材':20,'金属片':15,'钉子':8,'铁皮':5},name:'中型营地',icon:'🏘️'},
  {level:3,size:9,cost:{'木材':40,'金属片':30,'钉子':15,'铁皮':10,'铁丝网':3},name:'大型要塞',icon:'🏰'},
];

function expandCamp(){
  const currentLevel=S._campLevel||1;if(currentLevel>=CAMP_LEVELS.length){setStatus('营地已达最大规模');return;}
  const next=CAMP_LEVELS[currentLevel]; // next level (index = current since level starts at 1)
  if(!next){setStatus('已达上限');return;}
  const can=Object.entries(next.cost).every(([n,q])=>hasItem(n,q));
  if(!can){const missing=Object.entries(next.cost).filter(([n,q])=>!hasItem(n,q)).map(([n,q])=>n+'×'+q).join(',');
    setStatus('材料不足，还需要：'+missing);return;}
  for(const [n,q]of Object.entries(next.cost))removeItem(n,q);
  S._campLevel=next.level;
  // Expand grid
  const newSize=next.size;const newGrid=[];
  for(let y=0;y<newSize;y++){newGrid[y]=[];for(let x=0;x<newSize;x++){if(S.campGrid&&S.campGrid[y]&&S.campGrid[y][x])newGrid[y][x]=S.campGrid[y][x];else newGrid[y][x]={type:'empty',id:null};}}
  S.campGrid=newGrid;S.campGrid[Math.floor(newSize/2)][Math.floor(newSize/2)]={type:'campfire',id:'center',icon:'🔥',name:'营地中心'};
  addStory(`🏗️ 营地扩建完成！现在是<strong>${next.icon} ${next.name}</strong>（${newSize}×${newSize}）`,'camp');
  updateUI();showCampView();
}

function showExpandInfo(){
  const cl=S._campLevel||1;const current=CAMP_LEVELS[cl-1];
  const modal=document.getElementById('modal'),ov=document.getElementById('modal-overlay');
  let h=`<h3>🏗️ 扩建营地</h3>`;
  h+=`<p style="font-size:0.78em;">当前：<strong>${current.icon} ${current.name}</strong>（${current.size}×${current.size}）</p>`;
  if(cl>=CAMP_LEVELS.length){h+='<p style="color:var(--success)">已达最大规模！</p>';}
  else{const next=CAMP_LEVELS[cl];h+=`<div class="wound-card"><strong>升级到 ${next.icon} ${next.name}</strong>（${next.size}×${next.size}）<br><span style="font-size:0.7em;color:var(--text-dim)">需要：${Object.entries(next.cost).map(([n,q])=>n+'×'+q).join('、')}</span><div class="treatment-row"><button class="treatment-btn" onclick="closeModal();expandCamp();">🔨 扩建</button></div></div>`;}
  h+=`<div class="btn-row"><button class="btn small" onclick="closeModal()">关闭</button></div>`;modal.innerHTML=h;ov.classList.add('active');
}

  else{addStory(`☠️ 下毒<strong>${ec.name}</strong>的行动败露！${ec.spy?'卧底身份暴露！':''}`,'danger');if(ec.spy)ec.spy=null;}
  updateUI();
}

function attackCamp(ecid){
  const ec=S.enemyCamps.find(x=>x.id===ecid);if(!ec||!ec.scouted)return;
  closeModal();S.busy=true;btnDisabled(true);setStatus('⚔️ 战斗中...');setChoices([]);
  advanceHour(rand(3,6));
  // Calculate combat strength
  const myPower=(1+S.party.filter(p=>p.alive).length)*2+(S.camp.defense/10);
  let enemyPower=(ec.size/5)+(ec.defense/15);
  if(ec.sabotaged)enemyPower*=0.5;if(ec.poisoned)enemyPower*=0.6;
  if(ec.loyalty<30)enemyPower*=0.7; // low loyalty = easy to break
  const winChance=myPower/(myPower+enemyPower);
  const victory=Math.random()<winChance;

  if(victory){
    const lootCount=rand(3,8);const loots=[];
    for(let i=0;i<lootCount;i++){const items=['罐头','净水','弹药','医疗包','武器零件','金属片','军用口粮'];const n=pick(items);const q=rand(1,4);addItem(n,q);loots.push(`${ITEMS[n]?.e||''}${n}×${q}`);}
    addStory(`⚔️ <strong>胜利！</strong>你攻下了<strong>${ec.name}</strong>！${ec.leader}战败。战利品：${loots.join('、')}`,'party');modRep(15,'攻占敌营');
    S.enemyCamps=S.enemyCamps.filter(x=>x.id!==ecid); // remove defeated camp
    // Party injuries
    for(const n of S.party){if(!n.alive)continue;if(Math.random()<0.4)partyInjure(n.id,rand(10,30));}
    if(Math.random()<0.3){const pid=pick(BODY_PARTS);const sev=rand(1,3);const desc=`${['被','遭到','受到'][sev-1]}攻击受伤`;addWound(pid,sev,desc,sev>=2);S.blood=clamp(S.blood-sev*8,0,100);addStory(`🤕 <strong>${PL[pid]}在战斗中受伤！</strong>（-${sev*8}生命）`,'medical');}
  }else{
    addStory(`⚔️ <strong>战败！</strong>对<strong>${ec.name}</strong>的进攻被击退。${ec.leader}的防御比你预想的要强。`,'danger');modRep(-8,'战败');
    for(const n of S.party){if(!n.alive)continue;if(Math.random()<0.6)partyInjure(n.id,rand(20,40));}
    const rpid=pick(BODY_PARTS);addWound(rpid,rand(2,3),`撤退时${PL[rpid]}遭到重击`,true);S.blood=clamp(S.blood-rand(15,35),0,100);addStory(`🤕 <strong>${PL[rpid]}在撤退中受了重伤！</strong>`,'medical');
    // Lose items
    const myKeys=Object.keys(S.inventory);for(let i=0;i<Math.min(3,myKeys.length);i++){const k=myKeys[rand(0,myKeys.length-1)];removeItem(k,rand(1,2));}
  }
  progressWounds();teammateTurn();updateUI();checkDeath();
  S.busy=false;btnDisabled(false);setChoices(['继续推进']);
}

function depositItem(name,qty){
  if(!atCamp()||!hasItem(name,qty))return;
  const campItems=Object.keys(S.camp.supplies);
  if(campItems.length>=S.chestSlots&&!S.camp.supplies[name]){setStatus('储物箱已满！升级箱子。');return;}
  qty=Math.min(qty,S.inventory[name].qty);removeItem(name,qty);addItem(name,qty,true);
  addStory(`📥 存入<strong>${name}×${qty}</strong>`,'camp');updateUI();openStorageUI();
}

function withdrawItem(name,qty){
  if(!atCamp()||!hasItem(name,qty,true))return;
  const bpCount=Object.keys(S.inventory).length;
  if(bpCount>=maxSlots()&&!S.inventory[name]){setStatus('背包已满！先清理背包。');return;}
  qty=Math.min(qty,S.camp.supplies[name].qty);removeItem(name,qty,true);addItem(name,qty);
  addStory(`📤 取出<strong>${name}×${qty}</strong>`,'camp');updateUI();openStorageUI();
}

  if(S.camp.stability<25&&S.party.length>0)h+=`<p style="font-size:0.7em;color:var(--danger)">⚠️ 营地不稳定！队友可能造反！</p>`;

function doChangeGov(type){
  closeModal();S.camp.governance=type;S.camp.stability=clamp(S.camp.stability+(type==='democracy'?20:-20),0,100);
  addStory(`🏛️ 营地制度变更为<strong>${GOVERN_TYPES[type].icon} ${GOVERN_TYPES[type].name}</strong>。`,'camp');updateUI();
}
function campStabilityCheck(){
  const g=S.camp.governance;
  // Decay under dictatorship
  if(g==='dictatorship')S.camp.stability=clamp(S.camp.stability-1,0,100);
  else S.camp.stability=clamp(S.camp.stability+0.5,0,100);
  // Party loyalty affects stability
  const avgLoyalty=S.party.filter(p=>p.alive).reduce((s,p)=>s+p.loyalty,0)/Math.max(1,S.party.filter(p=>p.alive).length);
  S.camp.stability=clamp(S.camp.stability+(avgLoyalty-50)/10,0,100);
  // Rebellion check
  if(S.camp.stability<15&&S.party.filter(p=>p.alive).length>0&&Math.random()<0.1){
    const rebel=pick(S.party.filter(p=>p.alive&&p.loyalty<50));
    if(rebel){addStory(`⚔️ <strong>${rebel.name}发动了叛乱！</strong>"我们受够了你的统治！"`,'danger');
      if(Math.random()<0.5){rebel.alive=false;addStory(`${rebel.name}在叛乱中被镇压。营地付出了惨重代价。`,'danger');S.camp.stability=clamp(S.camp.stability-20,0,100);}
      else{const idx=S.party.indexOf(rebel);S.party.splice(idx,1);addStory(`${rebel.name}叛乱失败后逃离了营地。但带走了其他几个不满的人。`,'danger');S.camp.stability=clamp(S.camp.stability-30,0,100);}}}
  // Disobedience
  if(g==='democracy'&&S.camp.stability<30){const dis=pick(S.party.filter(p=>p.alive&&p.loyalty<40));if(dis)dis.activity='idle';}
}

function initCampGrid(){
  const size=(S._campLevel||1)===1?5:(S._campLevel||1)===2?7:9;
  if(!S.campGrid||S.campGrid.length!==size){S.campGrid=[];for(let y=0;y<size;y++){S.campGrid[y]=[];for(let x=0;x<size;x++)S.campGrid[y][x]={type:'empty',id:null};}}
  const mid=Math.floor(size/2);S.campGrid[mid][mid]={type:'campfire',id:'center',icon:'🔥',name:'营地中心'};
}

  h+=`<div style="font-size:0.65em;color:var(--text-dim);margin-top:6px;text-align:center;">🔥营地中心 | 🟢建筑 | 🔴陷阱 | 💥废墟 | 点击空格建造</div>`;

  // Build menu
  h+=`<div style="margin-top:8px;"><strong>🔨 建造建筑：</strong><div class="treatment-row">`;
  BUILDINGS.forEach(b=>{const can=Object.entries(b.cost).every(([n,q])=>hasItem(n,q));h+=`<button class="treatment-btn" style="${can?'':'opacity:0.4'}" ${can?`onclick="selectBuild('${b.id}')"`:'disabled'}>${b.icon}${b.name}(${Object.entries(b.cost).map(([n,q])=>n+'×'+q).join(',')})${can?'':'❌'}</button>`;});h+=`</div></div>`;

  h+=`<div style="margin-top:6px;"><strong>🪤 布置陷阱：</strong><div class="treatment-row">`;
  TRAPS.forEach(t=>{const can=Object.entries(t.cost).every(([n,q])=>hasItem(n,q));h+=`<button class="treatment-btn" style="${can?'':'opacity:0.4'}" ${can?`onclick="selectTrap('${t.id}')"`:'disabled'}>${t.icon}${t.name}(${Object.entries(t.cost).map(([n,q])=>n+'×'+q).join(',')})${can?'':'❌'}</button>`;});h+=`</div></div>`;

  // Stats
  const totalDef=calcTotalDefense();const trapCount=countTraps();
  h+=`<div style="font-size:0.7em;margin-top:6px;color:var(--text-dim);">🛡️总防御：${totalDef} | 陷阱：${trapCount}个 | 建筑：${countBuildings()}个 | 等级：${(S._campLevel||1)}级(${initCampGrid()||S.campGrid.length}×${S.campGrid.length})</div>`;
