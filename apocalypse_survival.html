<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>末日求生 - 废土纪元</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');
:root{--bg:#0c0c0c;--panel:#151515;--border:#282828;--accent:#ff6b35;--accent2:#ff4500;--danger:#e63946;--success:#2ecc71;--warning:#f39c12;--text:#bbb;--text-bright:#eee;--text-dim:#777;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 15% 40%,rgba(255,107,53,0.04) 0%,transparent 55%),radial-gradient(ellipse at 85% 30%,rgba(255,69,0,0.03) 0%,transparent 55%);}
#header{text-align:center;padding:6px 20px 2px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(21,21,21,0.98) 0%,rgba(12,12,12,0) 100%);}
#header h1{font-family:'Orbitron',sans-serif;font-size:1.3em;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#ff6b35,#ff4500,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#header .sub{font-size:0.55em;color:var(--text-dim);letter-spacing:3px;}
#info-bar{display:flex;gap:6px;padding:4px 10px;max-width:1100px;margin:0 auto;justify-content:center;flex-wrap:wrap;align-items:center;font-size:0.68em;}
.info-chip{padding:4px 8px;background:#111;border:1px solid #222;border-radius:14px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.info-chip .ic-emoji{font-size:1em;}.info-chip .ic-val{font-weight:700;color:var(--text-bright);}
.info-chip.warn{border-color:var(--warning);}.info-chip.danger{border-color:var(--danger);animation:pulse-border 1.5s infinite;}
@keyframes pulse-border{0%,100%{border-color:var(--danger)}50%{border-color:transparent}}
#main{display:flex;gap:10px;padding:6px 10px;max-width:1100px;margin:0 auto;min-height:calc(100vh - 210px);}
@media(max-width:850px){#main{flex-direction:column;align-items:center;}}
#left-col{width:270px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
#right-bar{width:130px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;}#right-bar button{display:block;width:100%;margin:1px 0;padding:4px 5px;font-size:0.6em;background:#111;border:1px solid #333;color:#ccc;border-radius:3px;cursor:pointer;font-family:inherit;text-align:left;}#right-bar button:hover{background:#222;border-color:var(--accent);}@media(max-width:850px){#left-col{width:100%;max-width:340px;}}
#char-container{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center;position:relative;}
#char-title{font-family:'Orbitron',sans-serif;font-size:0.6em;letter-spacing:2px;color:var(--text-dim);margin-bottom:2px;}
#char-svg{width:120px;height:240px;}
.bp{cursor:pointer;transition:all 0.3s;}.bp:hover{filter:brightness(1.5);}
.bp-healthy{fill:#3d4a3d;stroke:#4a5a4a;}.bp-minor{fill:#6b5a1a;stroke:#8a7a2a;animation:pulse-yel 1.5s infinite;}
.bp-wound{fill:#8b2a1a;stroke:#aa3a2a;animation:pulse-red 1s infinite;}.bp-severe{fill:#6b0000;stroke:#aa0000;animation:pulse-red 0.6s infinite;}
.bp-infected{fill:#5b1a5b;stroke:#8b2a8b;animation:pulse-pur 1.2s infinite;}.bp-bandaged{fill:#5a5a5a;stroke:#7a7a7a;}
@keyframes pulse-red{0%,100%{filter:drop-shadow(0 0 3px rgba(255,0,0,0.4))}50%{filter:drop-shadow(0 0 10px rgba(255,0,0,0.8))}}
@keyframes pulse-yel{0%,100%{filter:drop-shadow(0 0 2px rgba(255,180,0,0.3))}50%{filter:drop-shadow(0 0 6px rgba(255,180,0,0.6))}}
@keyframes pulse-pur{0%,100%{filter:drop-shadow(0 0 3px rgba(180,0,180,0.4))}50%{filter:drop-shadow(0 0 8px rgba(180,0,180,0.7))}}
.blood-drip{animation:drip 0.8s ease-in infinite;}
@keyframes drip{0%{opacity:0;transform:translateY(0)}30%{opacity:1}100%{opacity:0;transform:translateY(12px)}}
.bp-tooltip{position:absolute;pointer-events:none;background:#000;color:#fff;padding:3px 7px;border-radius:4px;font-size:0.6em;white-space:nowrap;display:none;z-index:50;border:1px solid #444;}
.side-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:0.68em;}
.sp-title{font-family:'Orbitron',sans-serif;font-size:0.65em;letter-spacing:1px;color:var(--accent);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid #222;}
.sp-section{margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #1a1a1a;}.sp-section:last-child{border-bottom:none;margin-bottom:0;}
.sp-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;}
.sp-label{color:var(--text-dim);}.sp-val{font-weight:700;}
.v-good{color:var(--success);}.v-warn{color:var(--warning);}.v-danger{color:var(--danger);}.v-info{color:#3498db;}
.cloth-slot{padding:3px 6px;background:#111;border-radius:4px;margin-top:2px;display:flex;justify-content:space-between;align-items:center;font-size:0.75em;}
.cloth-slot .cs-part{color:var(--text-dim);min-width:28px;}.cloth-slot .cs-name{color:var(--text-bright);flex:1;margin:0 6px;}.cloth-slot .cs-stat{font-size:0.7em;margin-left:3px;}.cloth-slot.wet{background:#1a2530;border-left:2px solid #3498db;}
.party-member{padding:3px 6px;background:#111;border-radius:4px;margin-top:2px;display:flex;justify-content:space-between;align-items:center;font-size:0.75em;}
.party-member .pm-name{font-weight:700;color:var(--text-bright);}.party-member .pm-skill{font-size:0.75em;color:var(--text-dim);margin-left:4px;}
#story-panel{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
#story-box{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-y:auto;max-height:48vh;min-height:150px;line-height:1.7;font-size:0.82em;}
#story-box::-webkit-scrollbar{width:4px;}#story-box::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
.msg{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #1a1a1a;animation:fadeIn 0.4s;}
.msg.ai{color:#c9b1ff;}.msg.system{color:var(--text-dim);font-size:0.72em;font-style:italic;}
.msg.action{color:var(--accent);font-size:0.72em;}.msg.medical{color:#ff8888;font-size:0.72em;border-left:2px solid var(--danger);padding-left:8px;}
.msg.camp{color:#ffbb88;font-size:0.72em;border-left:2px solid var(--warning);padding-left:8px;}
.msg.party{color:#88ccff;font-size:0.72em;border-left:2px solid #3498db;padding-left:8px;}
.msg.weather{color:#aaddaa;font-size:0.72em;border-left:2px solid var(--success);padding-left:8px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
#choices-area{display:flex;flex-direction:column;gap:5px;}
.choice-btn{width:100%;text-align:left;padding:9px 12px;background:#111;border:1px solid #2a2a2a;border-radius:6px;color:var(--text);font-size:0.78em;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans SC',sans-serif;}
.choice-btn:hover{border-color:var(--accent);background:#1a1a1a;color:#fff;}.choice-btn:active{transform:scale(0.98);}.choice-btn:disabled{opacity:0.3;cursor:not-allowed;}
#bottom{display:flex;gap:6px;padding:4px 10px 10px;max-width:1100px;margin:0 auto;justify-content:center;flex-wrap:wrap;align-items:center;}
.btn{font-family:'Orbitron',sans-serif;font-size:0.6em;font-weight:700;letter-spacing:1px;padding:7px 14px;border:2px solid var(--accent);background:transparent;color:var(--accent);border-radius:6px;cursor:pointer;transition:all 0.3s;text-transform:uppercase;}
.btn:hover{background:var(--accent);color:#000;box-shadow:0 0 14px rgba(255,107,53,0.25);}.btn:active{transform:scale(0.96);}.btn.primary{background:var(--accent);color:#000;}
.btn.primary:hover{box-shadow:0 0 20px rgba(255,69,0,0.35);}.btn.small{padding:4px 8px;font-size:0.5em;}.btn:disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}
#status-line{text-align:center;font-size:0.65em;color:var(--warning);min-height:16px;padding:0 10px;}
#inv-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center;font-size:0.68em;color:var(--text-dim);}
.inv-chip{padding:2px 7px;background:#111;border:1px solid #2a2a2a;border-radius:10px;cursor:pointer;transition:all 0.2s;white-space:nowrap;font-size:0.72em;}
.inv-chip:hover{border-color:var(--accent);color:#fff;}.inv-chip.usable{border-color:#3a5a3a;}
#modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;justify-content:center;align-items:center;}
#modal-overlay.active{display:flex;}
#modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;max-width:400px;width:90%;max-height:80vh;overflow-y:auto;}
#modal h3{font-family:'Orbitron',sans-serif;color:var(--accent);margin-bottom:6px;letter-spacing:2px;font-size:0.8em;}
#modal .wound-card{padding:6px 8px;background:#111;border-radius:4px;margin-bottom:5px;border-left:3px solid var(--danger);font-size:0.72em;line-height:1.4;}
#modal .wound-card.bandaged{border-left-color:#888;opacity:0.7;}.wound-card.infected{border-left-color:#b44;}
#modal .treatment-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
#modal .treatment-btn{font-size:0.62em;padding:3px 7px;border:1px solid var(--success);background:transparent;color:var(--success);border-radius:4px;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans SC',sans-serif;}
#modal .treatment-btn:hover{background:var(--success);color:#000;}
#modal .btn-row{display:flex;gap:5px;justify-content:flex-end;margin-top:8px;}
#death-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(100,0,0,0.93);z-index:200;justify-content:center;align-items:center;flex-direction:column;}
#death-overlay.active{display:flex;}
#death-overlay h2{font-family:'Orbitron',sans-serif;font-size:2.2em;color:#fff;letter-spacing:8px;margin-bottom:4px;}
#death-overlay .death-info{color:#ffaaaa;margin:6px 20px;text-align:center;line-height:1.7;max-width:460px;font-size:0.8em;}
#death-overlay .death-days{color:#ccc;margin-bottom:12px;font-size:0.82em;}
.typing::after{content:'▊';animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<div id="header"><h1>废 土 纪 元</h1><div class="sub">W A S T E L A N D &nbsp; S U R V I V A L</div></div>

<div id="info-bar">
  <div class="info-chip"><span class="ic-emoji" id="ib-se-icon">🌸</span><span id="ib-season">春</span><span>第</span><span class="ic-val" id="ib-day">1</span><span>天</span></div>
  <div class="info-chip"><span class="ic-emoji" id="ib-biome-icon">🏘️</span><span id="ib-biome">郊区</span></div>
  <div class="info-chip"><span class="ic-emoji">🕐</span><span class="ic-val" id="ib-time">08:00</span></div>
  <div class="info-chip"><span>🌡️</span><span class="ic-val" id="ib-temp">22</span><span>°C</span></div>
  <div class="info-chip"><span>💧</span><span class="ic-val" id="ib-hum">55</span><span>%</span></div>
  <div class="info-chip" id="ib-precip-chip"><span class="ic-emoji" id="ib-precip-icon">☀️</span><span class="ic-val" id="ib-precip">晴</span></div>
  <div class="info-chip"><span>💨</span><span class="ic-val" id="ib-wind">微风</span></div>
  <div class="info-chip"><span>📍</span><span>距营地</span><span class="ic-val" id="ib-dist">0</span><span>km</span></div>
  <div class="info-chip" id="ib-camp-chip"><span class="ic-emoji">🏕️</span><span class="ic-val" id="ib-camp-status">在营地</span></div>
  <div class="info-chip"><span class="ic-emoji">👥</span><span>小队</span><span class="ic-val" id="ib-party">1</span><span>人</span></div>
  <div class="info-chip"><span class="ic-emoji" id="ib-rep-icon">🌱</span><span id="ib-rep">无名</span></div>
  <div class="info-chip" id="ib-fire-chip" style="display:none"><span class="ic-emoji">🔥</span><span>篝火</span></div>
  <div class="info-chip" style="cursor:pointer;border:1px solid rgba(255,255,255,0.2)" onclick="saveGame()" title="手动存档"><span class="ic-emoji">💾</span><span>存档</span></div>
  <div class="info-chip" style="cursor:pointer;border:1px solid rgba(255,255,255,0.2)" onclick="if(hasSave()){deleteSave();setStatus('存档已删除');}" title="删除存档"><span class="ic-emoji">🗑️</span><span>删档</span></div>
</div>

<div id="main">
  <div id="left-col">
    <div id="char-container">
      <div id="char-title">🫀 身体状况</div>
      <div id="status-fx" style="font-size:0.65em;text-align:left;padding:2px 6px;min-height:18px;"></div>
      <svg id="char-svg" viewBox="0 0 120 240" xmlns="http://www.w3.org/2000/svg">
        <ellipse id="bp-head" class="bp bp-healthy" cx="60" cy="24" rx="18" ry="22" stroke-width="1.5"/><circle cx="55" cy="20" r="2" fill="#1a1a1a"/><circle cx="65" cy="20" r="2" fill="#1a1a1a"/><path d="M55 32 Q60 36 65 32" fill="none" stroke="#1a1a1a" stroke-width="1"/><rect id="bp-neck" class="bp bp-healthy" x="54" y="44" width="12" height="8" rx="2" stroke-width="1"/>
        <path id="bp-chest" class="bp bp-healthy" d="M42 52 Q38 52 36 60 L32 120 Q32 130 40 134 L80 134 Q88 130 88 120 L84 60 Q82 52 78 52 Z" stroke-width="1.5"/>
        <path id="bp-leftArm" class="bp bp-healthy" d="M40 54 L20 72 Q14 78 15 96 L16 112 Q17 118 22 120 L26 120 Q28 118 28 113 L27 96 Q28 82 34 74 L42 64 Z" stroke-width="1.5"/><ellipse cx="23" cy="124" rx="7" ry="5" fill="#3d4a3d" stroke="#4a5a4a" stroke-width="1"/>
        <path id="bp-rightArm" class="bp bp-healthy" d="M80 54 L100 72 Q106 78 105 96 L104 112 Q103 118 98 120 L94 120 Q92 118 92 113 L93 96 Q92 82 86 74 L78 64 Z" stroke-width="1.5"/><ellipse cx="97" cy="124" rx="7" ry="5" fill="#3d4a3d" stroke="#4a5a4a" stroke-width="1"/>
        <path id="bp-leftLeg" class="bp bp-healthy" d="M44 132 L38 148 Q34 164 32 184 L30 210 Q30 220 36 222 L45 224 Q52 224 51 218 L50 184 Q49 164 54 148 L60 134 Z" stroke-width="1.5"/><ellipse cx="41" cy="228" rx="10" ry="4.5" fill="#3d4a3d" stroke="#4a5a4a" stroke-width="1"/>
        <path id="bp-rightLeg" class="bp bp-healthy" d="M76 132 L82 148 Q86 164 88 184 L90 210 Q90 220 84 222 L75 224 Q68 224 69 218 L70 184 Q71 164 66 148 L60 134 Z" stroke-width="1.5"/><ellipse cx="79" cy="228" rx="10" ry="4.5" fill="#3d4a3d" stroke="#4a5a4a" stroke-width="1"/>
        <circle id="drip-head" class="blood-drip" cx="60" cy="48" r="2" fill="#f00" display="none"/><circle id="drip-chest" class="blood-drip" cx="60" cy="136" r="2" fill="#f00" display="none"/><circle id="drip-leftArm" class="blood-drip" cx="23" cy="126" r="2" fill="#f00" display="none"/><circle id="drip-rightArm" class="blood-drip" cx="97" cy="126" r="2" fill="#f00" display="none"/><circle id="drip-leftLeg" class="blood-drip" cx="41" cy="230" r="2" fill="#f00" display="none"/><circle id="drip-rightLeg" class="blood-drip" cx="79" cy="230" r="2" fill="#f00" display="none"/>
      </svg>
      <div id="bp-tooltip" class="bp-tooltip"></div>
    </div>
    <div class="side-panel"><div class="sp-title">💉 生命体征</div><div id="vitals-list"></div></div>
    <div class="side-panel">
      <div class="sp-title">🧥 穿着 <span style="font-weight:400;font-size:0.7em;color:var(--text-dim)" id="cloth-warmth"></span></div>
      <div id="clothing-list"></div>
      <div style="margin-top:3px;font-size:0.7em;color:var(--text-dim)">💦 身体湿度: <span id="body-wetness">0%</span></div>
      <div style="font-size:0.7em;color:var(--text-dim)">🔥 体感温度: <span id="feels-like">22°C</span></div>
    </div>
    <div class="side-panel">
      <div class="sp-title">🏕️ 营地 & 👥 小队</div>
      <div class="sp-section"><div class="sp-row"><span class="sp-label">营地状态</span><span id="cp-condition" class="v-good">完好</span></div><div class="sp-row"><span class="sp-label">防御</span><span id="cp-defense">无</span></div><div class="sp-row"><span class="sp-label">仓库</span><span id="cp-supplies">0件</span></div></div>
      <div class="sp-section"><div id="party-list"></div></div>
    </div>
  </div>
  <div id="story-panel"><div id="story-box"></div><div id="choices-area"></div></div>
  <div id="right-bar"></div>
</div>

<div id="status-line"></div>
<div id="bottom">
  <div id="inv-row">🎒<span style="color:var(--text-dim)">随身:</span></div>
</div>

<div id="modal-overlay"><div id="modal"></div></div>
<div id="death-overlay"><h2>💀 你死了</h2><div class="death-days"></div><div class="death-info"></div><button class="btn primary" onclick="resetGame()">🔄 重新开始</button></div>
<div id="companion-death-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,30,0.95);z-index:200;justify-content:center;align-items:center;flex-direction:column;color:#fff;text-align:center;padding:20px;">
  <h2 style="font-size:1.8em;margin-bottom:0;letter-spacing:4px;">💔 队友阵亡</h2>
  <div id="cd-name" style="font-size:2em;font-weight:700;margin:8px 0;color:#e94560;"></div>
  <div id="cd-story" style="max-width:500px;line-height:1.8;font-size:0.9em;color:#ccc;margin:16px 20px;"></div>
  <button class="btn primary" onclick="document.getElementById('companion-death-overlay').style.display='none';setChoices(['▶ 继续推进']);updateUI();">😔 继续前行</button>
</div>

<script>
// ============================================================
// 废土纪元 — 完全内置，百种物资 + 百种事件
// ============================================================
const BODY_PARTS=['head','chest','leftArm','rightArm','leftLeg','rightLeg'];
const PL={head:'头部',chest:'躯干',leftArm:'左臂',rightArm:'右臂',leftLeg:'左腿',rightLeg:'右腿'};
const SEASONS=[
  {id:'spring',name:'春',icon:'🌸',baseTemp:{min:8,max:22},tempRange:[5,28],humRange:[40,80],rainChance:0.25,dayLen:{rise:6,set:19}},
  {id:'summer',name:'夏',icon:'☀️',baseTemp:{min:20,max:38},tempRange:[15,45],humRange:[30,90],rainChance:0.20,dayLen:{rise:5,set:20}},
  {id:'autumn',name:'秋',icon:'🍂',baseTemp:{min:5,max:20},tempRange:[0,25],humRange:[35,75],rainChance:0.30,dayLen:{rise:6,set:18}},
  {id:'winter',name:'冬',icon:'❄️',baseTemp:{min:-15,max:3},tempRange:[-25,8],humRange:[20,60],rainChance:0.15,snowChance:0.30,dayLen:{rise:8,set:16}},
];

// ===== 生物群系 =====
const BIOMES=[
  {id:'city_center',name:'市中心',icon:'🏙️',desc:'高楼林立危机四伏，物资密集但掠夺者横行',food:3,water:2,danger:8,materials:6,sp:[{n:'电子零件',q:[1,3]},{n:'武器零件',q:[1,2]},{n:'弹药',q:[1,3]}]},
  {id:'suburb',name:'郊区',icon:'🏘️',desc:'居民区废墟，物资分散但相对安全',food:5,water:4,danger:4,materials:5,sp:[{n:'罐头',q:[1,3]},{n:'工具',q:[1,1]},{n:'布料',q:[1,2]}]},
  {id:'farmland',name:'农田',icon:'🌾',desc:'开阔农业区，食物充沛但缺乏其他物资',food:9,water:5,danger:3,materials:3,sp:[{n:'种子',q:[1,3]},{n:'罐头',q:[2,4]},{n:'变异兽肉',q:[1,3]}]},
  {id:'desert',name:'沙漠',icon:'🏜️',desc:'干旱贫瘠，水和食物极度匮乏',food:1,water:1,danger:6,materials:2,sp:[{n:'电池',q:[1,2]},{n:'金属片',q:[1,3]},{n:'机油',q:[1,2]}]},

function getActivePolicies(){return S.activePolicies||[];}
function togglePolicy(pid){
  if(!S.activePolicies)S.activePolicies=[];
  var idx=S.activePolicies.indexOf(pid);
  if(idx>=0){S.activePolicies.splice(idx,1);addStory('🏛️ 废除了<strong>'+getPolicyName(pid)+'</strong>政策。','camp');}
  else{
    if(S.activePolicies.length>=3){setStatus('最多启用3项政策！先废除一项。');return;}
    S.activePolicies.push(pid);addStory('🏛️ 颁布了<strong>'+getPolicyName(pid)+'</strong>政策。','camp');
  }
  updateUI();
}
function getPolicyName(pid){var p=POLICIES.find(function(x){return x.id===pid;});return p?p.icon+p.name:pid;}
function getPolicyEffect(key){
  var val=0;(S.activePolicies||[]).forEach(function(pid){var p=POLICIES.find(function(x){return x.id===pid;});if(p&&p.effect&&p.effect[key]!==undefined)val+=p.effect[key];});
  return val;
}

    choices:[{text:'尝试捕捉',eff:{fatigue:10},items:[{n:'变异兽肉',q:[2,4]}]},{text:'用石头吓走它',eff:{fatigue:3}},{text:'悄悄观察',eff:{morale:2}}]},
  {id:'phone_ringing',cat:'mystery',ctx:{minDist:0,maxDist:6},narr:'废墟中突然传来手机铃声——一首战前流行歌曲。在这片死寂的废土上，这个声音既诡异又令人怀念。',

  {id:'toolbox_find',cat:'discovery',ctx:{minDist:0,maxDist:5},narr:'一个生锈的工具箱半埋在土里。锁已经锈坏了，轻轻一碰就打开了。里面整齐地摆放着几件工具。',
    choices:[{text:'拿走所有工具',eff:{fatigue:4},items:[{n:'工具',q:[1,2]},{n:'钉子',q:[1,3]}]},{text:'只拿需要的',eff:{},items:[{n:'工具',q:[1,1]}]},{text:'留给后来的人',eff:{morale:3}}]},

  // === 中距离探索 (5-12km) ===
  {id:'raider_camp_ruins',cat:'danger',ctx:{minDist:4,maxDist:14},narr:'前方出现了一个废弃的掠夺者营地。篝火早已熄灭，帐篷被风吹得破破烂烂，地上散落着弹壳和一些物资。掠夺者似乎是匆忙离开的。',

      {w:3,eff:{fatigue:8},items:[{n:'弹药',q:[1,2]},{n:'罐头',q:[1,1]}],desc:'营地大部分物资都被带走了，只找到一些遗漏的弹药和罐头。'},
      {w:3,eff:{fatigue:12,health:-8},desc:'你踩到了一条绊线——轰！残余的陷阱爆炸了。你被冲击波震倒在地。虽然没有致命伤，但也没拿到东西。'},
    ]},{text:'快速翻找值钱物品',outcomes:[
      {w:5,eff:{fatigue:5},items:[{n:'弹药',q:[1,3]}],desc:'你迅速翻了一遍，抓了几盒弹药就撤。效率不错。'},

      {w:2,eff:{fatigue:5,health:-3},items:[{n:'弹药',q:[1,1]}],desc:'匆忙中你被地上的铁丝绊倒了，膝盖擦破了一大块皮。只捡到一盒弹药。'},
    ]},{text:'可能有埋伏，撤离',eff:{fatigue:1},outcome:'你保持警惕迅速撤离了这片区域。活着的猎人才有下一次机会。'}]},
  {id:'mutant_beast',cat:'danger',ctx:{minDist:5,maxDist:18},narr:'一声低沉的咆哮从前方废墟中传来。一只体型如牛的变异犬从阴影中走出，浑身散发着辐射的微光，眼中满是饥饿。',
    choices:[{text:'正面迎战',outcomes:[
      {w:4,eff:{health:-12,fatigue:15},items:[{n:'变异兽肉',q:[3,6]}],desc:'经过一番搏斗，你用武器击毙了这只变异犬。虽然受了伤，但这么大一只够吃好几顿了。'},
      {w:3,eff:{health:-20,fatigue:18},items:[{n:'变异兽肉',q:[2,4]}],desc:'变异犬比想象中更难缠。你被撞倒在地，肋骨可能裂了。勉强击退后得到了兽肉，但伤势不轻。'},
      {w:3,eff:{health:-8,fatigue:10},desc:'你虚张声势地挥舞武器大喊大叫——变异犬犹豫了一下，最终转身跑开了。你没受伤但也没得到食物。'},
    ]},{text:'悄悄绕开',outcomes:[
      {w:6,eff:{fatigue:8},desc:'你屏住呼吸，轻手轻脚地绕过了变异犬的警戒范围。安全第一——和怪物战斗不是每次都能赢的。'},
      {w:4,eff:{fatigue:8,health:-5},desc:'悄悄移动时踩断了一根枯枝。变异犬猛地转头——你拔腿就跑，它追了你几百米才放弃。小腿被灌木刮破了。'},
    ]},{text:'扔食物引开',outcomes:[
      {w:6,eff:{nutrition:-5,fatigue:3},desc:'你掏出一些食物扔向远处。变异犬立刻扑向食物，你趁机从另一侧快速通过。'},
      {w:4,eff:{nutrition:-5},desc:'食物丢出去后变异犬吃完了还追来，你只好又丢了更多才脱身。',lose:1},
    ]}]},
  {id:'supply_cache',cat:'discovery',ctx:{minDist:5,maxDist:15},narr:'你发现了一个精心隐藏的战前物资储藏点。塑料箱密封完好，上面贴着"紧急储备 — 2037"的标签。这是一个重大发现。',
    choices:[{text:'打开所有箱子',outcomes:[
      {w:5,eff:{fatigue:12},items:[{n:'军用口粮',q:[2,4]},{n:'净水',q:[2,4]},{n:'医疗包',q:[1,2]},{n:'电池',q:[1,3]}],desc:'箱子保存得非常好——军用口粮、净水、医疗包、电池，全是硬通货！这次真是发了一笔。'},
      {w:3,eff:{fatigue:8},items:[{n:'军用口粮',q:[1,2]},{n:'净水',q:[1,2]}],desc:'有些箱子受潮了，里面的物资已经变质。但你还是找到了几份完好的口粮和水。'},
      {w:2,eff:{fatigue:10,health:-5},desc:'一个箱子底部有碎玻璃陷阱！你的手被割破了。万幸伤口不深。没有拿走任何东西。'},
    ]},{text:'先检查有无陷阱',outcomes:[
      {w:6,eff:{fatigue:6},items:[{n:'军用口粮',q:[1,3]},{n:'急救手册',q:[1,1]}],desc:'你的谨慎得到了回报。你发现了一个隐藏的捕兽夹，安全解除后拿到了物资和一本急救手册。'},
      {w:4,eff:{fatigue:4},items:[{n:'军用口粮',q:[1,1]}],desc:'检查花了些时间，确认安全后只找到了少量物资——但至少没有受伤。'},
    ]},{text:'标记位置下次再来',eff:{fatigue:2},outcome:'你在附近做了标记。好东西不急于一时，稳妥为上。下次带够工具再来搬。'}]},
  {id:'survivor_campfire',cat:'npc',ctx:{minDist:3,maxDist:12},narr:'远处升起了炊烟。走近发现是几个幸存者围坐在篝火旁。他们看起来疲惫但友好，朝你招手示意可以过来一起取暖。',
    choices:[{text:'加入他们分享食物',eff:{morale:10,nutrition:8,fatigue:-5}},{text:'远远观察',eff:{fatigue:2}},{text:'尝试招募其中一人',recruit:true,eff:{morale:5}}]},
  {id:'radioactive_pool',cat:'danger',ctx:{minDist:4,maxDist:16},narr:'前方出现了一个荧光绿色的水潭。水面上飘着奇异的雾气，空气中弥漫着刺鼻的金属味。盖革计数器疯狂作响。',
    choices:[{text:'快速绕行',eff:{fatigue:10,health:-3}},{text:'穿防辐射装备慢慢通过',eff:{fatigue:5}},{text:'采样研究',eff:{health:-8},items:[{n:'防辐射药',q:[1,1]}]}]},
  {id:'old_warehouse',cat:'discovery',ctx:{minDist:5,maxDist:15},narr:'一座废弃的大型仓库矗立在荒野中。卷帘门半开着，里面黑暗中隐约能看到堆叠的货架。这是一座未被完全搜刮的宝藏。',
    choices:[{text:'深入仓库探索',eff:{fatigue:15},items:[{n:'罐头',q:[2,5]},{n:'工具',q:[1,2]},{n:'金属片',q:[2,4]},{n:'木材',q:[1,3]},{n:'钉子',q:[2,4]},{n:'绳子',q:[1,2]}]},{text:'在门口附近搜刮',eff:{fatigue:6},items:[{n:'罐头',q:[1,2]}]},{text:'建筑可能坍塌，放弃',eff:{}}]},
  {id:'military_checkpoint',cat:'discovery',ctx:{minDist:6,maxDist:18},narr:'战前军方设置的一个检查站出现在眼前。沙袋工事后面能看到弹药箱和一些武器零件散落。这里似乎发生过激烈交火。',
    choices:[{text:'仔细搜索',eff:{fatigue:10},items:[{n:'弹药',q:[3,6]},{n:'军用口粮',q:[1,3]},{n:'武器零件',q:[1,2]}]},{text:'只拿武器弹药',eff:{fatigue:5},items:[{n:'弹药',q:[2,4]}]},{text:'可能有未爆弹，小心',eff:{}}]},
  {id:'landslide',cat:'danger',ctx:{minDist:5,maxDist:15,weather:['rain','heavy_rain']},narr:'连续的雨水让前方的山坡变得松软。突然，一阵轰隆声响起——山体滑坡！石块和泥土朝着你的方向滚滚而来。',

  {id:'solar_panels',cat:'discovery',ctx:{minDist:4,maxDist:14,day:true},narr:'一栋建筑的屋顶上安装着几块太阳能板，在阳光下熠熠生辉。连接线缆虽然老旧但看起来还能用。这可是珍贵的电力来源。',
    choices:[{text:'爬上去拆卸太阳能板',eff:{fatigue:12},items:[{n:'太阳能板',q:[1,2]},{n:'电子零件',q:[1,2]}]},{text:'检查连接设备',eff:{fatigue:6},items:[{n:'电池',q:[1,3]}]},{text:'太危险了',eff:{}}]},

      {w:3,eff:{fatigue:8},items:[{n:'吗啡',q:[1,1]}],desc:'在急救推车上找到了一小瓶吗啡——强效止痛药，废土上很难得的东西。'},

  {id:'bandit_ambush',cat:'danger',ctx:{minDist:8,maxDist:20},narr:'嗖——一支箭矢擦过耳边钉在了旁边的墙上！三个掠夺者从废墟高处朝你射击。他们早就发现了你，一直在等你进入射程。',

  {id:'underground_bunker',cat:'discovery',ctx:{minDist:10,maxDist:20},narr:'地面上一个厚厚的铁门引起了你的注意。打开后，一条向下的楼梯通向一个战前建造的地下掩体。电力系统居然还在运作。',

      {w:3,eff:{fatigue:10},items:[{n:'罐头',q:[1,2]}],desc:'掩体深处传来奇怪的声响——有什么东西在里面。你不想冒险，匆匆拿了些物资就离开了。'},
    ]},{text:'保持警惕慢慢搜索',outcomes:[
      {w:5,eff:{fatigue:8},items:[{n:'罐头',q:[2,3]},{n:'净水',q:[1,2]}],desc:'你的谨慎得到了回报——在入口附近就找到了足够的物资，没有触发任何潜在的陷阱。'},
      {w:3,eff:{fatigue:8},items:[{n:'罐头',q:[1,1]}],desc:'花了不少时间检查每个角落，但安全第一。找到的物资不多，好在毫发无伤。'},
      {w:2,eff:{fatigue:8},desc:'你在掩体里遇到了一只变异老鼠——它被你的出现吓到，慌不择路地跑进了深处。你们俩都空手而归。'},
    ]},{text:'这里可能有人住',eff:{},outcome:'你注意到墙角有新鲜的脚印和没燃尽的蜡烛。这里确实有人——也许是暂时离开了。你决定不惹麻烦快速离开。'}]},
  {id:'radiation_storm',cat:'danger',ctx:{minDist:5,maxDist:20,weather:['sandstorm']},narr:'天空变成了诡异的橙色。辐射风暴即将来临——狂风夹带着发光的辐射尘埃，铺天盖地地席卷而来。你必须立刻寻找掩护！',
    choices:[{text:'冲进最近的建筑',eff:{fatigue:10,health:-8}},{text:'用衣服遮盖口鼻趴下',eff:{fatigue:5,health:-15}},{text:'服用防辐射药硬抗',eff:{health:-5},need:'防辐射药'}]},
  {id:'wasteland_beast',cat:'danger',ctx:{minDist:10,maxDist:20},narr:'地面震动——一只三层楼高的巨型变异生物从废墟中站起。它似乎没有注意到你，但每走一步都在震动大地。这是废土的真正统治者。',
    choices:[{text:'躲在废墟中等它离开',eff:{fatigue:8}},{text:'观察它的行动路线',eff:{fatigue:3,morale:-3}},{text:'冒险绕过继续前进',eff:{fatigue:12}}]},

  // === 夜间事件 ===
  {id:'night_howl',cat:'danger',ctx:{night:true},narr:'夜幕中传来狼嚎——或者是什么更可怕的生物的叫声。声音此起彼伏，似乎在互相交流。它们正在靠近。',

  {id:'stranger_night',cat:'npc',ctx:{night:true,minDist:0,maxDist:10},narr:'黑暗中一个人影踉踉跄跄地朝你走来。借着月光，你看到这是一个受了伤的幸存者，身上有明显的咬伤。"帮帮我…"他的声音虚弱。',

  {id:'night_loot',cat:'discovery',ctx:{night:true,minDist:2,maxDist:12},narr:'月光下，你注意到一栋建筑的窗户里透出微弱的光——不是电灯，而是某种荧光。这种光通常意味着里面有放射性物质或发光的变异生物。',
    choices:[{text:'潜入建筑调查',eff:{fatigue:10,health:-3},items:[{n:'防辐射药',q:[1,2]},{n:'电子零件',q:[1,2]}]},{text:'标记位置明天再来',eff:{}},{text:'远远避开发光建筑',eff:{}}]},
  {id:'campfire_glow',cat:'npc',ctx:{night:true,minDist:2,maxDist:10},narr:'远处的黑暗中有一团篝火的光芒。走近后你看到两个人影围坐在火旁，烤着什么东西。香味飘过来，令人垂涎。',
    choices:[{text:'接近并打招呼',eff:{morale:6,nutrition:5}},{text:'暗中观察他们的动向',eff:{fatigue:3}},{text:'绕开避免接触',eff:{}}]},

  // === 天气相关事件 ===
  {id:'rain_collection',cat:'discovery',ctx:{weather:['rain','heavy_rain']},narr:'雨水顺着建筑的排水管哗哗流下。虽然是雨水，但在废土上每一滴水都弥足珍贵。你可以趁机收集大量用水。',

  {id:'snow_shelter',cat:'discovery',ctx:{weather:['snow'],seasons:['winter']},narr:'大雪覆盖了一切。你发现了一处被积雪半掩的洞穴。进入后，里面干燥温暖——似乎有地热活动。这是冬季废土上难得的避风港。',
    choices:[{text:'在洞穴里休息',eff:{fatigue:-15,morale:5}},{text:'搜索洞穴深处',eff:{fatigue:10},items:[{n:'木材',q:[1,3]}]},{text:'短暂休息后离开',eff:{fatigue:-5}}]},

  // === 营地事件 ===

  {id:'camp_repair',cat:'camp',ctx:{atCamp:true},narr:'检查营地时你发现几处围栏已经松动，屋顶也有些漏水。也许该花些时间修缮一下营地。',

  {id:'camp_garden',cat:'camp',ctx:{atCamp:true,seasons:['spring','summer']},narr:'营地角落的土地看起来可以开垦。你还保留着一些种子，也许可以试着种点什么——虽然废土的土壤可能已经被污染。',
    choices:[{text:'开垦种植',eff:{fatigue:8,morale:8},items:[{n:'种子',q:[-1,-1]}]},{text:'先测试土壤',eff:{fatigue:3}},{text:'土壤可能被污染',eff:{}}]},

  // === 受伤相关事件 ===
  {id:'medic_npc',cat:'npc',ctx:{injured:true,minDist:0,maxDist:12},narr:'一个背着医药箱的中年女人从废墟中走出来。她看到了你的伤势，皱起眉头。"你的伤口需要处理。我是医生，可以帮你。"',
    choices:[{text:'接受治疗',eff:{health:10,morale:8}},{text:'请她加入小队',recruit:true,eff:{morale:5}},{text:'婉拒好意',eff:{}}]},
  {id:'pain_management',cat:'medical',ctx:{pain:40},narr:'疼痛让每一步都变得艰难。你找到了一个相对隐蔽的角落，可以停下来检查伤口、更换绷带。',

  // === 更多事件 ===
  {id:'gas_station',cat:'discovery',ctx:{minDist:2,maxDist:15},narr:'一座废弃的加油站出现在路边。地下储油罐可能还有残留的燃料，便利店也可能还有存货。',

  {id:'school_ruins',cat:'discovery',ctx:{minDist:4,maxDist:16},narr:'一所废弃学校的残骸。教室里的桌椅散乱，黑板上还留着战前最后的板书。图书馆、医务室和科学实验室可能还有值得搜刮的东西。',

  {id:'river_crossing',cat:'danger',ctx:{minDist:5,maxDist:18},narr:'一条湍急的河流挡住了去路。桥梁早已坍塌，剩下的桥墩上锈迹斑斑。河对岸隐约能看到一些建筑和物资。',
    choices:[{text:'涉水过河',eff:{fatigue:15,bodyWet:60}},{text:'寻找浅滩',eff:{fatigue:10}},{text:'沿着河岸走',eff:{fatigue:6}}]},
  {id:'sandstorm_coming',cat:'danger',ctx:{weather:['sandstorm']},narr:'远处地平线上升起了一道巨大的沙墙——沙尘暴正在逼近。狂风夹杂着带辐射的沙粒，能见度骤降到几乎为零。',
    choices:[{text:'紧急寻找掩体',eff:{fatigue:10}},{text:'用衣物护住头面部继续走',eff:{fatigue:8,health:-5}},{text:'趴下等待沙尘暴过去',eff:{fatigue:5,health:-3}}]},
  {id:'friendly_encounter',cat:'npc',ctx:{minDist:2,maxDist:14},narr:'一个年轻的幸存者从废墟中探出头。"嘿！你也是单独行动的吗？废土上独自生存太难了。也许我们可以结伴？"他眼中充满了渴望。',
    choices:[{text:'欢迎他加入小队',outcomes:[
      {w:5,eff:{},desc:'他欣喜若狂地跟上了你。多一个人多一份力——废土上，同伴比黄金更珍贵。',recruit:true},
      {w:3,eff:{},desc:'就在他准备跟上来时，远处传来枪声。他脸色一变，说了声抱歉就仓皇逃走了——看来有人在追他。'},
      {w:2,eff:{},lose:2,desc:'你转身带路，却发现他偷偷伸手摸向你的背包。"嘿！"你猛回头，他拔腿就跑——手里攥着你的物资。'},
    ]},{text:'给他一些物资然后告别',outcomes:[
      {w:5,eff:{},items:[{n:'罐头',q:[-1,-1]}],desc:'你把一罐罐头递给他。他感激地接过去，眼眶有点湿润。"谢谢你，好心人。我会记住的。"'},
      {w:3,eff:{},items:[{n:'罐头',q:[-1,-1]}],desc:'他接过罐头后犹豫了一下，从口袋里掏出一张皱巴巴的地图。"这个可能对你有用..."'},
      {w:2,eff:{},items:[{n:'罐头',q:[-1,-1]}],desc:'他拿了罐头后头也不回地走了。连声谢谢都没有——这就是废土，不是每个人都有感恩的心。'},
    ]},{text:'拒绝他自己走了',outcomes:[
      {w:6,eff:{},desc:'你摇了摇头继续前行。废土上不能随便相信陌生人——这个道理你早就学会了。'},
      {w:4,eff:{morale:-3},desc:'他失望的眼神让你有些动摇，但你还是坚持了决定。独自行动虽然孤独，至少安全可控。'},
    ]}]},
  {id:'food_trap',cat:'danger',ctx:{minDist:3,maxDist:12},narr:'一间小屋的桌上摆着几罐完好的罐头，看起来像是有人遗落的。但地面有不自然的痕迹——这可能是一个陷阱。',
    choices:[{text:'小心检查陷阱',outcomes:[
      {w:5,eff:{fatigue:6},items:[{n:'罐头',q:[2,3]}],desc:'你的谨慎得到了回报。你发现了绊线并安全解除，不仅拿到了桌上的罐头，还在柜子里发现了更多。'},
      {w:3,eff:{fatigue:6},desc:'检查后发现这根本不是什么陷阱——只是风吹倒了家具留下的痕迹。但桌上只有空罐子。白费力气。'},
      {w:2,eff:{fatigue:6,health:-5},desc:'你虽然发现了绊线，但触碰时引发了另一个隐藏机关。碎玻璃从天而降划破了你的手臂。没拿到罐头。'},
    ]},{text:'直接用长棍挑开',outcomes:[
      {w:4,eff:{fatigue:3},items:[{n:'罐头',q:[1,2]}],desc:'你用长棍小心翼翼地把罐头拨了过来——安全！轻松拿到了两罐。'},
      {w:4,eff:{fatigue:3,health:-3},desc:'长棍碰到了机关——啪！一个捕兽夹弹了起来，碎片溅到你腿上。还好威力不大。没拿到罐头。'},
      {w:2,eff:{fatigue:3,health:-10},desc:'轰！这不是简单的陷阱——桌子下面埋了炸药！冲击波把你掀翻在地。耳朵嗡嗡作响了好一阵。'},
    ]},{text:'陷阱太危险了',eff:{fatigue:1},outcome:'你果断放弃了这块诱饵。废土上死于贪心的人比死于饥饿的人还多。'}]},
  {id:'wounded_animal',cat:'hunt',ctx:{minDist:2,maxDist:14},narr:'一只受伤的变异鹿躺在草地上，后腿有明显的撕裂伤。它已经跑不动了，但还在挣扎着想要站起来。这是送上门的食物。',
    choices:[{text:'人道地结束它的痛苦',eff:{morale:-3},items:[{n:'变异兽肉',q:[4,8]}]},{text:'尝试救治它',eff:{morale:8,fatigue:6}},{text:'不管它继续走',eff:{}}]},
  {id:'found_map',cat:'discovery',ctx:{minDist:5,maxDist:18},narr:'一张手绘的地图被钉在墙上。上面标注了附近几个重要地点：水源、物资储藏点、危险区域。虽然有些过时，但非常有用。',
    choices:[{text:'仔细研究地图',eff:{fatigue:3},items:[{n:'地图碎片',q:[1,2]}]},{text:'按照地图去最近标记点',eff:{fatigue:8},items:[{n:'罐头',q:[1,2]},{n:'净水',q:[1,2]}]},{text:'拿走地图备用',eff:{},items:[{n:'地图碎片',q:[1,1]}]}]},

  {id:'frozen_lake',cat:'danger',ctx:{minDist:5,maxDist:18,seasons:['winter']},narr:'一片冻结的湖面横跨在前方。远处湖对岸能看到一间小屋。冰面看起来很厚，但废土上的冰层可能不太稳定。',

  {id:'tunnel_entrance',cat:'discovery',ctx:{minDist:5,maxDist:18},narr:'一个废弃的地铁隧道入口从瓦砾中露出来。隧道深处漆黑一片，但空气中有股霉味——说明内部空间很大。',

  {id:'radio_transmission',cat:'mystery',ctx:{minDist:5,maxDist:20},narr:'你的收音机突然收到了信号——一个声音在重复播放："这里是第七避难所，我们还有空间和物资。坐标在..."信号断断续续，但听起来像是真的。',
    choices:[{text:'尝试追踪信号',eff:{fatigue:8},items:[{n:'电子零件',q:[1,1]}]},{text:'记下坐标日后探索',eff:{morale:10}},{text:'可能是陷阱',eff:{}}]},
  {id:'berry_bush_field',cat:'discovery',ctx:{minDist:3,maxDist:10,seasons:['summer','autumn']},narr:'一大片野莓灌木丛。成熟的红色浆果挂满枝头，足够采摘好一阵子。几只小鸟正在啄食——说明它们是可以吃的。',

  {id:'collapsed_bridge',cat:'danger',ctx:{minDist:5,maxDist:20},narr:'前方必经之路上的一座桥彻底坍塌了。桥下是深达数十米的峡谷。唯一的办法是从谷底绕过去或寻找其他路径。',
    choices:[{text:'冒险从峡谷边缘攀爬下去',eff:{fatigue:20,health:-5}},{text:'寻找其他路线',eff:{fatigue:12}},{text:'用工具搭建简易通道',eff:{fatigue:15},need:'工具'}]},
  // === 新增：环境威胁 ===
  {id:'toxic_smoke',cat:'danger',ctx:{minDist:3,maxDist:15,weather:['none']},narr:'前方废墟中冒出滚滚浓烟——不知是火灾还是化学泄漏。刺鼻的气味隔着老远都能闻到，浓烟正朝你的方向蔓延。',
    choices:[{text:'绕道避开浓烟区',eff:{fatigue:8}},{text:'用湿布捂住口鼻快速穿过',eff:{fatigue:6,health:-5},need:'净水'},{text:'原地等待烟雾散去',eff:{fatigue:3}}]},
  {id:'quake_aftershock',cat:'danger',ctx:{minDist:3,maxDist:18},narr:'地面突然剧烈震动——余震！附近的建筑物发出不祥的嘎吱声，碎玻璃和瓦砾从高处坠落。你必须立刻做出反应。',
    choices:[{text:'冲向开阔地带',eff:{fatigue:10}},{text:'躲在坚固的桌子或门框下',eff:{fatigue:5}},{text:'护住头部原地蹲下',eff:{fatigue:3,health:-3}}]},
  {id:'swarm_rats',cat:'danger',ctx:{minDist:2,maxDist:12,night:true},narr:'黑暗中传来窸窣声——几十只变异老鼠从下水道涌出，密密麻麻地填满了小巷。它们的眼睛在黑暗中闪着红光。',
    choices:[{text:'点燃火把驱赶',eff:{fatigue:5},need:'打火机'},{text:'爬上高处躲避',eff:{fatigue:8}},{text:'快速冲过去',eff:{health:-5,fatigue:6}}]},
  {id:'dust_storm_warning',cat:'danger',ctx:{minDist:5,maxDist:20,weather:['none']},narr:'天际线变成了一片褐色——巨大的沙尘暴正在逼近。空气中已经能闻到尘土的味道，能见度正在迅速下降。遮天蔽日的沙墙越来越近。',
    choices:[{text:'立即寻找掩体',eff:{fatigue:8}},{text:'用衣物包裹全身趴下',eff:{bodyWet:10,fatigue:3}},{text:'趁还能看到路赶紧跑',eff:{fatigue:15,health:-5}}]},
  {id:'flood_warning',cat:'danger',ctx:{minDist:3,maxDist:14,weather:['rain','heavy_rain']},narr:'连续降雨让附近的河流水位暴涨。浑浊的洪水正从上游奔涌而来，淹没了低洼地带。你现在站的位置很快也会被淹没。',
    choices:[{text:'向高处转移',eff:{fatigue:10}},{text:'涉水快速通过',eff:{bodyWet:50,fatigue:8}},{text:'寻找漂浮物',eff:{fatigue:6}}]},
  // === 新增：社交遭遇 ===
  {id:'trader_caravan',cat:'npc',ctx:{minDist:3,maxDist:15},narr:'远处传来驼铃声——一支小型贸易商队正沿着废土公路缓缓前行。三辆改装过的装甲车，车顶架着机枪。一个商人朝你挥手。"需要什么吗，幸存者？我们有武器零件和医疗用品，可以用弹药或食物来换。"',
    choices:[{text:'用弹药交换医疗用品',items:[{n:'弹药',q:[-3,-3]},{n:'医疗包',q:[1,2]},{n:'绷带',q:[2,3]}]},{text:'用罐头交换武器零件',items:[{n:'罐头',q:[-3,-3]},{n:'武器零件',q:[1,2]},{n:'弹药',q:[1,2]}]},{text:'打听情报就离开',eff:{morale:5}}]},
  {id:'refugee_family',cat:'npc',ctx:{minDist:1,maxDist:10},narr:'一家三口缩在废墟角落里——父亲、母亲和一个小女孩。他们的物资已经耗尽，小女孩饿得脸色苍白。父亲看到你，眼中闪过一丝希望。',
    choices:[{text:'分一些食物给他们',eff:{morale:15,nutrition:-8}},{text:'指引他们去你的营地',eff:{morale:10}},{text:'抱歉无法帮忙',eff:{morale:-5}}]},
  {id:'rival_scavenger',cat:'npc',ctx:{minDist:4,maxDist:16},narr:'一个全副武装的拾荒者从废墟另一侧走出来。他冷冷地盯着你，手指搭在扳机上。"这片区域是我的地盘。你最好离开。"气氛骤然紧张。',
    choices:[{text:'友好协商共享区域',eff:{fatigue:2},items:[{n:'罐头',q:[1,1]}],outcome:'你举起双手表示没有敌意。"废土够大，没必要自相残杀。"他犹豫了一下，最终放下枪。你们各自分头搜索，他还给你指了一个有物资的方向。'},{text:'展示武力不退让',eff:{fatigue:8,health:-3},outcome:'你也握紧了武器。两人对峙了几秒，他啐了一口转身走了——但你知道这种人不会善罢甘休。'},{text:'换个方向避开冲突',eff:{fatigue:3},outcome:'多一事不如少一事。你默默退出了这片区域，绕道继续前进。在废土上，活下来比面子重要。'}]},
  {id:'lost_child',cat:'npc',ctx:{minDist:1,maxDist:8},narr:'废墟中传来小孩的哭声。一个七八岁的男孩蜷缩在角落里，身上脏兮兮的，脚上只有一只鞋。他看到你时本能地缩了缩身子。"我...我找不到我妈妈了..."',
    choices:[{text:'安抚他带他回营地',outcomes:[
      {w:5,eff:{},desc:'你蹲下来轻声安慰他。孩子犹豫了一下，最终握住了你的手。在废土上挽救一个孩子——无论结果如何，这都让你觉得自己还是个人。营地现在多了一个小成员。',adoptChild:true},
      {w:3,eff:{},desc:'就在你准备带他走时，一个女人从废墟中冲了出来——是他的母亲！她紧紧抱住孩子，泣不成声。"谢谢你照顾他...这些给你。"她塞给你一些物资。',items:[{n:'罐头',q:[1,2]},{n:'净水',q:[1,1]}]},
      {w:2,eff:{health:-5},desc:'孩子突然狠狠咬了你一口，挣脱后拔腿就跑。远处传来几个成年人的笑声——这是个诱饵！你被引到了掠夺者的埋伏圈边缘。赶紧撤离。'},
    ]},{text:'给他一些食物和水',outcomes:[
      {w:5,eff:{nutrition:-3},desc:'孩子狼吞虎咽地吃着，脸上终于有了一丝血色。他指了指一个方向说妈妈往那边走了。你把他留在一个相对安全的地方，留下了一些食物。'},
      {w:3,eff:{nutrition:-3},desc:'他吃完后沉默了一会儿，然后从口袋里掏出一个小东西递给你——是一枚战前的徽章。虽然没什么用，但这是他最珍贵的东西了。'},
      {w:2,eff:{nutrition:-3},desc:'食物刚递过去，几个成年人突然从拐角冲出来——又是个陷阱！他们抢走了你身上的一些物资后带着孩子跑了。',lose:1},
    ]},{text:'帮他寻找母亲',outcomes:[
      {w:4,eff:{fatigue:10},items:[{n:'罐头',q:[1,2]}],desc:'你带着孩子在废墟中找了几个小时。没有找到他的母亲，但在一栋废弃公寓里发现了一些物资。你把孩子带回了营地——至少这里有篝火和食物。',adoptChild:true},
      {w:3,eff:{fatigue:8},desc:'搜索无果。孩子累了，靠在你肩上睡着了。你在黄昏前返回了营地。也许明天可以继续找。'},
      {w:3,eff:{fatigue:12,health:-5},wound:{part:'leftLeg',sev:2,desc:'从二楼摔下扭伤了左腿',bleed:false},desc:'搜寻时你踩到了一块松动的楼板，从二楼摔了下去。孩子吓坏了但没受伤。你的左腿扭伤了，走路一瘸一拐。'},
    ]}]},
  {id:'radio_distress',cat:'mystery',ctx:{minDist:5,maxDist:20},narr:'收音机里突然传来紧急呼叫——"这里是第七医疗队，我们有重伤员，需要紧急援助！重复，需要紧急援助！坐标是..."信号来自西北方向大约三公里处。',
    choices:[{text:'赶往信号源救人',eff:{fatigue:12,morale:10}},{text:'谨慎靠近先观察',eff:{fatigue:6}},{text:'可能是掠夺者的陷阱',eff:{}}]},
  // === 新增：神秘/发现 ===
  {id:'prewar_lab',cat:'discovery',ctx:{minDist:8,maxDist:20},narr:'一栋不起眼的建筑后面隐藏着一个战前生物实验室的入口。门上贴着生物危害标志，但已经被人撬开过。里面可能还有有价值的医疗和研究设备。',
    choices:[{text:'穿防护装备进入',eff:{fatigue:12},items:[{n:'医疗包',q:[1,3]},{n:'抗生素',q:[1,2]},{n:'防辐射药',q:[1,2]}]},{text:'只在门口搜索',eff:{fatigue:5},items:[{n:'绷带',q:[1,2]}]},{text:'太危险了放弃',eff:{}}]},
  {id:'working_vending',cat:'discovery',ctx:{minDist:3,maxDist:14},narr:'一台奇迹般还在运作的自动售货机孤零零地立在废墟中。屏幕闪烁着微弱的蓝光，里面还有不少存货。看来有人用电池给它供过电。',
    choices:[{text:'用工具撬开取货',eff:{fatigue:5},items:[{n:'罐头',q:[1,3]},{n:'能量饮料',q:[1,2]}]},{text:'检查电路看能否利用',eff:{fatigue:8},items:[{n:'电池',q:[1,2]},{n:'电子零件',q:[1,2]}]},{text:'留作纪念走了',eff:{}}]},
  {id:'strange_lights',cat:'mystery',ctx:{minDist:6,maxDist:20,night:true},narr:'夜空中出现了奇异的蓝绿色光带，像是极光但更近。光带在地平线上缓缓飘动，照亮了整片废墟。空气中弥漫着微弱的臭氧味。',
    choices:[{text:'朝光源方向探索',eff:{fatigue:10,morale:5},items:[{n:'电子零件',q:[1,2]}]},{text:'远远观察记录',eff:{morale:8}},{text:'可能是辐射现象远离',eff:{}}]},
  {id:'graffiti_clue',cat:'mystery',ctx:{minDist:2,maxDist:14},narr:'墙上有一幅新鲜的涂鸦——箭头指向东边，下方写着"安全区域，有净水"。字迹还很新，大概是最近几天画的。但这可能是善意指引，也可能是陷阱。',
    choices:[{text:'按照指引探索',eff:{fatigue:6},items:[{n:'净水',q:[1,3]}]},{text:'反方向探索',eff:{fatigue:6}},{text:'无视继续原路线',eff:{}}]},
  {id:'old_bunker_door',cat:'discovery',ctx:{minDist:7,maxDist:20},narr:'一个厚重的圆形钢门半埋在土里——这是战前政府建造的防辐射掩体。门上装有密码锁，但旁边有人用喷漆写下了密码。里面可能保存着完好的战前物资。',
    choices:[{text:'输入密码打开',eff:{fatigue:14},items:[{n:'军用口粮',q:[2,5]},{n:'净水',q:[2,4]},{n:'武器零件',q:[1,3]},{n:'急救手册',q:[1,1]}]},{text:'小心检查是否有警报',eff:{fatigue:6},items:[{n:'罐头',q:[1,2]}]},{text:'门太重了打不开',eff:{}}]},
  // === 新增：营地事件 ===
  {id:'camp_weatherproof',cat:'camp',ctx:{atCamp:true,weather:['rain','heavy_rain']},narr:'雨水从营地屋顶的裂缝滴落。几处漏水让地面变得泥泞。趁雨还没下大，也许该修补一下屋顶和防水。',
    choices:[{text:'用防水布修补屋顶',eff:{fatigue:8},need:'防水布'},{text:'用木材临时加固',eff:{fatigue:6},need:'木材'},{text:'等雨停了再说',eff:{bodyWet:10}}]},
  {id:'camp_strange_sound',cat:'camp',ctx:{atCamp:true,night:true},narr:'夜深了，营地外传来奇怪的声音——不是野兽，更像是金属刮擦的声响。有什么东西在营地外围游荡。篝火的光芒似乎让它不敢靠近。',
    choices:[{text:'拿起武器出去查看',outcomes:[
      {w:3,eff:{fatigue:8},items:[{n:'金属片',q:[1,3]}],desc:'原来是一只变异穿山甲在翻垃圾。你赶走了它，还在它刨过的地方找到了几块废金属。'},
      {w:4,eff:{fatigue:8},desc:'你举着火把在营地外转了一圈——什么都没发现。可能是风声，也可能是什么东西已经跑了。'},
      {w:3,eff:{fatigue:8,health:-8},desc:'黑暗中一个黑影扑了过来！你和一个变异犬缠斗了几个回合，虽然赶走了它但手臂被咬了一口。'},
    ]},{text:'往篝火里加柴保持明亮',outcomes:[
      {w:5,eff:{fatigue:2},desc:'你往篝火里添了几根木柴，火焰蹿得更高了。外面的声音渐渐远去——光明是废土最好的护身符。',need:'木材'},
      {w:5,eff:{fatigue:3},desc:'没有木柴可加。你只能握紧武器盯着黑暗，祈祷篝火撑到天亮。声音在半小时后消失了。'},
    ]},{text:'待在营地不出声',outcomes:[
      {w:5,eff:{},desc:'你屏住呼吸一动不动。半小时后，声音渐渐远去。不管那是什么，它没有发现你。'},
      {w:3,eff:{},lose:1,desc:'第二天早上，你发现营地外围的一些物资不见了。看来那东西是来觅食的——而你的物资刚好在它的菜单上。'},
      {w:2,eff:{health:-5},desc:'半夜的时候那个东西摸进了营地——一只变异獾。它咬伤了你的小腿后逃走了。伤口需要处理。'},
    ]}]},
  {id:'camp_old_photo',cat:'camp',ctx:{atCamp:true},narr:'整理营地时你发现了一张泛黄的照片——照片上是一家人站在房子前微笑。背面写着"永远在一起 2035"。照片中的房子看起来和营地所在的位置很像。',
    choices:[{text:'把照片挂在墙上当作纪念',eff:{morale:10}},{text:'翻看有没有更多遗物',eff:{morale:5,fatigue:3}},{text:'收起来不看了',eff:{}}]},
  {id:'camp_visitor_night',cat:'camp',ctx:{atCamp:true,night:true},narr:'营地的篝火在黑暗中格外显眼。一个浑身湿透的幸存者跌跌撞撞地出现在围栏边。他看起来又冷又饿。"求求你...让我烤烤火，我只待一晚..."',
    choices:[{text:'让他进来分享篝火',outcomes:[
      {w:4,eff:{fatigue:-3},items:[{n:'罐头',q:[1,2]}],desc:'陌生人在篝火旁暖和过来后，从怀里掏出两罐罐头作为感谢。"我在路上找到的，分你一半。"天亮后他安静地离开了。'},
      {w:3,eff:{fatigue:-2},desc:'他烤了烤火，暖和过来后道了声谢就走了。没有什么特别的事发生——在废土上，平淡也是一种幸运。'},
      {w:2,eff:{},lose:2,desc:'早上醒来你发现陌生人已经不见了——同时消失的还有你的部分物资。他利用你的善意偷走了东西。'},
      {w:1,eff:{health:-10,fatigue:8},desc:'篝火旁，他突然拔出一把匕首刺向你！"抱歉兄弟，废土上只能为自己活。"你奋力将他击退，但胸口被划了一道。'},
    ]},{text:'给他一些食物和水但不让进',outcomes:[
      {w:5,eff:{nutrition:-3},desc:'你把食物和水从围栏递出去。他感激地接过去，在营地外找了个角落蜷缩了一晚。第二天早上他已经走了。'},
      {w:3,eff:{nutrition:-3},items:[{n:'弹药',q:[1,2]}],desc:'他接过食物后犹豫了一下，从兜里掏出几发子弹。"我没什么能回报的...这个给你。"'},
      {w:2,eff:{nutrition:-3},desc:'他拿了食物后面色一变。"就这点？"他骂骂咧咧地走了——看来你的善心喂了狗。'},
    ]},{text:'保持警惕拒绝',outcomes:[
      {w:6,eff:{},desc:'你摇了摇头。"抱歉，我不能冒险。"他叹了口气，转身消失在夜色中。废土让人心变硬——但有时候这能保命。'},
      {w:4,eff:{morale:-3},desc:'他离开时回头看了你一眼，目光中满是失望。你有些愧疚，但在废土上活着比善良更重要。'},
    ]}]},
  // === 新增：饥饿/口渴/疲惫触发的特殊事件 ===
  {id:'starving_hallucination',cat:'survival',ctx:{tired:true,hungry:true,minDist:3,maxDist:18},narr:'饥饿和疲惫让你的感官开始变得不可靠。你似乎闻到了烤肉的香味——但这不可能，这里是废土。你真的看到了远处有炊烟，还是只是幻觉？',
    choices:[{text:'跟随香味探查',eff:{fatigue:8},items:[{n:'罐头',q:[1,2]}]},{text:'这是幻觉必须休息',eff:{fatigue:-5}},{text:'不管它继续走',eff:{fatigue:5,morale:-3}}]},
  {id:'emergency_water_source',cat:'survival',ctx:{thirsty:true,minDist:2,maxDist:14},narr:'干渴让你的喉咙像被砂纸打磨过。就在你快要撑不住的时候，你注意到一栋建筑外墙上有冷凝水管在缓缓滴水。水珠在阳光下闪闪发光。',
    choices:[{text:'赶紧收集滴水',eff:{hydration:15},items:[{n:'净水',q:[1,2]}]},{text:'直接张嘴接水喝',eff:{hydration:18,infection:5}},{text:'顺着水管寻找水源',eff:{fatigue:8},items:[{n:'净水',q:[2,4]}]}]},
  {id:'makeshift_bed',cat:'survival',ctx:{tired:true,minDist:1,maxDist:12},narr:'疲惫到了极点——你发现了一个用旧沙发垫和破布搭成的简易床铺，看起来是之前的幸存者留下的。虽然简陋，但在废土上这简直是五星级酒店。',
    choices:[{text:'躺下休息一会儿',eff:{fatigue:-25}},{text:'短暂闭眼养神',eff:{fatigue:-12}},{text:'不敢在此停留',eff:{}}]},
  // === 新增：稀有/幸运事件 ===
  {id:'lucky_find_weapon',cat:'discovery',ctx:{minDist:5,maxDist:20},narr:'你踢到一个硬物——低头一看，一支被泥土半掩的步枪。虽然有些锈迹，但枪机还能正常运作。旁边还有几盒完好的弹药。这可是废土上最值钱的发现之一。',
    choices:[{text:'捡起步枪和弹药',eff:{morale:12,fatigue:5},items:[{n:'步枪',q:[1,1]},{n:'弹药',q:[3,6]}]},{text:'只拿弹药',eff:{fatigue:3},items:[{n:'弹药',q:[2,4]}]},{text:'检查枪支是否能用',eff:{fatigue:5}}]},
  {id:'medical_cabinet',cat:'discovery',ctx:{minDist:4,maxDist:18},narr:'一面墙上嵌着一个完好的急救柜——红色的十字标志已经褪色但还看得出。玻璃门有些裂纹但完好无损。里面的药品和绷带整整齐齐地排列着。',
    choices:[{text:'全部拿走',eff:{fatigue:8},items:[{n:'医疗包',q:[1,3]},{n:'绷带',q:[2,4]},{n:'抗生素',q:[1,2]},{n:'止痛药',q:[1,2]}]},{text:'拿走最需要的',eff:{fatigue:3},items:[{n:'绷带',q:[1,2]},{n:'医疗包',q:[1,1]}]},{text:'留给需要的人',eff:{morale:5}}]},
  {id:'intact_generator',cat:'discovery',ctx:{minDist:6,maxDist:20},narr:'一座小型发电机组几乎完好地躺在地下室里。油箱里还有燃料，拉了几下启动绳后——它居然轰隆隆地运转起来了！电力在废土上是无价之宝。',
    choices:[{text:'拆下可用的零件',eff:{fatigue:10},items:[{n:'电子零件',q:[2,5]},{n:'电池',q:[1,3]},{n:'机油',q:[1,2]}]},{text:'尝试搬运回营地',eff:{fatigue:18},items:[{n:'太阳能板',q:[1,1]}]},{text:'标记位置下次带工具来',eff:{morale:5}}]},

  // === 衣物获取事件 ===
  {id:'clothing_store',cat:'discovery',ctx:{minDist:2,maxDist:14},narr:'一座废弃的服装店出现在路边。橱窗玻璃碎了，但里面的模特身上还套着几件衣服。货架上叠着不少衣物，虽然落满了灰但看起来还能穿。',
    choices:[{text:'仔细挑选衣物',outcomes:[
      {w:4,eff:{fatigue:6},items:[{n:'羽绒服',q:[1,1]},{n:'毛线帽',q:[1,1]},{n:'围巾',q:[1,1]}],desc:'太棒了！羽绒服、毛线帽、围巾——这一套够你扛过整个冬天了。'},
      {w:3,eff:{fatigue:5},items:[{n:'棉袄',q:[1,1]},{n:'卫衣',q:[1,1]}],desc:'找到了几件厚实的冬衣——棉袄和加绒卫衣。在废土上，保暖就是保命。'},
      {w:3,eff:{fatigue:4},items:[{n:'工装裤',q:[1,1]},{n:'皮手套',q:[1,1]}],desc:'裤子区还有几条完好无损的工装裤，手套柜台也剩了几双。'},
    ]},{text:'快速翻找鞋帽区',outcomes:[
      {w:4,eff:{fatigue:4},items:[{n:'防水靴',q:[1,1]},{n:'运动鞋',q:[1,1]}],desc:'鞋区居然还有存货——一双防水靴和一双运动鞋，尺码刚好能穿。'},
      {w:3,eff:{fatigue:4},items:[{n:'毛线帽',q:[1,2]},{n:'皮帽',q:[1,1]}],desc:'帽子区还有不少存货——几顶毛线帽和一顶皮帽。'},
      {w:3,eff:{fatigue:3},desc:'鞋帽区已经被翻得乱七八糟，好货早被人拿走了。'},
    ]},{text:'随便看看就走',eff:{fatigue:1}}]},

  // === 材料搜集事件（解决其他材料难获得问题）===
  {id:'scavenge_materials',cat:'discovery',ctx:{minDist:0,maxDist:20},narr:'废墟中到处散落着战前的遗留物——生锈的金属、破碎的电子设备、废弃的布料。在废土上，任何东西都可能有它的用途。你弯下腰开始仔细翻找。',
    choices:[{text:'仔细搜寻可用材料',outcomes:[
      {w:5,eff:{fatigue:10},dynamicLoot:3,desc:'你在瓦砾中仔细翻找——废土虽然残酷，但从来不缺被遗忘的宝藏。找到了几样有用的材料。'},
      {w:3,eff:{fatigue:6},dynamicLoot:2,desc:'翻找了半晌，收获不算多但也够用。废土上每一块材料都可能救命。'},
      {w:2,eff:{fatigue:12},desc:'翻找了很久，只找到一些已经锈蚀的废铁。这片区域已经被搜刮干净了。'},
    ]},{text:'快速翻找后继续赶路',outcomes:[
      {w:5,eff:{fatigue:4},dynamicLoot:1,desc:'你快速扫了一遍废墟，顺手捡起了一些还能用的材料。效率不错。'},
      {w:3,eff:{fatigue:3},desc:'简单翻了翻，没发现什么特别的。时间要紧，继续上路。'},
      {w:2,eff:{fatigue:3,health:-3},desc:'匆忙中被一块锋利的金属划到了手指。好在伤口不深，但什么也没拿到。'},
    ]},{text:'不浪费时间了',eff:{fatigue:1},outcome:'在废土上时间是另一种资源。你决定不在这些瓦砾上浪费精力，继续前行。'}]},

  {id:'electronic_wreck',cat:'discovery',ctx:{minDist:2,maxDist:16},narr:'一台倒地的通讯设备残骸吸引了你的注意——看起来是战前的卫星通讯终端。虽然主体已经粉碎，但内部的电路板和连接器似乎还保存完好。',
    choices:[{text:'用工具仔细拆卸电路板',outcomes:[
      {w:5,eff:{fatigue:8},items:[{n:'电子零件',q:[1,4]},{n:'收音机零件',q:[1,2]},{n:'电池',q:[1,2]}],desc:'你小心翼翼地拆下了电路板、调谐器和几颗还能用的电容。这些东西在废土上足够组装一台收音机了。'},
      {w:3,eff:{fatigue:8},items:[{n:'电子零件',q:[1,2]}],desc:'大部分电路已经被腐蚀了，但你还是拆下了几个完好的电容和电阻。聊胜于无。'},
      {w:2,eff:{fatigue:6,health:-3},desc:'拆到一半，一个老化的电容器在你手中爆裂了——火花四溅。手指被烫了一下，板子也彻底毁了。'},
    ]},{text:'暴力拆解金属外壳',outcomes:[
      {w:4,eff:{fatigue:5},items:[{n:'金属片',q:[1,3]},{n:'铁皮',q:[1,2]}],desc:'外壳是不错的金属材料——你拆下了几块完好的铁皮和金属支架。建营地用得上。'},
      {w:3,eff:{fatigue:5},items:[{n:'金属片',q:[1,2]}],desc:'外壳锈得厉害，只拆下了几块还算平整的金属片。'},
      {w:3,eff:{fatigue:8},desc:'外壳卡得太死了。你使了半天劲纹丝不动，只好放弃。'},
    ]},{text:'搬回营地慢慢研究',eff:{fatigue:14},items:[{n:'电子零件',q:[1,3]},{n:'收音机零件',q:[1,1]},{n:'天线',q:[1,1]}]}]},

  {id:'construction_site',cat:'discovery',ctx:{minDist:2,maxDist:15},narr:'一座战前未完工的建筑工地出现在眼前。钢筋水泥的骨架还在，脚手架虽然锈迹斑斑但上面的材料却保存得相当完好。',
    choices:[{text:'收集建筑材料',outcomes:[
      {w:5,eff:{fatigue:10},items:[{n:'木材',q:[2,4]},{n:'金属片',q:[2,4]},{n:'钉子',q:[2,5]},{n:'铁皮',q:[1,3]}],desc:'工地简直是材料宝库——木板、金属片、钉子、铁皮，样样齐全！你的营地建设计划有了着落。'},
      {w:3,eff:{fatigue:8},items:[{n:'木材',q:[1,3]},{n:'钉子',q:[1,3]}],desc:'大部分材料已经风化，但你还是收集到了一些木材和钉子。'},
      {w:2,eff:{fatigue:8,health:-5},desc:'攀爬脚手架时踩到了一块松动的木板，脚下一滑——膝盖撞在钢梁上擦破了一大块皮。'},
    ]},{text:'搜索工棚遗留物',outcomes:[
      {w:5,eff:{fatigue:6},items:[{n:'工具',q:[1,2]},{n:'绳子',q:[1,3]},{n:'胶带',q:[1,2]}],desc:'工棚里留下了工人的工具箱——工具、绳子和胶带都还在。这可是实打实的好东西。'},
      {w:3,eff:{fatigue:6},items:[{n:'绳子',q:[1,2]}],desc:'工棚里值钱的东西都被拿走了，只找到几卷绳子。'},
      {w:3,eff:{fatigue:4},desc:'工棚空空如也。看来早有人来过。'},
    ]},{text:'标记位置下次带工具来',eff:{fatigue:2,morale:3}}]},

  {id:'sewing_shop',cat:'discovery',ctx:{minDist:1,maxDist:12},narr:'一间废弃的裁缝铺——橱窗里还挂着几件已经褪色的衣服。缝纫机上积满了灰，但旁边的货架上堆着不少布料和配件。墙上挂着几件做好的成品衣物。',
    choices:[{text:'翻找布料和成品衣物',outcomes:[
      {w:4,eff:{fatigue:6},items:[{n:'布料',q:[2,5]},{n:'防水布',q:[1,2]},{n:'胶带',q:[1,3]}],desc:'货架后面居然还有一卷防水布和几卷工业胶带！加上成堆的布料——这趟来对了。'},
      {w:3,eff:{fatigue:6},items:[{n:'毛衣',q:[1,1]},{n:'围巾',q:[1,2]},{n:'布料',q:[1,2]}],desc:'墙上还挂着几件成品——一件厚毛衣和两条围巾，保存得还不错。'},
      {w:3,eff:{fatigue:5},items:[{n:'布料',q:[2,4]}],desc:'大部分布料已经发霉了，但你还是找到了几匹还能用的。'},
      {w:3,eff:{fatigue:5},items:[{n:'布料',q:[2,4]}],desc:'大部分布料已经发霉了，但你还是找到了几匹还能用的。'},
      {w:2,eff:{fatigue:4},desc:'布料全被老鼠啃坏了。白来一趟。'},
    ]},{text:'拆下缝纫机零件',outcomes:[
      {w:4,eff:{fatigue:6},items:[{n:'金属片',q:[1,2]},{n:'电子零件',q:[1,1]}],desc:'老缝纫机的电机和金属框架还有些利用价值。'},
      {w:3,eff:{fatigue:6,health:-3},desc:'拆缝纫机时手被针扎了一下——战前的缝衣针还留着呢。虽然疼但没什么大碍。'},
      {w:3,eff:{fatigue:8},desc:'缝纫机锈成了一块铁疙瘩，拆不下来任何有用的东西。'},
    ]},{text:'看看有没有成品衣物',eff:{fatigue:3},items:[{n:'布料',q:[1,2]}]}]},

  {id:'abandoned_factory',cat:'discovery',ctx:{minDist:6,maxDist:20},narr:'一座废弃的工厂矗立在荒野中。招牌已经模糊不清，但从建筑规模来看曾是重要的生产基地。车间里机器林立，地上散落着各种工业零件。',
    choices:[{text:'搜索车间零件',outcomes:[
      {w:4,eff:{fatigue:12},items:[{n:'金属片',q:[2,5]},{n:'铁皮',q:[1,3]},{n:'铁丝网',q:[1,2]},{n:'机油',q:[1,2]}],desc:'车间里到处是工业零件——金属片、铁皮、铁丝网，还有几桶没开封的机油。简直发了笔横财。'},
      {w:3,eff:{fatigue:10},items:[{n:'金属片',q:[1,3]},{n:'机油',q:[1,1]}],desc:'车间大部分机器已经损坏，但还是搜刮到一些金属片和机油。'},
      {w:3,eff:{fatigue:10,health:-5},desc:'搬动重物时一个零件从高处掉下来砸到了肩膀。疼，但没骨折。没拿到什么东西。'},
    ]},{text:'检查配电室',outcomes:[
      {w:4,eff:{fatigue:8},items:[{n:'电子零件',q:[1,3]},{n:'电池',q:[1,2]},{n:'天线',q:[1,1]}],desc:'配电室里还有完好的控制面板——拆下来不少电子零件，还有一个车载天线。'},
      {w:3,eff:{fatigue:6,health:-3},items:[{n:'电池',q:[1,2]}],desc:'配电室潮湿阴暗，大部分设备都短路了。只找到了几块还算完好的备用电池。'},
      {w:3,eff:{fatigue:8},desc:'配电室已经被洗劫过了，电线和元器件被剪得乱七八糟。'},
    ]},{text:'搜索办公室文件柜',eff:{fatigue:5},items:[{n:'书籍',q:[1,2]},{n:'地图碎片',q:[1,2]}]}]},

  // === 新增事件 ===
  {id:'toxic_smoke',cat:'danger',ctx:{minDist:2,maxDist:12},narr:'前方地面裂开了一条缝，黄绿色的烟雾从裂缝中缓缓冒出。空气中弥漫着刺鼻的化学气味——这附近可能有战前化工厂的废墟。吸入这种烟雾会有什么后果？',
    choices:[
      {text:'用湿布捂住口鼻快速通过',outcomes:[
        {w:5,eff:{fatigue:8,health:-2},desc:'湿布过滤了大部分有害气体，你成功通过了毒雾区——虽然嗓子有点发痒，但没什么大碍。'},
        {w:3,eff:{fatigue:8,health:-8,infection:4},desc:'湿布不够厚——吸入了少量毒气，头晕目眩。勉强通过后剧烈咳嗽了好一阵。'},
        {w:2,eff:{fatigue:12,health:-15,infection:8},desc:'毒雾比预想的更浓——你感到肺部灼烧般的疼痛。必须尽快找干净空气。'},
      ]},
      {text:'绕路避开毒雾区',eff:{fatigue:12},desc:'安全第一。你绕了一大圈避开毒雾——虽然多花了时间和体力，但至少没有拿命开玩笑。'},
      {text:'用防毒面具通过',need:'防毒面具',eff:{fatigue:6},desc:'你戴上了防毒面具从容通过毒雾区。在废土上，一个防毒面具可能就是生死之差。'},
    ]},
  {id:'radio_signal',cat:'mystery',ctx:{minDist:3,maxDist:18},narr:'你从背包里翻出了一个还能用的收音机。调频时突然收到了一个微弱但清晰的信号："这里是…庇护所…7号…有食物…水和医疗用品…坐标重复…北纬…"信号断断续续，但似乎指向一个你还没探索过的区域。',
    choices:[
      {text:'记录坐标前往寻找',outcomes:[
        {w:5,eff:{fatigue:12,morale:10},items:[{n:'罐头',q:[2,4]},{n:'净水',q:[2,3]},{n:'抗生素',q:[1,2]}],desc:'坐标是真的！你找到了一个设备完好的地下庇护所。储备充足——罐头、净水，甚至还有抗生素。墙上写着"希望有人能找到这里"。'},
        {w:3,eff:{fatigue:12,morale:-3},desc:'你找到了坐标位置，但庇护所已经被洗劫一空。门开着，货架空荡荡——你来晚了一步。'},
        {w:2,eff:{fatigue:12,health:-5},desc:'坐标指向的地方是个陷阱——一群掠夺者用假信号引诱幸存者上钩。你侥幸逃脱但被追打了一顿。'},
      ]},
      {text:'信号可能是陷阱无视掉',eff:{},desc:'废土上不能相信任何"好事"。你果断关掉了收音机——谨慎一点总是对的。'},
    ]},
  {id:'beeping_device',cat:'mystery',ctx:{minDist:1,maxDist:10},narr:'废墟深处传来有节奏的"哔——哔——"声。循声找去，你发现了一个巴掌大的黑色盒子，上面有闪烁的LED灯。这么多年了居然还有电——这不是普通民用设备。',
    choices:[
      {text:'尝试拆开研究',outcomes:[
        {w:4,eff:{fatigue:5},items:[{n:'电子零件',q:[2,4]},{n:'电池',q:[1,3]}],desc:'小心翼翼地拆开后，里面是一套军用级加密通讯模块。虽然加密芯片已经损坏，但零件和电池还能用。'},
        {w:3,eff:{fatigue:5,health:-5},desc:'螺丝刀刚碰到外壳，设备就冒出了火花——内置了防拆装置。手指被烫伤了。不过你还是拆到了几个零件。'},
        {w:3,eff:{fatigue:5},desc:'设备外壳一打开，里面冒出一股焦味。核心电路已经烧毁多年了——外壳密封好才让电池撑到了现在。只剩一个外壳。'},
      ]},
      {text:'直接砸开看里面',outcomes:[
        {w:4,eff:{fatigue:3},items:[{n:'电子零件',q:[1,2]},{n:'金属片',q:[1,2]}],desc:'一砖头下去外壳碎了，露出了里面的电路板和电池。粗暴但有效。'},
        {w:4,eff:{fatigue:3,health:-6},desc:'砖头砸下去的一瞬间电池短路爆炸——碎屑飞溅到脸上。疼。电路板也毁了。'},
        {w:2,eff:{fatigue:3},desc:'砸开后里面只有焦黑一片。不知道这是什么设备，但它早就寿终正寝了。'},
      ]},
      {text:'可能有定位功能扔远点',eff:{},desc:'军用设备会发出信号——可能被军方残余势力或掠夺者追踪到。你把它扔进了远处的深沟里。'},
    ]},
  {id:'flash_flood',cat:'danger',ctx:{weather:['heavy_rain'],minDist:2,maxDist:15},narr:'暴雨持续了太久——你听到远处传来低沉的轰鸣声。山洪！浑浊的泥水从上游奔涌而来，水位在几秒内就涨到了脚踝。',
    choices:[
      {text:'爬上附近高处',eff:{fatigue:10},desc:'你手脚并用爬上了一栋半塌建筑的二楼。洪水从脚下奔腾而过——还好你反应快。'},
      {text:'收集洪水再找掩体',outcomes:[
        {w:5,eff:{fatigue:12,bodyWet:50},items:[{n:'净水',q:[2,4]}],desc:'你在逃跑前迅速用容器接满了水。洪水虽然脏但过滤后能喝——废土上不能浪费任何水源。'},
        {w:5,eff:{fatigue:12,bodyWet:80,health:-3},desc:'收集水耽搁了时间——撤退时被激流冲倒了，膝盖撞在石头上。浑身湿透但水壶还在。'},
      ]},
      {text:'躲进地下通道',outcomes:[
        {w:3,eff:{fatigue:5},desc:'你躲进了一个地下排水口。空间狭窄但洪水从上方流过——运气不错。'},
        {w:7,eff:{fatigue:5,health:-12,bodyWet:100},desc:'地下通道瞬间被淹！你在水中挣扎——幸好找到了一个通风口爬了出来。差点淹死。全身湿透。'},
      ]},
    ]},
  {id:'book_trader',cat:'npc',ctx:{minDist:0,maxDist:10},narr:'一个戴着厚眼镜的老人坐在路边，面前铺着十几本旧书。"年轻人，想看点书吗？我用书换食物——两本换你一罐罐头。知识改变命运，废土上也不例外。"他的眼睛透着一种让人捉摸不透的平静。',
    choices:[
      {text:'用罐头换两本书',items:[{n:'罐头',q:[-1,-1]},{n:'书籍',q:[2,2]}],desc:'老人仔细挑了两本书递给你——一本战前工程手册和一本小说。"书是最好的旅伴。"他微笑着说。'},
      {text:'用净水换一本急救手册',items:[{n:'净水',q:[-1,-1]},{n:'急救手册',q:[1,1]}],desc:'他递给你一本翻旧了的急救手册。"这个在废土上比钱管用。拿好。"'},
      {text:'和他聊聊废土的故事',eff:{morale:6},desc:'老人跟你聊了一个小时——他走过废土的大半地方，见过太多故事。临别时他说："活着就是最好的反抗。"这番话让你心里的阴霾散了不少。'},
    ]},
  {id:'wounded_animal',cat:'npc',ctx:{minDist:1,maxDist:10},narr:'一只瘦弱的野狗蜷缩在废墟角落，前腿被铁丝缠住了，伤口已经化脓。它用充满恐惧又绝望的眼神看着你——尾巴无力地摇了摇。',
    choices:[
      {text:'帮它解开铁丝处理伤口',eff:{fatigue:6,morale:10},items:[{n:'绷带',q:[-1,-1]}],desc:'你小心地剪开铁丝，用绷带包扎了它的伤口。野狗舔了舔你的手，一瘸一拐地走了。虽然消耗了物资，但心里有种说不出的温暖。'},
      {text:'给它一点食物和水',eff:{morale:5},items:[{n:'干粮',q:[-1,-1]},{n:'净水',q:[-1,-1]}],desc:'你把干粮和水放在它面前。它狼吞虎咽吃完后对你摇了摇尾巴——在废土上，一个善举可能改变一个生命的命运。'},
      {text:'这狗伤太重了活不了',eff:{morale:-5},desc:'你评估了一下——伤口已经严重感染，即使治疗也可能活不了。你狠下心来离开了。废土上每天都在发生这种事，但每次看到还是难受。'},
      {text:'杀掉当成食物',items:[{n:'变异兽肉',q:[1,2]}],desc:'你举起武器结束了它的痛苦。在废土上生存至上——虽然心里不太好受，但肉确实是珍贵的资源。'},
    ]},
  {id:'greenhouse_find',cat:'discovery',ctx:{minDist:3,maxDist:14,seasons:['spring','summer','autumn']},narr:'一座小型温室奇迹般地相对完好。玻璃碎了一些，但内部的植物架还保持着结构。地上散落着一些干枯的作物残骸，但角落里几株顽强的植物还在生长。',
    choices:[
      {text:'收集可用的种子和作物',eff:{fatigue:8},items:[{n:'种子',q:[2,4]},{n:'蘑菇干',q:[1,2]},{n:'草药',q:[1,3]}],desc:'你在温室的角落找到了几株还在生长的番茄和辣椒——还有干燥的蘑菇和草药。大自然的生命力在废土上依然顽强。'},
      {text:'检查灌溉系统',eff:{fatigue:5},items:[{n:'净水',q:[2,3]},{n:'水管',q:[1,2]}],desc:'灌溉系统的水箱里居然还有大半箱水——经过多年过滤沉淀，水质还不错。水管也可以拆下来备用。'},
      {text:'标记位置准备以后来耕种',eff:{morale:8},desc:'这个地方太有价值了！你在地图上仔细标记了位置——如果能修复温室，营地就多了一个稳定的食物来源。'},
    ]},
  {id:'collapsed_tunnel',cat:'danger',ctx:{minDist:4,maxDist:16},narr:'一段地下通道的入口半开着。铁门上写着"民防工程 — 可容纳200人"。里面伸手不见五指，但从入口处能看到散落在地上的物资。问题是——部分天花板已经塌了。',
    choices:[
      {text:'小心进入搜索',outcomes:[
        {w:5,eff:{fatigue:10},items:[{n:'罐头',q:[2,5]},{n:'净水',q:[1,4]},{n:'电池',q:[1,3]},{n:'工具',q:[1,1]}],desc:'小心翼翼绕过塌方区，你在深处找到了完好的物资储藏室——罐头、瓶装水、备用电池，还有一套完好的工具。民防储备救了你的命。'},
        {w:3,eff:{fatigue:10,health:-8},desc:'刚走到一半头顶又塌了一块碎石——虽然躲开了大的，但碎石砸在背上还是疼。物资不多，付出大于收获。'},
        {w:2,eff:{fatigue:14,health:-18},desc:'轰！更大的塌方发生了——你被埋在碎石下。用尽全力爬出来后浑身是伤。这个地方太危险了。什么都没拿到。'},
      ]},
      {text:'用木头加固入口再进入',need:'木材',outcomes:[
        {w:7,eff:{fatigue:14},items:[{n:'罐头',q:[3,5]},{n:'净水',q:[2,4]},{n:'医疗包',q:[1,2]}],desc:'你用木材加固了入口——专业的做法！进入后找到了大量民防储备，甚至还有一个未开封的急救箱。'},
        {w:3,eff:{fatigue:14},desc:'加固了入口但里面的物资大部分已经腐烂——看来防水层早就破了。白忙一场。'},
      ]},
      {text:'太危险了远离',eff:{},desc:'你看着摇摇欲坠的天花板，决定不冒这个险。废土上死得早的都是太贪心的人。'},
    ]},
  {id:'music_player',cat:'mystery',ctx:{minDist:0,maxDist:8},narr:'你在一堆杂物中翻出了一个旧MP3播放器。外壳裂了，但电池仓还完好。试着换上电池按了播放键——竟然响了！一首战前的老歌从耳机孔传出来，旋律在废墟中回荡。',
    choices:[
      {text:'坐下来听完一首歌',eff:{fatigue:-8,morale:15},desc:'你靠在废墟的墙上闭着眼听完了一整首歌。这是开战以来你第一次听音乐——眼泪不自觉地流了下来。原来人类文明的余晖可以是一首歌。'},
      {text:'测试还能存多少电',eff:{fatigue:3},items:[{n:'电池',q:[1,1]},{n:'电子零件',q:[1,1]}],desc:'虽然播放器本身没什么用，但你发现它的电池电量还很充足——拆下来可以给手电筒或收音机用。'},
      {text:'拆零件用',eff:{fatigue:2},items:[{n:'电子零件',q:[1,1]}],desc:'播放器只有一块旧电路板的价值——但每个零件在废土上都不能浪费。'},
    ]},
  {id:'crash_site',cat:'discovery',ctx:{minDist:6,maxDist:20},narr:'一架轻型飞机的残骸散落在开阔地上。尾翼上还能隐约看到褪色的红十字标志——这曾是一架医疗救援飞机。驾驶舱已经完全毁坏，但货舱似乎还保持着一部分结构。',
    choices:[
      {text:'搜索货舱',outcomes:[
        {w:5,eff:{fatigue:12},items:[{n:'医疗包',q:[2,3]},{n:'抗生素',q:[1,2]},{n:'绷带',q:[2,5]},{n:'手术包',q:[1,1]}],desc:'货舱的一角保持完好——你找到了几个医疗物资箱！抗生素、绷带、医疗包，甚至还有一个手术包。这可能是你整个废土旅途中最棒的发现之一。'},
        {w:3,eff:{fatigue:12},items:[{n:'绷带',q:[1,3]},{n:'止痛药',q:[1,2]}],desc:'货舱大部分已经烧毁——高温让药品变质了。只找到了一些耐热的绷带和止痛药。'},
        {w:2,eff:{fatigue:12,health:-5},desc:'搜索时货舱残骸突然坍塌——一个金属箱子砸在了你脚上。疼，但没骨折。没有找到任何东西。'},
      ]},
      {text:'检查黑匣子和航电设备',outcomes:[

        {w:3,eff:{fatigue:6},items:[{n:'电子零件',q:[1,2]}],desc:'记录设备大部分已经损坏。只找到几个勉强还能用的电子元件。'},
        {w:2,eff:{fatigue:6,health:-3},desc:'航电设备有辐射屏蔽层——拆开时暴露的放射性同位素让你头晕了一阵。赶紧离开！'},

      {text:'为遇难者默哀后离开',eff:{morale:-3},desc:'你在残骸前站了一会儿。一架救援飞机——机组人员可能在坠毁前还在试图救死扶伤。这让你想起了过去的世界。默默鞠了一躬。'},

  // === 🌍 全球BUFF/DEBUFF事件 ===
  {id:'global_ice_storm',cat:'world',ctx:{seasons:['autumn','winter'],minDist:0,maxDist:99},narr:'🚨 <strong>全球事件：极地冰风暴！</strong>\n\n天空突然变得灰暗，寒风从北方呼啸而来。气温骤降，地面开始结冰。收音机里传来断断续续的警告："极地漩涡南下…预计持续数日…所有幸存者注意保暖…"作物会被冻死，食物将变得更加稀缺。',
    choices:[
      {text:'紧急加固营地防寒',outcomes:[
        {w:5,eff:{fatigue:10,morale:3},items:[{n:'木材',q:[-2,-2]}],desc:'你赶在暴风雪来之前加固了营地的防风墙，储备了足够的柴火。虽然很累，但营地应该能扛过这场冰风暴。'},
        {w:3,eff:{fatigue:6},desc:'仓促间用木板把裂缝堵上了。不算完美，但聊胜于无。暴风雪已经开始了——接下来几天会很艰难。'},
        {w:2,eff:{fatigue:10,health:-5},desc:'还没加固完暴风雪就来了——你被冻得手指僵硬，差点从梯子上摔下来。营地漏风严重。'},
      ]},
      {text:'收集所有能烧的东西储存',outcomes:[
        {w:5,eff:{fatigue:8},items:[{n:'木材',q:[3,5]}],desc:'你疯了一样在暴风雪来临前收集了所有可燃物——木板、旧家具、枯枝。还有时间在附近再找一些。'},
        {w:3,eff:{fatigue:5},items:[{n:'木材',q:[1,2]}],desc:'时间紧迫，只找到了一些散落的柴火。勉强够用一两天。'},
      ]},
      {text:'躲进营地等暴风雪过去',eff:{fatigue:3},desc:'最好的策略有时候就是等待。你钻进睡袋把自己裹紧——希望营地的储备能撑过这几天。'},
    ],
    applyEffect:{id:'ice_storm',name:'极地冰风暴',icon:'❄️',desc:'全球极寒，温度-15°C，作物和食物产出-40%，体温下降更快',effects:{tempMod:-15,foodGatherMod:-0.4,foodConsumeMod:0.3,coreTempDrop:3},days:[3,6]},
  },
  {id:'global_heatwave',cat:'world',ctx:{seasons:['spring','summer'],minDist:0,maxDist:99},narr:'🚨 <strong>全球事件：极端热浪！</strong>\n\n太阳像火炉一样炙烤着大地。气温飙升至令人窒息的程度，水坑在几小时内蒸发殆尽。收音机警告说这是一场前所未有的热浪——预计持续数日。水源将变得极度稀缺。',
    choices:[
      {text:'紧急储存水源',outcomes:[
        {w:5,eff:{fatigue:8},items:[{n:'净水',q:[3,5]},{n:'罐装水',q:[1,2]}],desc:'你翻出所有容器疯狂装水——水井、雨水收集器、甚至附近的小溪。这些储备应该能帮你撑过最难熬的几天。'},
        {w:3,eff:{fatigue:5},items:[{n:'净水',q:[1,3]}],desc:'热浪来得比预期的快——水箱的水位已经在下降了。只抢到了几瓶水。'},
      ]},
      {text:'搭建遮阳棚保护营地',outcomes:[
        {w:5,eff:{fatigue:10},items:[{n:'布料',q:[-2,-2]}],desc:'你用布和木头在营地周围搭了遮阳棚——至少能挡住直射的阳光。棚子下面比外面凉快了至少10度。'},
        {w:3,eff:{fatigue:6},desc:'搭了个简易遮阳架。虽然简陋但聊胜于无——至少不用直接暴晒。'},
      ]},
      {text:'尽量减少活动保存体力',eff:{fatigue:2},desc:'最好的办法就是不动。躺在营地的阴凉处等待热浪过去——少动就少出汗，少出汗就少喝水。'},
    ],
    applyEffect:{id:'heatwave',name:'极端热浪',icon:'🔥',desc:'全球高温，温度+15°C，水源获取-40%，水分消耗加快',effects:{tempMod:15,waterGatherMod:-0.4,waterConsumeMod:0.3,coreTempRise:3},days:[3,6]},
  },
  {id:'mutant_horde',cat:'world',ctx:{minDist:0,maxDist:99},narr:'🚨 <strong>全球事件：变异体迁徙潮！</strong>\n\n大量变异生物从辐射区涌出，像潮水一样在废土上蔓延。远处传来此起彼伏的嘶吼声——比平时多得多。无论你在营地还是野外，遭遇袭击的概率都将大幅上升。',
    choices:[
      {text:'加固营地防御工事',outcomes:[
        {w:5,eff:{fatigue:12},items:[{n:'金属片',q:[-2,-2]},{n:'铁丝网',q:[-1,-1]}],desc:'你用金属片加固了围栏，在外围拉起了铁丝网。变异体要冲进来得费不少功夫——这些防御措施可能会救你一命。'},
        {w:3,eff:{fatigue:8},items:[{n:'木材',q:[-2,-3]}],desc:'用木板加高了围栏。不算牢靠但也算多了一层保护。但愿变异体不会一波接一波地来。'},
        {w:2,eff:{fatigue:6},desc:'时间太紧材料也不够。你只能祈祷营地现有的防御能扛过去。'},
      ]},
      {text:'召集小队准备战斗',eff:{morale:5},desc:'你把小队成员召集到一起分配了武器和弹药。"不管来多少，我们守住。"团结是最好的防御。'},
      {text:'计划多待在营地减少外出',eff:{},desc:'最安全的做法就是待在营地里减少移动。变异体潮总会过去的——前提是你能活到那时候。'},
    ],
    applyEffect:{id:'mutant_horde',name:'变异体迁徙潮',icon:'🧟',desc:'变异体泛滥，野外遇袭概率+50%，营地遇袭概率+30%，防御-10',effects:{wildAttackMod:0.5,campAttackMod:0.3,defPenalty:10},days:[3,5]},
  },
  {id:'raider_raid_event',cat:'world',ctx:{minDist:0,maxDist:99},narr:'🚨 <strong>全球事件：掠夺者联盟扫荡！</strong>\n\n几股掠夺者帮派结成了松散的联盟，正在对周边地区进行大规模扫荡。他们的侦察兵已经出现在附近。你的营地可能会成为他们的下一个目标——或者你在野外碰到他们。',
    choices:[
      {text:'加强营地防御和岗哨',outcomes:[
        {w:5,eff:{fatigue:10,morale:3},items:[{n:'木材',q:[-2,-3]},{n:'弹药',q:[-2,-2]}],desc:'你加强了瞭望岗哨，在关键位置布置了简易陷阱。每个小队成员都领到了额外的弹药——掠夺者们想来就试试吧。'},
        {w:3,eff:{fatigue:6},items:[{n:'弹药',q:[-1,-1]}],desc:'匆匆布置了些基本防御措施。要不是弹药不够，你还能做得更多——但总比什么都不做好。'},
      ]},
      {text:'主动出击扰乱他们的计划',outcomes:[
        {w:4,eff:{fatigue:15,health:-8,morale:5},items:[{n:'弹药',q:[1,3]},{n:'武器零件',q:[1,2]}],desc:'你摸到了掠夺者的临时营地附近，在夜幕掩护下破坏了他们几辆车的引擎。混乱中他们还留下了弹药。'},
        {w:3,eff:{fatigue:15,health:-15},desc:'偷袭没有预想中顺利——他们的哨兵比你想象的警觉。交火后你被迫撤退，受了些伤。不过至少拖延了他们的进度。'},
        {w:3,eff:{fatigue:15,health:-20},desc:'你中了埋伏——掠夺者早就发现了你的行踪！一场恶斗后你侥幸逃脱，但伤势不轻。这次教训告诉你，主动出击风险太大了。'},
      ]},
      {text:'尽可能隐藏营地踪迹',eff:{fatigue:6},desc:'你花了一整天时间清理营地周围的活动痕迹并伪装入口。掠夺者们也许不会发现这里。'},
    ],
    applyEffect:{id:'raider_raid',name:'掠夺者扫荡',icon:'💀',desc:'掠夺者活跃，野外敌袭概率+40%，营地被袭概率+40%，交易时容易被抢劫',effects:{wildAttackMod:0.4,campAttackMod:0.4,tradeDangerMod:0.5},days:[2,5]},
  },
  {id:'radiation_storm',cat:'world',ctx:{minDist:0,maxDist:99},narr:'🚨 <strong>全球事件：辐射风暴！</strong>\n\n一场携带高剂量辐射尘的风暴正在逼近。天空呈现出诡异的暗红色，盖革计数器疯狂作响。在户外活动意味着暴露在致命的辐射中。防辐射药物变得比任何时候都珍贵。',
    choices:[
      {text:'服用防辐射药保护自己',need:'防辐射药',eff:{health:-2},desc:'你服下了防辐射药——至少你的甲状腺不会吸收放射性碘。在辐射风暴中这是最基本的防护。'},
      {text:'用一切办法封闭营地',outcomes:[
        {w:5,eff:{fatigue:10},items:[{n:'胶带',q:[-1,-2]},{n:'布料',q:[-2,-2]}],desc:'你用胶带和布封死了所有缝隙和通风口。营地现在像个密封罐头——但至少辐射进不来。'},
        {w:3,eff:{fatigue:6},desc:'尽力封了主要的裂缝。虽然不是100%密封但聊胜于无——辐射尘应该不会大量进入。'},
      ]},
      {text:'赶紧躲进地下空间',eff:{fatigue:5},desc:'你找到了一处地下避难所紧急躲了进去。厚厚的土层是最好的辐射隔离层。待在这里直到警报解除。'},
    ],
    applyEffect:{id:'radiation_storm',name:'辐射风暴',icon:'☢️',desc:'辐射水平升高，户外活动健康-5/天，需要防护或躲藏',effects:{radDamage:5,campDefBonus:5},days:[2,4]},
  },
  {id:'clear_skies',cat:'world',ctx:{minDist:0,maxDist:99},narr:'✨ <strong>全球事件：晴朗天气！</strong>\n\n连日的阴霾突然散去，阳光普照大地。空气清新，能见度极佳。不仅是天气好了——整个废土似乎都变得安静了一些。收音机里有人用"老天开眼"来形容这场好天气。',
    choices:[
      {text:'趁好天气外出拾荒',eff:{morale:8},desc:'好天气不常有——你决定趁这个机会多跑几趟拾荒。阳光下的废土虽然依然残酷，但至少心情好了不少。'},
      {text:'检修营地设施',eff:{fatigue:8},items:[{n:'太阳能板',q:[1,1]}],desc:'难得的好天气——最适合排查营地设备的隐患。你还装起了一块之前在废墟捡到的太阳能板，现在终于派上用场。'},
      {text:'什么也不做享受片刻宁静',eff:{fatigue:-5,morale:12},desc:'你坐在营地的台阶上晒着太阳。自从核战以来，这是第一次感受到"和平"是什么滋味。哪怕只有几天。'},
    ],
    applyEffect:{id:'clear_skies',name:'晴朗天气',icon:'☀️',desc:'好天气buff，拾荒产出+30%，士气+5，防御+5',effects:{gatherBoost:0.3,moraleBoost:5,defBonus:5},days:[2,4]},
  },
  {id:'food_boom',cat:'world',ctx:{minDist:0,maxDist:99,seasons:['spring','summer','autumn']},narr:'🌿 <strong>全球事件：野生作物大丰收！</strong>\n\n今年的气候异常温和，加上变异植物的大量繁殖——废土上的野生作物在疯狂生长。灌木丛中浆果成串，废弃农田里野生谷物到处都是。这是废土给幸存者的一点馈赠。',
    choices:[
      {text:'全力采集储备粮食',eff:{fatigue:12},items:[{n:'罐头',q:[1,3]},{n:'蘑菇干',q:[2,4]},{n:'干粮',q:[2,3]}],desc:'你像丰收节的农民一样疯狂采集！几天积累了大量的食物——这些储备可能会在下一次饥荒时救你命。'},
      {text:'组织小队大规模采集',eff:{fatigue:10,morale:5},items:[{n:'种子',q:[1,3]},{n:'草药',q:[1,2]}],desc:'小队成员分头行动——有人采浆果，有人挖野菜，有人收集种子。收获满满还增强了团队凝聚力。'},
    ],
    applyEffect:{id:'food_boom',name:'作物大丰收',icon:'🌿',desc:'野生食物+40%产出，采集疲劳减半',effects:{foodGatherMod:0.4,gatherFatigueHalf:1},days:[3,5]},
  },
  {id:'plague_outbreak',cat:'world',ctx:{minDist:0,maxDist:99},narr:'🚨 <strong>全球事件：废土瘟疫爆发！</strong>\n\n一种未知的疾病开始在幸存者之间传播——高烧、呕吐、皮肤溃烂。可能来自受污染的水源，也可能是变异病毒。你的营地必须采取紧急措施，否则所有人都可能被感染。',
    choices:[
      {text:'隔离接触过的队员并消毒',outcomes:[
        {w:6,eff:{fatigue:8,morale:-3},items:[{n:'消毒酒精',q:[-1,-1]}],desc:'你果断隔离了所有出现症状的队员，用消毒酒精对营地进行了全面消毒。措施果断——疫情被遏制了。'},
        {w:4,eff:{fatigue:8,morale:-5,health:-5},items:[{n:'抗生素',q:[-1,-1]}],desc:'有人已经被感染但没出现症状——你在消毒时也开始发烧。抗生素暂时控制住了病情。'},
      ]},
      {text:'分发抗生素和退烧药',need:'抗生素',outcomes:[
        {w:5,eff:{fatigue:4},items:[{n:'抗生素',q:[-2,-2]},{n:'退烧药',q:[-1,-2]}],desc:'你把为数不多的抗生素分给了队员。有几粒药就多几分希望——至少高烧能退下来。'},
        {w:3,eff:{fatigue:4,health:-10,morale:-5},items:[{n:'抗生素',q:[-2,-2]}],desc:'抗生素不够所有人用。有几个队员病情加重了——你不得不把他们隔离到单独的帐篷里。看着他们受苦，心里难受。'},
      ]},
      {text:'祈祷并保守治疗',eff:{health:-12,infection:8},desc:'没有足够的药物。你只能用冷毛巾和草药尽力而为——在废土上，不是每个病都能治好的。'},
    ],
    applyEffect:{id:'plague',name:'废土瘟疫',icon:'🦠',desc:'瘟疫蔓延，每日自动扣血-5，士气-3，恢复速度减半',effects:{healthDecay:5,moraleDecay:3,healPenalty:0.5},days:[4,7]},
  },

  // === 人物对话/独白/情报 ===
  {id:'companion_fear',cat:'dialogue',ctx:{hasCompanions:true,minDist:0,maxDist:20},narr:'篝火旁，队友突然开口——声音里带着颤抖。"你说…我们会不会是最后一批活着的人了？"火焰噼啪作响，沉默了好几秒。',
    choices:[
      {text:'安慰他：只要团结就能活下去',eff:{morale:8},desc:'"废土残酷，但我们还有彼此。营地还在，希望就在。"队友点了点头，眼神坚定了一些。'},
      {text:'说实话：我也不确定但会尽力',eff:{morale:-1},desc:'"不清楚。但每天醒来看到太阳升起，就算是赚了。"队友苦笑——这番实话反而让他觉得你真实。'},
    ]},
  {id:'companion_memory',cat:'dialogue',ctx:{hasCompanions:true,minDist:0,maxDist:15},narr:'探索中队友停下脚步，盯着远处一座废墟出神。"那里…长得跟我以前住的地方一模一样。门口有棵槐树，我妈总在阳台上晾衣服。"他的声音有些哽咽。',
    choices:[
      {text:'安静地听他说完',eff:{morale:6},desc:'你没有打断。有些记忆说出来，比憋在心里好受。"谢谢你听我说这些。"'},
      {text:'分享你自己的回忆',eff:{morale:8},desc:'你也想起了过去的家。两个人在废墟中沉默良久——至少现在不是一个人扛着。'},
    ]},
  {id:'player_night_thoughts',cat:'dialogue',ctx:{night:true,minDist:0,maxDist:10},narr:'夜深了。一个人看着漫天星辰，思绪飘远——战前的世界真的存在过吗？那些街道、外卖、深夜的游戏、朋友的牢骚…都像上辈子的事了。',
    choices:[
      {text:'写日记记录想法',eff:{morale:5,fatigue:2},desc:'你翻出日记本。回头看之前的记录——已经走了这么远。也许有一天后人会读到这些。'},
      {text:'对星空许个愿',eff:{morale:8},desc:'一个不可能的愿望——但抬头看星星时，你感到久违的平静。不管世界变成了什么样，星空没变。'},
    ]},
  {id:'intel_overheard',cat:'dialogue',ctx:{minDist:3,maxDist:18},narr:'躲在断墙后无意中听到几个人谈话。关键词飘了过来——"北边工厂地下二层有武器库…""别去，变异体巢穴。"他们没注意到你。',
    choices:[
      {text:'悄悄靠近偷听更多',outcomes:[
        {w:5,eff:{fatigue:5},desc:'听到了更多——铁门需要工具撬开，但里面确实有军用物资。',intel:{type:'stash',loc:'废弃工厂地下二层',desc:'武器库，需要工具撬开铁门',icon:'🔫'}},
        {w:5,eff:{fatigue:5,health:-3},desc:'靠太近了——有人回头，你赶紧缩回墙角。虽然没被看到但也吓得不轻。只听到大概方向。'},
      ]},
      {text:'悄悄退后离开',eff:{fatigue:2},desc:'好奇心太强的人往往活不长。你悄悄退后——但信息本身似乎是真的。'},
    ]},
  {id:'lost_companion_memory',cat:'dialogue',ctx:{lostCompanion:true,minDist:0,maxDist:20},narr:'路过一片荒芜的十字路口，忽然想起了那个已经不在的队友。恍惚间似乎还能看到他的背影——那个拍你肩膀说"明天会更好"的人，现在只剩回忆了。',

function getBiomeMaterialLoot(count){
  var b=S.currentBiome;var pool=[];
  // 通用材料池（所有群系都可能找到）
  var common=[{n:'金属片',q:[1,3],w:10},{n:'木材',q:[1,3],w:8},{n:'布料',q:[1,2],w:8},{n:'绳子',q:[1,2],w:6},{n:'钉子',q:[1,3],w:6},{n:'胶带',q:[1,2],w:5},{n:'电池',q:[1,2],w:5},{n:'机油',q:[1,1],w:4}];
  // 稀有材料池
  var rare=[{n:'电子零件',q:[1,2],w:3},{n:'武器零件',q:[1,2],w:3},{n:'铁皮',q:[1,2],w:4},{n:'防水布',q:[1,1],w:3},{n:'铁丝网',q:[1,1],w:2},{n:'天线',q:[1,1],w:2},{n:'收音机零件',q:[1,1],w:2},{n:'种子',q:[1,2],w:3},{n:'太阳能板',q:[1,1],w:1}];
  // 群系特殊物品
  if(b&&b.sp){b.sp.forEach(function(sp){pool.push({n:sp.n,q:sp.q,w:12});});}
  // 群系材料值越高稀有材料概率越大
  var ml=b?b.materials:5;
  common.forEach(function(c){pool.push(c);});
  if(ml>=7){rare.forEach(function(r){pool.push({n:r.n,q:r.q,w:Math.min(r.w*3,10)});});}
  else if(ml>=5){rare.forEach(function(r){if(r.w<=4)pool.push({n:r.n,q:r.q,w:Math.min(r.w*2,7)});});}
  else{rare.filter(function(r){return r.w>=4;}).forEach(function(r){pool.push(r);});}
  // 加权抽取count种不同材料
  var result=[];var picked={};
  for(var i=0;i<count;i++){
    var totalW=pool.reduce(function(s,x){return s+x.w;},0);var roll=rand(0,totalW-1);var found=null;
    for(var j=0;j<pool.length;j++){
      roll-=pool[j].w;
      if(roll<0){found=pool[j];break;}
    }
    if(!found)continue;
    var q=Array.isArray(found.q)?rand(found.q[0],found.q[1]):(found.q||1);
    if(picked[found.n]){var ex=result.find(function(r){return r.n===found.n;});if(ex){ex.q+=q;}else{picked[found.n]=true;result.push({n:found.n,q:q});}}
    else{picked[found.n]=true;result.push({n:found.n,q:q});}
  }
  return result;
}

function noviceLevel(){
  if(S.day<=3)return 1; // 基础：血液/营养/水分/体力
  if(S.day<=7)return 2; // 进阶：+体温/湿度/基础伤口
  return 3; // 完整：所有系统
}
function checkNoviceUnlock(){
  var prev=S._noviceLevel||1;var cur=noviceLevel();
  if(cur>prev){
    if(cur===2){addStory('📖 <strong>你对废土有了更深的理解。</strong>现在你需要关注体温和身体湿度——环境不再只是背景。','system');}

    S._noviceLevel=cur;
  }
}
function isUnlocked(feature){
  var l=noviceLevel();
  if(feature==='infection'||feature==='pain'||feature==='woundDetail')return l>=3;
  if(feature==='coreTemp'||feature==='wetness'||feature==='wound')return l>=2;
  return true; // blood/nutrition/hydration/fatigue always shown
}

// ===== 全局效果系统 =====
function addEffect(id,name,icon,desc,effects,days){
  if(!S.activeEffects)S.activeEffects=[];
  // 同id则刷新天数
  var exist=S.activeEffects.find(function(e){return e.id===id;});
  if(exist){exist.daysLeft=Math.max(exist.daysLeft,days);return;}
  S.activeEffects.push({id:id,name:name,icon:icon,desc:desc,effects:effects||{},daysLeft:days});
}
function removeEffect(id){if(!S.activeEffects)return;S.activeEffects=S.activeEffects.filter(function(e){return e.id!==id;});}
function hasEffect(id){return S.activeEffects&&S.activeEffects.some(function(e){return e.id===id;});}
function getEffectSum(key){
  if(!S.activeEffects)return 0;
  return S.activeEffects.reduce(function(s,e){return s+(e.effects[key]||0);},0);
}
function tickEffects(){
  if(!S.activeEffects||S.activeEffects.length===0)return;
  for(var i=S.activeEffects.length-1;i>=0;i--){
    S.activeEffects[i].daysLeft--;
    if(S.activeEffects[i].daysLeft<=0){
      addStory('🌍 <strong>'+S.activeEffects[i].icon+' '+S.activeEffects[i].name+'</strong> 结束了。','world');
      S.activeEffects.splice(i,1);
    }
  }
}

// ===== HELPERS =====
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function randF(min,max){return Math.random()*(max-min)+min;}
function pick(arr){return arr[rand(0,arr.length-1)];}
function pickW(items){const t=items.reduce((s,i)=>s+(i.w||1),0);let r=Math.random()*t;for(const it of items){r-=(it.w||1);if(r<=0)return it;}return items[items.length-1];}
function atCamp(){return S.distance<=0;}
function isDaytime(){const s=S.season||SEASONS[0];return S.hour>=s.dayLen.rise&&S.hour<s.dayLen.set;}
function isNight(){return!isDaytime();}
function timeString(){return String(S.hour).padStart(2,'0')+':'+String(S.minute).padStart(2,'0');}

// ===== INJURY DEBUFFS =====
function getInjuryDebuffs(){
  const d={cantLeave:false,cantLeaveReason:'',slotPenalty:0,fatigueExtra:0,needSurgery:false,needSplint:[],needBrace:[]};
  for(const pid of BODY_PARTS){
    const ws=S.body[pid].wounds;if(ws.length===0)continue;
    const maxSev=Math.max(...ws.map(w=>w.severity));
    const hasBleed=ws.some(w=>w.bleeding&&!w.bandaged);
    // Legs: severe wounds prevent leaving camp
    if((pid==='leftLeg'||pid==='rightLeg')&&maxSev>=2){d.cantLeave=true;d.cantLeaveReason=`${PL[pid]}重伤，无法行走`;if(!ws.every(w=>w.bandaged&&w.cleaned))d.needSplint.push(pid);}
    // Chest: severe wounds prevent leaving + need surgery
    if(pid==='chest'&&maxSev>=3){d.cantLeave=true;d.cantLeaveReason='胸部重伤，必须手术治疗';d.needSurgery=true;}
    if(pid==='chest'&&maxSev>=2){d.cantLeave=true;d.cantLeaveReason='胸部受伤，不宜行动';}
    // Arms: reduce slots + need brace
    if((pid==='leftArm'||pid==='rightArm')&&maxSev>=2){d.slotPenalty+=1;d.fatigueExtra+=3;if(!ws.every(w=>w.bandaged&&w.cleaned))d.needBrace.push(pid);}
    if((pid==='leftArm'||pid==='rightArm')&&maxSev>=1){d.fatigueExtra+=2;}
    // Head: minor effects
    if(pid==='head'&&maxSev>=2){d.fatigueExtra+=4;}
  }
  return d;
}

// ===== INVENTORY (with backpack slots + weight) =====
function itemWeight(name){var info=ITEMS[name]||{};return info.weight||1;}
function calcBackpackWeight(){var w=0;Object.entries(S.inventory).forEach(function(e){w+=e[1].qty*itemWeight(e[0]);});return w;}
function maxSlots(){let s=S.backpackSlots;if(hasItem('背包',1))s+=3;if(S.fatigue>70)s-=1;s-=getInjuryDebuffs().slotPenalty;return Math.max(1,s);}
function addItem(name,qty,toCamp,force){
  if(!name||qty<=0)return;
  if(S.backpackWeight===undefined)S.backpackWeight=calcBackpackWeight();
  if(S.backpackMaxWeight===undefined)S.backpackMaxWeight=50;
  var store=toCamp?S.camp.supplies:S.inventory;
  if(!toCamp){
    var slotFull=Object.keys(S.inventory).length>=maxSlots()&&!S.inventory[name];
    var weightFull=S.backpackWeight+qty*itemWeight(name)>S.backpackMaxWeight;
    if((slotFull||weightFull)&&!force){
      if(atCamp()){addItem(name,qty,true);setStatus('背包满了，「'+name+'」已存入营地仓库');return;}
      // Show trade modal for non-camp loot
      var reason=slotFull?'格子满了':'负重不足';
      showLootTradeModal(name,qty,reason);return;
    }
  }
  var info=ITEMS[name]||{};
  if(!store[name])store[name]={qty:0,e:info.e||'📦',d:info.d||'',cat:info.cat||'misc',clothing:!!info.slot,med:!!info.med,usable:!!info.use};
  store[name].qty+=qty;
  if(!toCamp)S.backpackWeight=calcBackpackWeight();
}
function removeItem(name,qty,fromCamp){
  var store=fromCamp?S.camp.supplies:S.inventory;if(!store[name]||store[name].qty<qty)return false;
  store[name].qty-=qty;if(store[name].qty<=0)delete store[name];
  if(!fromCamp)S.backpackWeight=calcBackpackWeight();
  return true;
}
function dismantleItem(name,qty){
  var info=ITEMS[name];if(!info||!hasItem(name,qty)){setStatus('无法分解此物品');return;}
  qty=Math.min(qty,S.inventory[name].qty);
  // Determine yield based on item type
  var yield=[];
  if(info.cat==='clothing'){
    yield=[{n:'布料',q:info.slot==='head'?1:info.slot==='upper'?3:info.slot==='lower'?2:2}];
    if(Math.random()<0.3)yield.push({n:'绳子',q:1});
  }else if(info.e==='🔧'||info.d.includes('工具')){
    yield=[{n:'金属片',q:rand(1,3)},{n:'电子零件',q:rand(0,1)}];
  }else if(name.includes('木')||name.includes('柴')){
    yield=[{n:'木材',q:rand(1,3)}];
  }else if(name.includes('铁')||name.includes('金属')){
    yield=[{n:'金属片',q:rand(1,2)}];
  }else{
    setStatus('该物品无法分解');return;
  }
  removeItem(name,qty);
  yield.forEach(function(y){if(y.q>0)addItem(y.n,y.q);});
  var yt=yield.map(function(y){return y.n+'×'+y.q;}).join('、');
  addStory(`🔧 分解了 ${info.e||''}${name}×${qty} → ${yt}`,'system');
  updateUI();
}
function dropItem(name,qty){
  if(!hasItem(name,qty))return;
  qty=Math.min(qty,S.inventory[name].qty);
  removeItem(name,qty);addStory('🗑️ 丢弃了 '+ITEMS[name]?.e+name+'×'+qty,'system');updateUI();
}
function hasItem(name,qty,fromCamp){var store=fromCamp?S.camp.supplies:S.inventory;return store[name]&&store[name].qty>=qty;}
function invCount(){return Object.values(S.inventory).reduce(function(s,i){return s+i.qty;},0);}
function campSCount(){return Object.values(S.camp.supplies).reduce(function(s,i){return s+i.qty;},0);}

// ===== WEATHER =====
function generateWeather(){
  const se=S.season||SEASONS[0];const hour=S.hour;
  const b=S.currentBiome; // biome affects weather
  const baseT=randF(se.tempRange[0],se.tempRange[1]);const timeMod=-3*Math.cos((hour-4)*Math.PI/12);
  // Biome temperature modifiers
  let bioTemp=0,bioHum=0,bioRain=1;
  if(b){if(b.id==='desert'){bioTemp=8;bioHum=-30;bioRain=0.05;}else if(b.id==='forest'){bioTemp=-2;bioHum=10;bioRain=1.5;}else if(b.id==='coast'){bioHum=5;bioRain=1.3;}else if(b.id==='mountain'){bioTemp=-5;bioRain=0.8;}else if(b.id==='wasteland'){bioTemp=3;bioRain=0.4;}}
  let temp=clamp(baseT+timeMod+randF(-3,3)+bioTemp,-30,48);
  let hum=clamp(randF(se.humRange[0],se.humRange[1])+randF(-10,10)+bioHum,10,100);
  let pt='none',pi=0,isS=false;const r=Math.random();
  let rainChance=(se.rainChance||0.2)*bioRain;let snowChance=(se.snowChance||0)*bioRain;
  if(r<rainChance+snowChance){
    if(r<rainChance){const r2=Math.random();if(r2<0.3){pt='drizzle';pi=rand(10,30);temp=clamp(temp-1,-30,48);}else if(r2<0.75){pt='rain';pi=rand(30,60);temp=clamp(temp-3,-30,48);}else{pt='heavy_rain';pi=rand(60,100);temp=clamp(temp-6,-30,48);}if(temp<2){pt='snow';isS=true;}}
    else{pt='snow';isS=true;pi=rand(20,80);temp=clamp(temp-2,-20,2);}hum=clamp(hum+20,10,100);}
  let wind,ws;const wr=Math.random();if(wr<0.4){wind='calm';ws=rand(0,8);}else if(wr<0.75){wind='breeze';ws=rand(8,20);}else if(wr<0.92){wind='strong';ws=rand(20,40);temp=clamp(temp-2,-30,48);}else{wind='gale';ws=rand(40,70);temp=clamp(temp-5,-30,48);}
  if(ws>15)temp=clamp(temp-Math.floor(ws/10),-30,48);
  let icon,desc;if(pt==='none'){icon=hour>=6&&hour<18?'☀️':'🌙';desc=wind==='calm'?'平静':wind==='breeze'?'微风徐徐':wind==='strong'?'大风呼啸':'狂风大作';}
  else if(pt==='drizzle'){icon='🌦️';desc='细雨蒙蒙';}else if(pt==='rain'){icon='🌧️';desc='雨水不断';}else if(pt==='heavy_rain'){icon='⛈️';desc='暴雨倾盆';}else if(pt==='snow'&&pi<50){icon='🌨️';desc='雪花飘落';}else{icon='❄️';desc='大雪纷飞';}
  S.weather={temperature:Math.round(temp),humidity:Math.round(hum),precipType:pt,precipIntensity:Math.round(pi),wind,windSpeed:Math.round(ws),icon,desc,isSnow:isS};
}

// ===== CLOTHING =====
function totalArmor(){let a=0;for(const s of['head','upper','lower','feet','body','hands','mask']){const c=S.clothing[s];if(c)a+=c.armor||0;}return a;}
function totalRadResist(){let r=0;for(const s of['head','upper','lower','feet','body','hands','mask']){const c=S.clothing[s];if(c)r+=c.rad||0;}return r;}
function totalWarmth(){let w=0;for(const s of['head','upper','lower','feet','body','hands','mask']){const c=S.clothing[s];if(c){w+=c.warmth;if(c.wet)w=Math.floor(w*0.4);}}return w;}
function canEquipItem(name){var i=ITEMS[name];return i&&i.slot&&i.cat==='clothing';}
function tryEquipBetter(name){
  var info=ITEMS[name];if(!info||!info.slot||info.cat!=='clothing')return false;
  var slot=info.slot,cur=S.clothing[slot];
  // Auto-equip if slot empty or new is warmer
  if(!cur||cur.name==='无'||cur.warmth<info.warmth){
    if(!hasItem(name,1))return false;
    removeItem(name,1);
    if(cur&&cur.name!=='无')addItem(cur.name,1);
    S.clothing[slot]={name:name,warmth:info.warmth,wp:info.wp||0,wet:false};
    addStory(`👔 穿上了 <strong>${info.e||''}${name}</strong>（${slot==='head'?'头部':slot==='upper'?'上衣':slot==='lower'?'裤子':slot==='feet'?'鞋子':slot}，保暖+${info.warmth}）`,'system');
    return true;
  }
  return false;
}
function getFeelsLike(){let t=S.weather.temperature+getEffectSum('tempMod');if(S.weather.windSpeed>15)t-=Math.floor(S.weather.windSpeed/8);if(S.bodyWetness>0)t-=Math.floor(S.bodyWetness/10);t+=Math.floor(totalWarmth()/3);if(S.hasCampfire)t+=5;return Math.round(t);}
function applyWetness(){
  const p=S.weather.precipType;if(p==='none'&&!S.hasCampfire){S.bodyWetness=clamp(S.bodyWetness-8,0,100);return;}
  let wg=0;if(p==='drizzle')wg=5;else if(p==='rain')wg=15;else if(p==='heavy_rain')wg=30;else if(S.weather.isSnow)wg=8;
  for(const s of['head','upper','lower','feet','body','hands','mask']){const c=S.clothing[s];if(!c)continue;const resist=(c.wp||0)/100;const aw=wg*(1-resist);if(aw>3&&Math.random()<aw/20)c.wet=true;else if(aw<5&&c.wet&&Math.random()<0.4)c.wet=false;}
  S.bodyWetness=clamp(S.bodyWetness+wg,0,100);if(p==='none')S.bodyWetness=clamp(S.bodyWetness-10,0,100);
  if(S.hasCampfire&&S.bodyWetness>0){S.bodyWetness=clamp(S.bodyWetness-15,0,100);for(const s of['head','upper','lower','feet'])if(S.clothing[s].wet&&Math.random()<0.5)S.clothing[s].wet=false;}
}
function updateCoreTemp(){var feels=getFeelsLike()+getEffectSum('tempMod');var target=clamp(feels+1,35,39);var drift=0.3+getEffectSum('coreTempDrop')*0.1-getEffectSum('coreTempRise')*0.1;
  // Wetness accelerates temperature change
  if(S.bodyWetness>80)drift=1.2;else if(S.bodyWetness>55)drift=0.8;else if(S.bodyWetness>25)drift=0.5;
  // Cold environment + wet = dangerous rapid cooling
  if(S.weather.temperature<5&&S.bodyWetness>40)drift*=2;
  if(S.weather.temperature<-10)drift*=1.5;
  if(S.coreTemp>target)S.coreTemp=clamp(S.coreTemp-drift,30,43);else if(S.coreTemp<target)S.coreTemp=clamp(S.coreTemp+drift*0.7,30,43);
  if(S.infectionLevel>30)S.coreTemp=clamp(S.coreTemp+0.3,30,43);
  if(S.coreTemp<34)addStory('❄️ <strong>体温过低！</strong>你开始剧烈发抖，手指失去了知觉。'+(S.bodyWetness>40?'湿透的衣服正在加速夺走你的体温！':''),'medical');
}
