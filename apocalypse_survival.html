function addWound(pid,severity,desc,bleeding=true){const w={id:nwid(),desc,severity:clamp(severity,1,3),bleeding,infected:false,bandaged:false,cleaned:false,turns_old:0};S.body[pid].wounds.push(w);return w;}
function getPartStatus(pid){const ws=S.body[pid].wounds;if(ws.length===0)return'healthy';let maxS=0,hB=false,hI=false,allB=true;for(const w of ws){if(!w.bandaged)allB=false;if(w.bleeding)hB=true;if(w.infected)hI=true;if(w.severity>maxS)maxS=w.severity;}if(allB&&!hI)return'bandaged';if(hI)return'infected';if(hB&&maxS>=3)return'severe';if(hB)return'wound';if(maxS>=2)return'wound';return'minor';}
function getPartCSS(pid){const m={healthy:'bp-healthy',minor:'bp-minor',wound:'bp-wound',severe:'bp-severe',infected:'bp-infected',bandaged:'bp-bandaged'};return m[getPartStatus(pid)]||'bp-healthy';}
function progressWounds(){
  let tb=0;for(const pid of BODY_PARTS)for(const w of S.body[pid].wounds){w.turns_old++;
    if(w.bleeding&&!w.bandaged)tb+=w.severity*3;
    if(!w.infected&&!w.cleaned&&!w.bandaged&&Math.random()*100<w.severity*5+w.turns_old*2){w.infected=true;addStory(`🦠 <strong>${PL[pid]}伤口感染！</strong>出现红肿化脓`,'medical');}
    if(w.infected){S.infectionLevel=clamp(S.infectionLevel+w.severity*2,0,100);}if(w.infected&&w.turns_old>6&&!w.bandaged)tb+=w.severity*1;}
  if(tb>0){S.blood=clamp(S.blood-tb,0,100);addStory(`🩸 失血 <strong>-${tb}</strong>`,'medical');}
  let tp=0;for(const pid of BODY_PARTS)for(const w of S.body[pid].wounds){tp+=w.bandaged?w.severity*2:w.severity*6;if(w.infected)tp+=8;}S.pain=clamp(tp,0,100);
  for(const pid of BODY_PARTS)S.body[pid].wounds=S.body[pid].wounds.filter(w=>{if(w.bandaged&&w.cleaned&&!w.infected&&w.turns_old>12)return false;return true;});
}
function treatWound(pid,wid,act){
  const w=S.body[pid].wounds.find(x=>x.id===wid);if(!w)return false;
  switch(act){
    case'bandage':if(!hasItem('绷带',1)&&!hasItem('止血带',1)&&!hasItem('止血粉',1))return false;removeItem(hasItem('绷带',1)?'绷带':hasItem('止血带',1)?'止血带':'止血粉',1);w.bandaged=true;w.bleeding=false;addStory(`🩹 包扎了<strong>${PL[pid]}</strong>，止住了流血。`,'medical');break;
    case'treat':if(!hasItem('医疗包',1)&&!hasItem('缝合针线',1)&&!hasItem('手术刀',1)&&!hasItem('烧伤膏',1))return false;const tn=hasItem('医疗包',1)?'医疗包':hasItem('缝合针线',1)?'缝合针线':hasItem('手术刀',1)?'手术刀':'烧伤膏';removeItem(tn,1);w.cleaned=true;w.severity=Math.max(1,w.severity-1);w.bleeding=false;w.bandaged=true;addStory(`💊 使用${tn}处理了<strong>${PL[pid]}</strong>。`,'medical');break;
    case'antibiotic':const ab=hasItem('抗生素',1)?'抗生素':hasItem('退烧药',1)?'退烧药':hasItem('抗病毒药',1)?'抗病毒药':null;if(!ab)return false;removeItem(ab,1);w.infected=false;w.cleaned=true;S.infectionLevel=clamp(S.infectionLevel-20,0,100);addStory(`💉 ${PL[pid]}使用${ab}，感染得到控制。`,'medical');break;
    case'clean':const cl=hasItem('净水',1)?'净水':hasItem('消毒酒精',1)?'消毒酒精':hasItem('碘伏',1)?'碘伏':hasItem('草药',1)?'草药':null;if(!cl)return false;removeItem(cl,1);w.cleaned=true;w.infected=false;addStory(`💧 用${cl}清洗了<strong>${PL[pid]}</strong>。`,'medical');break;
    case'painkiller':const pk=hasItem('止痛药',1)?'止痛药':hasItem('吗啡',1)?'吗啡':null;if(!pk)return false;removeItem(pk,1);S.pain=clamp(S.pain-25,0,100);addStory(`💊 服用${pk}，疼痛减轻。`,'medical');break;
    case'splint':if(!hasItem('夹板',1))return false;removeItem('夹板',1);w.bandaged=true;w.bleeding=false;w.cleaned=true;w.severity=Math.max(1,w.severity-1);addStory(`🪵 用夹板固定了<strong>${PL[pid]}</strong>，恢复速度加快。`,'medical');break;
    case'brace':if(!hasItem('支架',1))return false;removeItem('支架',1);w.bandaged=true;w.bleeding=false;w.cleaned=true;w.severity=Math.max(1,w.severity-1);addStory(`🔩 用支架固定了<strong>${PL[pid]}</strong>，恢复速度加快。`,'medical');break;
    default:return false;
  }return true;
}

function getMedics(){
  return S.party.filter(function(p){
    return p.alive&&p.skill==='medical'&&p.health>30&&p.fatigue<80;
  });
}
function doFieldMedicCall(){
  var medics=getMedics();if(medics.length===0){setStatus('没有可用的队医！');return;}
  var m=medics[0];m.fatigue=clamp(m.fatigue+rand(10,20),0,100);
  // Treat all wounds found on player
  var treatedCount=0;
  BODY_PARTS.forEach(function(pid){
    S.body[pid].wounds.forEach(function(w){
      if(!w.bandaged||w.bleeding){w.bandaged=true;w.bleeding=false;treatedCount++;}
      if(!w.cleaned){w.cleaned=true;if(w.infected){w.infected=false;S.infectionLevel=clamp(S.infectionLevel-15,0,100);}treatedCount++;}
      if(w.severity>=2){w.severity=Math.max(1,w.severity-1);treatedCount++;}
    });
  });
  S.blood=clamp(S.blood+rand(10,25),0,100);S.pain=clamp(S.pain-rand(15,30),0,100);
  addStory(`🏥 <strong>${m.e} ${m.name}赶到你身边！</strong>看到你动弹不得，${m.gender=='男'?'他':'她'}二话不说打开医药包，为你检查和处理了${treatedCount}处伤口。`,'medical');
  addStory(`"别担心，忍一下。"${m.name}轻声说。${m.gender=='男'?'他':'她'}的手法专业利落。虽然条件简陋，但至少你能动了。`,'party');
  modRep(3,'队友救治');addStory(`⚡ ${m.name}消耗了体力（疲劳+${m.fatigue}），但你的伤势明显好转了。`,'system');
  updateUI();checkDeath();
  // Re-evaluate canLeave - if still stuck, let player know
  var db=getInjuryDebuffs();
  if(!db.cantLeave){addStory(`✅ 治疗后你可以行动了！继续前进吧。`,'system');setChoices(['▶ 继续推进']);}
  else{addStory(`⚠️ 治疗后伤势有所好转，但${db.cantLeaveReason}。还需要进一步治疗或休息。`,'medical');setChoices(['尝试休息恢复','使用医疗物品治疗']);}
}
function medicTreatWound(pid,wid,medicId){
  var medic=S.party.find(function(p){return p.id===medicId;});
  if(!medic||!medic.alive||medic.skill!=='medical'){setStatus('该队友不是医疗人员！');return;}
  if(medic.health<30){setStatus(medic.name+'伤势太重无法工作！');return;}
  if(medic.fatigue>80){setStatus(medic.name+'太累了需要休息！');return;}
  var w=S.body[pid].wounds.find(function(x){return x.id===wid;});
  if(!w){setStatus('伤口不存在');return;}
  // Medic can treat without items (using their medical skill)
  // But it costs them fatigue and has success chance based on their health
  var successChance=0.7+(medic.health/200)+(100-medic.fatigue)/200; // 70-95% based on state
  medic.fatigue=clamp(medic.fatigue+rand(5,15),0,100);
  if(Math.random()<successChance){
    // Success: treat the wound effectively
    w.bandaged=true;w.bleeding=false;w.cleaned=true;
    if(w.severity>=2)w.severity=Math.max(1,w.severity-1);
    if(w.infected){w.infected=false;S.infectionLevel=clamp(S.infectionLevel-15,0,100);}
    S.blood=clamp(S.blood+rand(5,15),0,100);
    S.pain=clamp(S.pain-rand(10,20),0,100);
    addStory(`🏥 <strong>${medic.name}(${medic.e}${medic.sn})为你处理了${PL[pid]}的伤口！</strong>专业的手法让伤口恢复加快了许多。`,'medical');
    modRep(1,'接受治疗');
  }else{
    // Partial success
    w.bandaged=true;w.bleeding=false;
    addStory(`🏥 <strong>${medic.name}尽力处理了你的伤口。</strong>虽然条件简陋，但至少止住了流血。${medic.name}累得满头大汗。`,'medical');
  }
  updateUI();if(pid)showBodyDetail(pid);
}

function getNpcStatus(n){
  if(!n.alive)return{icon:'💀',d:'已死亡'};
  if(n.activity==='train')return{icon:'📚',d:'培训中'};
  if(n.health<25)return NPC_STATUSES.injured;
  if(n.health<50&&n.hunger<30)return NPC_STATUSES.sick;

      h+=`<span style="background:#111;padding:2px 5px;border-radius:3px;display:flex;align-items:center;gap:3px;">${ITEMS[nm]?.e||'📦'}${nm}×${d.qty}<button class="treatment-btn" onclick="takeFromNpc('${n.id}','${nm}',1)" style="font-size:0.55em;padding:1px 4px;" title="从${n.name}背包取回">📤取1</button><button class="treatment-btn" onclick="takeFromNpc('${n.id}','${nm}',${d.qty})" style="font-size:0.55em;padding:1px 4px;" title="全部取回">📤全部</button></span>`;
    });h+=`</div>`;}h+=`</div>`;

  // Give items (with loyalty hint)
  h+=`<div style="font-size:0.72em;margin-bottom:6px;"><strong>🎁 给予物品：</strong><span style="color:var(--text-dim);font-size:0.65em;">给予可提升忠诚度和士气</span><div class="treatment-row">`;
  const myItems=Object.entries(S.inventory);
  if(myItems.length===0)h+='<span style="color:var(--text-dim)">你背包空空</span>';
  else myItems.forEach(([nm,d])=>{
    h+=`<button class="treatment-btn" onclick="giveToNpc('${n.id}','${nm}',1)" style="font-size:0.6em;">${d.e}${nm}×1</button>`;
  });h+=`</div></div>`;

  // Give equipment
  h+=`<div style="font-size:0.72em;margin-bottom:6px;"><strong>🧥 给予装备：</strong><div class="treatment-row">`;
  var equipItems=Object.entries(S.inventory).filter(function(e){var info=ITEMS[e[0]];return info&&info.slot;});
  if(equipItems.length===0)h+='<span style="color:var(--text-dim);font-size:0.65em;">背包中无可装备物品</span>';
  else equipItems.forEach(function(e){var nm=e[0],d=e[1];
    h+='<button class="treatment-btn" onclick="giveEquipToNpc(\''+n.id+'\',\''+nm+'\')" style="font-size:0.6em;">'+d.e+nm+'</button>';
  });h+=`</div></div>`;

  // Treat wounds
  if(n.wounds&&n.wounds.some(w=>w.bleeding&&!w.bandaged)&&npcHasItem(n,'绷带',1)){
    h+=`<button class="treatment-btn" onclick="npcSelfTreat('${n.id}','bandage')">🩹 让${n.name}自己包扎</button> `;}
  if(n.wounds&&n.wounds.some(w=>!w.cleaned)&&npcHasItem(n,'净水',1)){
    h+=`<button class="treatment-btn" onclick="npcSelfTreat('${n.id}','clean')">💧 让${n.name}清洗伤口</button> `;}

  // Marriage
  if(!S.spouse&&n.gender!==S.playerGender&&getRelationship(n).level>=3){
    h+=`<div style="margin-top:6px;"><button class="treatment-btn" onclick="proposeMarriage('${n.id}')" style="color:#ff69b4;border-color:#ff69b4;">💍 求婚</button></div>`;}
  if(S.spouse===n.id)h+=`<div style="margin-top:4px;color:#ff69b4;font-size:0.72em;">💍 配偶 | `+(S.children.length>0?`孩子：${S.children.filter(c=>c.alive).map(c=>c.name+'('+childAgeStr(c.ageMonths)+')').join('、')}`:'尚未有孩子')+`</div>`;
  // Training status
  if(n._training){
    var pct=Math.round(n._training.progress/n._training.target*100);
    var trainer=S.party.find(function(p){return p.id===n._training.trainerId;});
    h+=`<div style="margin-top:6px;padding:6px;background:#0a1a0a;border:1px solid #2a4a2a;border-radius:4px;font-size:0.72em;">`;
    h+=`📚 <strong>培训中：${getSkillName(n._training.skill)}</strong><br>`;
    h+=`导师：${trainer?trainer.e+trainer.name:'(不在队中)'} | 进度：${n._training.progress}/${n._training.target} (${pct}%)`;
    h+=`<span style="display:inline-block;width:80px;height:6px;background:#222;border-radius:3px;vertical-align:middle;margin-left:4px;"><span style="display:inline-block;width:${pct*0.8}px;height:6px;background:var(--success);border-radius:3px;"></span></span>`;
    h+=`<br><button class="treatment-btn" style="border-color:var(--danger);color:var(--danger);margin-top:3px;" onclick="cancelTraining('${n.id}')">❌ 取消培训</button>`;
    h+=`</div>`;
  }else if(n.activity==='idle'&&atCamp()){
    // Show available trainers
    var trainers=S.party.filter(function(p){
      return p.alive&&p.id!==n.id&&p.skill!==n.skill&&p.fatigue<70&&
        ['medical','build','combat','scout'].indexOf(p.skill)>=0;
    });
    if(trainers.length>0){
      h+=`<div style="margin-top:6px;padding:4px;background:#111;border:1px solid #2a2a2a;border-radius:4px;font-size:0.68em;">`;
      h+=`<strong>📚 拜师学艺：</strong>`;
      trainers.forEach(function(t){
        h+=`<button class="treatment-btn" style="border-color:var(--accent);color:var(--accent);margin:2px;" onclick="startTraining('${n.id}','${t.id}','${t.skill}')">👨‍🏫 ${t.e}${t.name}教${getSkillName(t.skill)}</button>`;
      });
      h+=`<span style="color:var(--text-dim);font-size:0.65em;">（需15回合，学员保持休息状态）</span>`;
      h+=`</div>`;
    }
  }
  // Activity
  h+=`<div style="margin-top:6px;"><strong>🔧 分配任务：</strong><div class="treatment-row">`;
  h+=`<button class="treatment-btn" onclick="assignNpc('${n.id}','scout')">👀侦察</button>`;
  h+=`<button class="treatment-btn" onclick="assignNpc('${n.id}','gather')">🔍搜刮</button>`;
  h+=`<button class="treatment-btn" onclick="assignNpc('${n.id}','chop')">🪓砍树</button>`;
  h+=`<button class="treatment-btn" onclick="assignNpc('${n.id}','hunt')">🏹狩猎</button>`;
  h+=`<button class="treatment-btn" onclick="assignNpc('${n.id}','guard')">🛡️守卫</button>`;
  h+=`<button class="treatment-btn" onclick="assignNpc('${n.id}','idle')">😴休息</button>`;
  h+=`</div></div>`;

  h+=`<div class="btn-row" style="margin-top:6px;"><button class="btn small" onclick="closeModal()">关闭</button></div>`;
  modal.innerHTML=h;ov.classList.add('active');
}

function giveEquipToNpc(nid,itemName){
  var n=S.party.find(function(p){return p.id===nid;});if(!n||!n.alive)return;
  var info=ITEMS[itemName];if(!info||!info.slot)return;
  if(!hasItem(itemName,1)){setStatus('背包中没有'+itemName);return;}
  if(!n.clothing){n.clothing={head:{name:'无'},upper:{name:'无'},lower:{name:'无'},feet:{name:'无'},body:{name:'无'},hands:{name:'无'},mask:{name:'无'}};}
  var slot=info.slot;var old=n.clothing[slot];
  // Give old equipment back to player
  if(old&&old.name!=='无'){addItem(old.name,1);}
  removeItem(itemName,1);
  n.clothing[slot]={name:itemName,warmth:info.warmth||0,wp:info.wp||0,armor:info.armor||0,rad:info.rad||0,stealth:info.stealth||0};
  n.loyalty=clamp(n.loyalty+rand(3,8),0,100);n.morale=clamp(n.morale+rand(2,5),0,100);
  addStory('🧥 <strong>'+n.name+'</strong>穿上了'+info.e+itemName+'（🤝忠诚+ 😊士气+）','party');
  updateUI();showTeammateDetail(nid);
}
function giveToNpc(nid,itemName,qty){
  const n=S.party.find(p=>p.id===nid);if(!n||!n.alive)return;
  if(!hasItem(itemName,qty)){setStatus('背包中没有足够的'+itemName);return;}
  // If it's clothing, equip it instead
  var info=ITEMS[itemName];
  if(info&&info.slot){giveEquipToNpc(nid,itemName);return;}
  removeItem(itemName,qty);addItemToNpc(n,itemName,qty);
  // Giving items increases loyalty and morale
  var loyaltyGain=rand(2,5);var moraleGain=rand(1,4);
  // Food/water gives more morale, weapons/medical gives more loyalty
  var cat=info?info.cat||'':'';
  if(cat==='food'||itemName==='净水'){moraleGain=rand(3,7);loyaltyGain=rand(1,3);}
  else if(cat==='weapon'||cat==='medical'){loyaltyGain=rand(3,8);moraleGain=rand(1,3);}
  n.loyalty=clamp(n.loyalty+loyaltyGain,0,100);n.morale=clamp(n.morale+moraleGain,0,100);
  addStory(`🎁 给了<strong>${n.name}</strong> ${ITEMS[itemName]?.e||''}${itemName}×${qty}（🤝忠诚+${loyaltyGain} 😊士气+${moraleGain}）`,'party');
  updateUI();showTeammateDetail(nid);
}
function takeFromNpc(nid,itemName,qty){
  const n=S.party.find(p=>p.id===nid);if(!n||!n.alive)return;
  if(!npcHasItem(n,itemName,qty)){setStatus(n.name+'的背包中没有足够的'+itemName);return;}
  // Check player backpack capacity before taking
  var slotFull=Object.keys(S.inventory).length>=maxSlots()&&!S.inventory[itemName];
  var weightFull=S.backpackWeight+qty*itemWeight(itemName)>S.backpackMaxWeight;
  if(slotFull||weightFull){setStatus('你的背包已满！先清理空间。');return;}
  qty=Math.min(qty,n.inventory[itemName].qty);removeItemFromNpc(n,itemName,qty);addItem(itemName,qty);
  // Taking items slightly reduces loyalty
  var loyaltyLoss=rand(1,3);
  n.loyalty=clamp(n.loyalty-loyaltyLoss,0,100);
  addStory(`📤 从<strong>${n.name}</strong>的背包取回了 ${ITEMS[itemName]?.e||''}${itemName}×${qty}（🤝忠诚-${loyaltyLoss}）`,'party');
  updateUI();showTeammateDetail(nid);
}

function npcSelfTreat(nid,action){
  const n=S.party.find(p=>p.id===nid);if(!n||!n.alive)return;
  const wound=n.wounds.find(w=>action==='bandage'?w.bleeding&&!w.bandaged:!w.cleaned);
  if(!wound)return;
  const item=action==='bandage'?'绷带':'净水';
  if(!removeItemFromNpc(n,item,1))return;
  if(action==='bandage'){wound.bandaged=true;wound.bleeding=false;}
  else{wound.cleaned=true;wound.infected=false;}
  addStory(`${n.e} <strong>${n.name}</strong>自己处理了伤口。`,'party');
  updateUI();showTeammateDetail(nid);
}

function assignNpc(nid,activity){
  const n=S.party.find(p=>p.id===nid);if(!n||!n.alive)return;
  n.activity=activity;n.activityTurns=0;
  if(activity!=='idle')n._training=null; // training only works while idle
  const actName={scout:'侦察',gather:'搜刮',guard:'守卫营地',idle:'休息',train:'📚培训中',chop:'🪓砍树',hunt:'🏹狩猎'};
  addStory(`🔧 <strong>${n.name}</strong>开始${actName[activity]||activity}。`,'party');
  updateUI();showTeammateDetail(nid);
}

// ===== 技能培训系统 =====
function startTraining(traineeId,trainerId,skill){
  var trainee=S.party.find(function(p){return p.id===traineeId;});
  var trainer=S.party.find(function(p){return p.id===trainerId;});
  if(!trainee||!trainer||!trainee.alive||!trainer.alive)return;
  if(trainer.skill!==skill){setStatus(trainer.name+'没有'+getSkillName(skill)+'技能！');return;}
  if(trainee.skill===skill){setStatus(trainee.name+'已经有'+getSkillName(skill)+'技能了！');return;}
  if(trainee.activity!=='idle'){setStatus(trainee.name+'必须休息状态才能学习！先分配休息。');return;}
  if(trainer.fatigue>70){setStatus(trainer.name+'太累了无法教学！');return;}
  // Start training
  trainee._training={skill:skill,trainerId:trainerId,progress:0,target:15};
  trainee.activity='train';trainee.activityTurns=0;
  trainer.fatigue=clamp(trainer.fatigue+5,0,100);
  addStory(`📚 <strong>${trainee.name}</strong>开始向<strong>${trainer.name}</strong>学习${getSkillName(skill)}！预计需要15回合。`,'party');
  updateUI();showTeammateDetail(traineeId);
}
function getSkillName(skill){
  var names={scout:'侦察',gather:'拾荒',guard:'守卫',medical:'医疗',build:'建造',combat:'战斗'};
  return names[skill]||skill;
}
function tickTraining(){
  // Process NPC training
  S.party.forEach(function(n){
    if(!n.alive||!n._training)return;
    if(n.activity!=='train')return; // only progress while in train mode
    n._training.progress++;
    // Trainer teaching bonus
    var trainer=S.party.find(function(p){return p.id===n._training.trainerId;});
    // Every 3 turns, trainer gains a tiny bit of fatigue from teaching
    if(n._training.progress%3===0&&trainer&&trainer.alive){
      trainer.fatigue=clamp(trainer.fatigue+rand(1,3),0,100);
    }
    // Completion check
    if(n._training.progress>=n._training.target){
      var newSkill=n._training.skill;
      n.skill=newSkill;n.sn=getSkillName(newSkill);
      n._training=null;n.activity='idle';n.activityTurns=0;
      addStory(`🎓 <strong>${n.name}学成出师！</strong>经过刻苦学习，${n.gender=='男'?'他':'她'}现在是一名合格的${getSkillName(newSkill)}了！`,'party');
      if(trainer&&trainer.alive){
        trainer.morale=clamp(trainer.morale+rand(3,8),0,100);
        addStory(`👨‍🏫 <strong>${trainer.name}</strong>看到徒弟学成，感到非常欣慰（士气+）。`,'party');
      }
      modRep(3,'培训新人才');
    }
  });
  // Process child apprenticeship
  S.children.forEach(function(c){
    if(!c.alive||!c._apprenticeSkill)return;
    // Children just track the skill - no progress needed
  });
}

function cancelChildApprentice(idx){
  var c=S.children[idx];if(!c||!c.alive)return;
  var skillName=getSkillName(c._apprenticeSkill||'');
  c._apprenticeSkill=null;c._mentorName=null;
  addStory(`❌ <strong>${c.name}</strong>中断了${skillName}学习。`,'party');
  updateUI();showChildDetail(idx);
}
function cancelTraining(traineeId){
  var trainee=S.party.find(function(p){return p.id===traineeId;});
  if(!trainee||!trainee._training)return;
  var skillName=getSkillName(trainee._training.skill);
  trainee._training=null;trainee.activity='idle';trainee.activityTurns=0;
  addStory(`❌ <strong>${trainee.name}</strong>中断了${skillName}培训。`,'party');
  updateUI();showTeammateDetail(traineeId);
}

// Child apprenticeship - assign a mentor to a child
function apprenticeChild(childIdx,mentorId){
  var c=S.children[childIdx];if(!c||!c.alive)return;
  if(c.ageMonths<60){setStatus('孩子必须5岁以上才能开始学习！');return;}
  var mentor=S.party.find(function(p){return p.id===mentorId;});
  if(!mentor||!mentor.alive){setStatus('导师不存在！');return;}
  if(mentor.fatigue>70){setStatus(mentor.name+'太累了无法教学！');return;}
  c._apprenticeSkill=mentor.skill;c._mentorName=mentor.name;
  mentor.fatigue=clamp(mentor.fatigue+3,0,100);
  addStory(`👶📚 <strong>${c.name}</strong>开始跟随<strong>${mentor.name}</strong>学习${getSkillName(mentor.skill)}！${c.gender=='男'?'他':'她'}每天在营地跟着师父练习。`,'party');
  updateUI();showChildDetail(childIdx);
}

// ===== TEAMMATE AUTONOMY =====
function teammateTurn(){
  for(const n of S.party){
    if(!n.alive)continue;
    // === Self-care: use items from own inventory ===
    if(n.hunger<40&&npcHasItem(n,'罐头',1)){removeItemFromNpc(n,'罐头',1);n.hunger=clamp(n.hunger+22,0,100);}
    else if(n.hunger<40&&npcHasItem(n,'干粮',1)){removeItemFromNpc(n,'干粮',1);n.hunger=clamp(n.hunger+14,0,100);}
    if(n.thirst<40&&npcHasItem(n,'净水',1)){removeItemFromNpc(n,'净水',1);n.thirst=clamp(n.thirst+18,0,100);}
    // Self-treat wounds
    const bleedW=n.wounds.find(w=>w.bleeding&&!w.bandaged);
    if(bleedW&&npcHasItem(n,'绷带',1)){removeItemFromNpc(n,'绷带',1);bleedW.bandaged=true;bleedW.bleeding=false;}
    const dirtyW=n.wounds.find(w=>!w.cleaned);
    if(dirtyW&&npcHasItem(n,'净水',1)){removeItemFromNpc(n,'净水',1);dirtyW.cleaned=true;}

    // === Vital decay ===
    n.hunger=clamp(n.hunger+rand(-5,-2),0,100);n.thirst=clamp(n.thirst+rand(-4,-2),0,100);n.fatigue=clamp(n.fatigue+rand(1,4),0,100);
    // Wound effects
    for(const w of n.wounds){if(w.bleeding&&!w.bandaged)n.health=clamp(n.health-w.severity*2,0,100);if(w.infected)n.health=clamp(n.health-3,0,100);}

    // === Activity effects ===
    n.activityTurns++;
    if(n.activity==='idle'){n.fatigue=clamp(n.fatigue-8,0,100);if(n.health<80)n.health=clamp(n.health+3,0,100);}
    else if(n.activity==='train'){n.fatigue=clamp(n.fatigue-3,0,100);if(n.health<80)n.health=clamp(n.health+1,0,100);}
    else if(n.activity==='scout'&&n.activityTurns%3===0){// Every 3 turns, chance to discover location
      const unknown=MAP_LOCATIONS.filter(l=>!S.discoveredLocations.includes(l.id));
      if(unknown.length>0&&Math.random()<0.4){const loc=pick(unknown);S.discoveredLocations.push(loc.id);addStory(`👀 <strong>${n.name}</strong>侦察发现了新地点：${loc.icon} <strong>${loc.name}</strong>（${loc.dir}方${loc.dist}km）`,'party');}}
    else if(n.activity==='gather'&&n.activityTurns%2===0){
      var gatherBoost=getPolicyEffect('gatherBoost');
      var loots=[{n:'罐头',q:[1,2]},{n:'净水',q:[1,2]},{n:'木材',q:[1,2]},{n:'布料',q:[1,1]},{n:'弹药',q:[1,2]},{n:'金属片',q:[1,1]}];
      if(gatherBoost>0)loots=loots.concat([{n:'电子零件',q:[1,1]},{n:'胶带',q:[1,1]}]);
      var lt=pick(loots);var q=Array.isArray(lt.q)?rand(lt.q[0],lt.q[1]):lt.q;
      if(gatherBoost>0)q=Math.ceil(q*(1+gatherBoost));
      addItemToNpc(n,lt.n,q);if(Math.random()<0.3){addStory(`🔍 <strong>${n.name}</strong>找到了${ITEMS[lt.n]?.e||''}${lt.n}×${q}`,'party');}}
    else if(n.activity==='chop'&&n.activityTurns%2===0){
      var chopBoost=getPolicyEffect('chopBoost');var woodQty=rand(1,3);if(chopBoost>0)woodQty=Math.ceil(woodQty*(1+chopBoost));
      addItemToNpc(n,'木材',woodQty);if(Math.random()<0.5){addStory(`🪓 <strong>${n.name}</strong>砍了${woodQty}份木材`,'party');}}
    else if(n.activity==='hunt'&&n.activityTurns%2===0){
      var huntQty=rand(1,3);addItemToNpc(n,'变异兽肉',huntQty);if(Math.random()<0.5){addStory(`🏹 <strong>${n.name}</strong>猎到了${huntQty}份兽肉`,'party');}}
    else if(n.activity==='guard'){
      var guardBoost=getPolicyEffect('guardBoost');if(n.activityTurns%4===0)S.camp.defense=clamp(S.camp.defense+(guardBoost>0?4:2),0,100);}

    // === Auto-feed NPC from camp supplies ===
    if(n.hunger<50&&n.activity!=='gather'){
      var campHadFood=false;
      ['罐头','干粮','军用口粮','变异兽肉','鱼干','蘑菇干'].forEach(function(fn){
        if(!campHadFood&&hasItem(fn,1,true)){removeItem(fn,1,true);n.hunger=clamp(n.hunger+25,0,100);campHadFood=true;}
      });
    }
    if(n.thirst<50&&n.activity!=='gather'){
      if(hasItem('净水',1,true)){removeItem('净水',1,true);n.thirst=clamp(n.thirst+30,0,100);}
    }
    // Hunger/thirst affects loyalty
    if(n.hunger<25){n.loyalty=clamp(n.loyalty-rand(1,3),0,100);if(Math.random()<0.2)addStory(`⚠️ <strong>${n.name}</strong>饥饿难耐，忠诚度下降。`,'party');}
    if(n.thirst<20){n.loyalty=clamp(n.loyalty-rand(1,2),0,100);}

    // === Morale & Loyalty shifts ===
    if(n.hunger<25)n.morale=clamp(n.morale-5,0,100);if(n.thirst<25)n.morale=clamp(n.morale-4,0,100);
    if(n.health<40)n.morale=clamp(n.morale-3,0,100);if(n.fatigue>70)n.morale=clamp(n.morale-3,0,100);
    if(n.hunger>60&&n.thirst>60&&n.health>60)n.morale=clamp(n.morale+2,0,100);
    if(atCamp()&&n.activity==='idle')n.morale=clamp(n.morale+2,0,100);
    if(S.weather&&S.weather.temperature<0)n.morale=clamp(n.morale-2,0,100);
    // Give items to teammate raises loyalty
    if(n.morale<25)n.loyalty=clamp(n.loyalty-3,0,100);

    // === Consequences ===
    // 背叛预兆系统
    if(!n._warned){n._warned={lowLoyalty:false,veryLowLoyalty:false,lowMorale:false,desperate:false};}
    if(n.loyalty<25&&!n._warned.veryLowLoyalty){n._warned.veryLowLoyalty=true;addStory(`⚠️ <strong>${n.name}最近行为异常</strong>——总是偷偷打量你的背包，说话也少了。`,'party');}
    else if(n.loyalty<40&&!n._warned.lowLoyalty){n._warned.lowLoyalty=true;addStory(`🤔 <strong>${n.name}看起来不太高兴。</strong>也许该和他聊聊，或者给他一些物资增进信任。`,'party');}
    if(n.morale<20&&!n._warned.lowMorale){n._warned.lowMorale=true;addStory(`😞 <strong>${n.name}的精神状态很差。</strong>"我不知道还能在这里撑多久..."这句话最近经常挂在嘴边。`,'party');}
    if(n.loyalty<20&&n.morale<20&&!n._warned.desperate){n._warned.desperate=true;addStory(`🚨 <strong style="color:var(--danger)">${n.name}濒临崩溃！</strong>如果你不尽快改善他的处境——提高忠诚或恢复士气——他可能会做出极端的事。`,'party');}
    // 滞后重置：触发值<重置值，防抖
    if(n.loyalty>=45){n._warned.lowLoyalty=false;n._warned.veryLowLoyalty=false;n._warned.desperate=false;}
    if(n.morale>=35)n._warned.lowMorale=false;
    if(n.loyalty>=25||n.morale>=25)n._warned.desperate=false;

    // Desertion: low morale + low loyalty (with warning already given)
    if(n.morale<15&&n.loyalty<30&&Math.random()<0.12){
      addStory(`💔 <strong>${n.name}离开了团队。</strong>"对不起...我撑不下去了。"${n.name}带着自己的背包消失在废土中。你早有预感。`,'party');
      for(const [nm,d]of Object.entries(n.inventory||{})){for(let i=0;i<d.qty;i++)addItem(nm,1);}
      n.alive=false;continue;}
    // Betrayal: very low loyalty (with warning already given)
    if(n.loyalty<15&&Math.random()<0.08){
      addStory(`💔 <strong>${n.name}背叛了你！</strong>那些异常的行为终于有了答案——趁着夜色偷走物资，消失得无影无踪。`,'party');
      const myKeys=Object.keys(S.inventory);for(let i=0;i<Math.min(3,myKeys.length);i++){const k=myKeys[rand(0,myKeys.length-1)];removeItem(k,rand(1,2));}
      n.alive=false;continue;}
    // Death from neglect
    if(n.health<=0){n.alive=false;addStory(`💀 <strong>${n.name}倒下了。</strong>你没能及时照顾队友。`,'party');continue;}
    if(n.hunger<=0){n.health=clamp(n.health-20,0,100);if(n.health<=0){n.alive=false;addStory(`💀 <strong>${n.name}饿死了...</strong>`,'party');}}
    if(n.thirst<=0){n.health=clamp(n.health-25,0,100);if(n.health<=0){n.alive=false;addStory(`💀 <strong>${n.name}脱水而死...</strong>`,'party');}}

    // Heal old wounds
    n.wounds=n.wounds.filter(w=>{if(w.bandaged&&w.cleaned&&!w.infected&&Math.random()<0.3)return false;return true;});
  }
}

function getRelationship(npc){
  if(S.spouse===npc.id)return{icon:'💍',name:'配偶',level:5};
  if(npc.loyalty>80&&npc.morale>70)return{icon:'❤️',name:'亲密',level:4};
  if(npc.loyalty>60&&npc.morale>50)return{icon:'😊',name:'好友',level:3};
  if(npc.loyalty>35)return{icon:'🙂',name:'同伴',level:2};
  return{icon:'🤝',name:'认识',level:1};
}
function proposeMarriage(nid){
  const n=S.party.find(p=>p.id===nid);if(!n||!n.alive)return;
  if(S.spouse){setStatus('你已经结婚了！');return;}
  if(n.gender===S.playerGender){setStatus('同性无法在废土繁衍后代...');return;}
  const rel=getRelationship(n);
  if(rel.level<4){setStatus(`${n.name}和你的关系还不够亲密（需要❤️亲密）`);return;}
  if(n.loyalty<70){setStatus(`${n.name}的忠诚度不够（需要>70）`);return;}
  closeModal();S.spouse=n.id;n.morale=clamp(n.morale+20,0,100);n.loyalty=clamp(n.loyalty+15,0,100);
  addStory(`💍 <strong>${n.name}接受了你的求婚！</strong>在废土上，两个人的承诺是最奢侈的东西。你们在篝火前交换了誓言。`,'party');
  updateUI();
}
function tryHaveChild(){
  if(!S.spouse)return;
  const spouse=S.party.find(p=>p.id===S.spouse);if(!spouse||!spouse.alive)return;
  // ~5% chance per day when at camp with spouse
  if(!atCamp()||Math.random()>0.05)return;
  const childGender=pick(['男','女']);
  const childNames=childGender==='男'?['小光','石头','阿勇','小杰','晨晨']:['小花','小草','阿美','小雪','星星'];
  const child={name:pick(childNames),gender:childGender,ageMonths:0,alive:true,hunger:70,thirst:80,health:100};
  S.children.push(child);
  addStory(`👶 <strong>${spouse.name}怀孕了！</strong>九个月后，${child.gender=='男'?'儿子':'女儿'}<strong>${child.name}</strong>出生了。废土上诞生了一个新生命——这简直是奇迹。`,'party');
  addStory(`💡 孩子需要食物和水才能存活。点击孩子可以喂养。营地有食物和水时会自动消耗喂养。`,'system');
}
function growChildren(){
  for(const c of S.children){
    if(!c.alive)continue;
    // Age by 1 month per game event (~2-3 game hours)
    c.ageMonths=(c.ageMonths||0)+1;
    // === Child survival needs ===
    // Infants (0-36 months) consume less, children (37+ months) consume more
    var foodNeed=c.ageMonths<36?3:6;
    var waterNeed=c.ageMonths<36?2:5;
    c.hunger=clamp(c.hunger-foodNeed,0,100);
    c.thirst=clamp(c.thirst-waterNeed,0,100);
    // Auto-feed from camp supplies
    if(c.hunger<50){
      var campFood=0;
      ['罐头','干粮','军用口粮','变异兽肉','鱼干','蘑菇干'].forEach(function(fn){campFood+=(S.camp.supplies[fn]||0);});
      if(campFood>0){
        var toEat=Math.min(1,Math.ceil((60-c.hunger)/25)); // eat 1 item per tick when hungry
        for(var fi=0;fi<toEat;fi++){
          var ate=false;
          ['罐头','干粮','军用口粮','变异兽肉','鱼干','蘑菇干'].forEach(function(fn){
            if(!ate&&(S.camp.supplies[fn]||0)>0){
              removeItem(fn,1,true);c.hunger=clamp(c.hunger+25,0,100);ate=true;
            }
          });
          if(!ate)break;
        }
      }
    }
    if(c.thirst<50){
      var campWater=(S.camp.supplies['净水']||0);
      if(campWater>0){
        var toDrink=Math.min(1,Math.ceil((60-c.thirst)/30));
        for(var wi=0;wi<toDrink&&(S.camp.supplies['净水']||0)>0;wi++){
          removeItem('净水',1,true);c.thirst=clamp(c.thirst+30,0,100);
        }
      }
    }
    // Health effects from starvation/dehydration
    if(c.hunger<15)c.health=clamp(c.health-5,0,100);
    if(c.thirst<10)c.health=clamp(c.health-8,0,100);
    // === Death check ===
    if(c.hunger<=0){c.alive=false;addStory(`💀 <strong>${c.name}饿死了...</strong>营地没有足够的食物养活${c.gender=='男'?'他':'她'}。废土上最残酷的事莫过于此。`,'danger');continue;}
    if(c.thirst<=0){c.alive=false;addStory(`💀 <strong>${c.name}脱水而死...</strong>营地没有足够的水。`,'danger');continue;}
    if(c.health<=0){c.alive=false;addStory(`💀 <strong>${c.name}因病去世了...</strong>在废土上，孩子的抵抗力太弱了。`,'danger');continue;}
    // === Warnings ===
    if(c.hunger<25&&!c._warnedHunger){c._warnedHunger=true;addStory(`⚠️ <strong>${c.name}</strong>非常饥饿！需要尽快给${c.gender=='男'?'他':'她'}食物。`,'camp');}
    if(c.thirst<25&&!c._warnedThirst){c._warnedThirst=true;addStory(`⚠️ <strong>${c.name}</strong>非常口渴！需要尽快给${c.gender=='男'?'他':'她'}水。`,'camp');}
    if(c.hunger>=50)c._warnedHunger=false;if(c.thirst>=50)c._warnedThirst=false;
    // Natural recovery (when well-fed and watered)
    if(c.hunger>60&&c.thirst>60&&c.health<100)c.health=clamp(c.health+2,0,100);
    // === Age milestones ===
    if(c.ageMonths>=60&&!c._noted5){c._noted5=true;addStory(`👧 <strong>${c.name}</strong>已经5岁了。${c.gender=='男'?'他':'她'}开始在营地帮忙做些小事。`,'party');}
    if(c.ageMonths>=144&&!c._noted12){c._noted12=true;addStory(`🧒 <strong>${c.name}</strong>12岁了。${c.gender=='男'?'他':'她'}已经能分担一些营地工作了。`,'party');}
    // At 14 years (168 months), child becomes a full teammate
    if(c.ageMonths>=168&&!c._becameNpc){
      c._becameNpc=true;
      const skills=['scavenge','scout','build','medical'];const snames={scavenge:'拾荒',scout:'侦察',build:'建造',medical:'医疗'};
      // Use apprentice skill if trained, otherwise random
      var sk=c._apprenticeSkill||pick(skills);
      var mentorNote=c._mentorName?'，师从'+c._mentorName:'';
      const npc={id:'c'+Date.now()+rand(0,999),name:c.name,skill:sk,sn:snames[sk]||getSkillName(sk),d:`在废土营地长大的${c.gender=='男'?'少年':'少女'}${mentorNote}`,e:c.gender=='男'?'👦':'👧',gender:c.gender,age:14,health:100,hunger:70,thirst:80,fatigue:20,morale:70,loyalty:80,alive:true,inventory:{},activity:'idle',activityTurns:0};initNpcBody(npc);
      S.party.push(npc);
      addStory(`🎉 <strong>${c.name}长大了！</strong>这个在废土上出生的孩子如今已经14岁，成了一个能独当一面的${snames[sk]}${mentorNote?`——${c._mentorName}的悉心教导没有白费`:'——废土磨练出了'+(c.gender=='男'?'他':'她')+'的本领'}。${c.gender=='男'?'他':'她'}正式加入了小队。`,'party');
      modRep(5,'下一代成长');
      c.alive=false; // removed from children list, now in party
    }
  }
  // Clean up grown children
  S.children=S.children.filter(c=>c.alive);
}

// ===== PRODUCTION BUILDING TICK =====
let _prodTicks=0;
function tickMaintenance(){
  // 每天每个建筑消耗木材维护，否则掉耐久
  if(!S._maintDay||S._maintDay!==S.day){
    S._maintDay=S.day;
    initCampStructures();
    var cost=S.campStructures.filter(function(s){return s.type==='building'&&s.type!=='ruin';}).length;
    if(cost>0&&atCamp()){
      if(hasItem('木材',cost)){removeItem('木材',cost);}
      else{
        // 维护不足——建筑随机损坏
        var blds=S.campStructures.filter(function(s){return s.type==='building';});
        if(blds.length>0){
          var b=pick(blds);b.dur=(b.dur||100)-rand(10,25);
          if(b.dur<=0){b.type='ruin';addStory(`⚠️ <strong>${b.name}年久失修，坍塌了！</strong>维护不够——废土不养懒人。`,'camp');}
          else{addStory(`🔧 <strong>${b.name}</strong>因缺少木材维护而损坏（耐久${b.dur}%）。`,'camp');}
        }
      }
    }
  }
}
function tickProduction(){
  _prodTicks++;if(_prodTicks%2!==0)return;
  initCampStructures();
  S.campStructures.forEach(function(s){
    if(s.type!=='building')return;
    var b=BUILDINGS.find(function(x){return x.id===s.id;});if(!b||!b.produces)return;
    s._prodCounter=(s._prodCounter||0)+1;
    if(s._prodCounter>=b.produces.interval){
      s._prodCounter=0;var q=Array.isArray(b.produces.qty)?rand(b.produces.qty[0],b.produces.qty[1]):b.produces.qty;
      addItem(b.produces.item,q,true);
    }
  });
}

const CAMP_EVENTS=[
  {type:'grow',name:'发现物资仓库',icon:'📦',eff:{size:[3,8],defense:[5,15],supplies:[10,30]},msg:'{camp}在废墟中发现了战前物资仓库，实力大增。'},
  {type:'grow',name:'招募新成员',icon:'👥',eff:{size:[2,6],supplies:[5,15]},msg:'{camp}从流民中招募了一批新成员。'},
  {type:'grow',name:'发现军工厂',icon:'🏭',eff:{size:[5,10],defense:[10,25],supplies:[15,40]},msg:'{camp}发现了一座废弃军工厂！武器装备和物资大幅增加。',rare:true},
  {type:'decline',name:'掠夺者袭击',icon:'⚔️',eff:{size:[-5,-2],defense:[-15,-5],supplies:[-20,-10]},msg:'{camp}遭到掠夺者袭击，损失惨重。'},
  {type:'decline',name:'内部叛乱',icon:'💔',eff:{size:[-8,-3],defense:[-20,-10],loyalty:[-30,-15]},msg:'{camp}发生了内部叛乱，分裂为两派。'},
  {type:'decline',name:'疾病爆发',icon:'🤒',eff:{size:[-4,-1],loyalty:[-15,-5]},msg:'{camp}爆发了传染病，多人病倒。'},
  {type:'destroy',name:'暴风雪摧毁',icon:'❄️',seasons:['winter'],msg:'一场猛烈的暴风雪彻底摧毁了{camp}的营地。幸存者四散而去。'},
  {type:'destroy',name:'被变异兽群摧毁',icon:'🐺',msg:'大群变异兽袭击了{camp}，营地被夷为平地。'},
  {type:'destroy',name:'辐射泄漏',icon:'☢️',msg:'{camp}的营地地下发生了辐射泄漏，所有人被迫撤离。'},
  {type:'merge',name:'吞并',icon:'🤝',msg:'{camp1}吞并了{camp2}，实力进一步壮大。'},
];

function simulateCampEcology(){
  if(Math.random()>0.25)return; // 25% chance per turn to trigger ecology events
  // Get all camps in current biome
  const camps=S.enemyCamps.filter(ec=>ec.alive!==false);
  if(camps.length===0)return;

  const ev=pick(CAMP_EVENTS);

  if(ev.type==='merge'&&camps.length>=2){
    // Two camps merge
    const a=camps[rand(0,camps.length-1)];let b;
    do{b=camps[rand(0,camps.length-1)];}while(b===a);
    a.size+=b.size;a.defense=Math.max(a.defense,b.defense)+rand(5,15);a.supplies+=b.supplies;
    b.alive=false;_reportIntel([a,b],ev.msg.replace('{camp1}',`<strong>${a.name}</strong>`).replace('{camp2}',`<strong>${b.name}</strong>`));
  }else if(ev.type==='destroy'){
    if(ev.seasons&&!ev.seasons.includes(S.season?.id))return;
    const c=pick(camps);c.alive=false;
    _reportIntel([c],ev.msg.replace('{camp}',`<strong>${c.name}</strong>`));
    // Clean up dead camps occasionally
    S.enemyCamps=S.enemyCamps.filter(ec=>ec.alive!==false||Math.random()>0.5);
  }else if(ev.type==='grow'||ev.type==='decline'){
    if(ev.rare&&Math.random()>0.15)return; // rare events are less common
    const c=pick(camps);
    if(ev.eff.size){const v=ev.eff.size;c.size=clamp(c.size+(Array.isArray(v)?rand(v[0],v[1]):v),1,50);}
    if(ev.eff.defense){const v=ev.eff.defense;c.defense=clamp(c.defense+(Array.isArray(v)?rand(v[0],v[1]):v),0,100);}
    if(ev.eff.supplies){const v=ev.eff.supplies;c.supplies=clamp(c.supplies+(Array.isArray(v)?rand(v[0],v[1]):v),0,100);}
    if(ev.eff.loyalty){const v=ev.eff.loyalty;c.loyalty=clamp(c.loyalty+(Array.isArray(v)?rand(v[0],v[1]):v),0,100);}
    _reportIntel([c],ev.msg.replace('{camp}',`<strong>${c.name}</strong>`));
  }

  // New camp formation (small chance)
  if(Math.random()<0.08&&camps.length<6){
    const nc=generateEnemyCamp();nc._new=true;S.enemyCamps.push(nc);
    // Report via radio or scout
    if(hasItem('收音机',1)){addStory(`📻 收音机报道：一个新的幸存者营地——<strong>${nc.name}</strong>在附近成立了。`,'party');}
  }
}

function _reportIntel(camps,msg){
  // Only report if player has intel on at least one affected camp
  const hasIntel=camps.some(c=>c.scouted||c.spy);
  if(!hasIntel&&!hasItem('收音机',1))return; // no intel at all
  if(hasIntel)addStory(`📡 ${msg}`,'party');
  else if(hasItem('收音机',1)&&Math.random()<0.5)addStory(`📻 收音机消息：${msg}`,'party');
  // General "something happened" if no detail
  const unknown=camps.filter(c=>!c.scouted&&!c.spy);
  if(unknown.length>0&&hasItem('收音机',1)&&Math.random()<0.3){
    addStory(`📻 收音机提到附近有营地发生了变化，但细节不明——也许该派侦察去看看。`,'system');
  }
}

function expandCamp(){
  var cl=S._campLevel||1;var info=getCampLevelInfo(cl+1);
  var can=Object.entries(info.baseCost).every(function(e){return hasItem(e[0],e[1]);});
  if(!can){var missing=Object.entries(info.baseCost).filter(function(e){return !hasItem(e[0],e[1]);}).map(function(e){return e[0]+'×'+e[1];}).join(',');setStatus('材料不足，还需要：'+missing);return;}
  Object.entries(info.baseCost).forEach(function(e){removeItem(e[0],e[1]);});
  S._campLevel=info.level;
  addStory('🏗️ 营地扩建完成！现在是<strong>'+info.icon+' '+info.name+'</strong>（建筑上限'+getMaxStructures()+'，人口上限'+getMaxParty()+'）','camp');
  updateUI();showCampView();
}
function showExpandInfo(){
  var cl=S._campLevel||1;var cur=getCampLevelInfo(cl);var next=getCampLevelInfo(cl+1);
  var modal=document.getElementById('modal'),ov=document.getElementById('modal-overlay');

  h+='<div class="wound-card"><strong>升级到 '+next.icon+' '+next.name+' Lv.'+(cl+1)+'</strong>（建筑上限'+(getMaxStructures()+2)+'，人口上限'+getMaxParty()+'→'+Math.pow(2,cl+2)+'）<br><span style="font-size:0.7em;color:var(--text-dim)">需要：'+Object.entries(next.baseCost).map(function(e){return e[0]+'×'+e[1];}).join('、')+'</span><div class="treatment-row"><button class="treatment-btn" onclick="closeModal();expandCamp();">🔨 扩建</button></div></div>';
  h+='<div class="btn-row"><button class="btn small" onclick="closeModal()">关闭</button></div>';modal.innerHTML=h;ov.classList.add('active');
}

// ===== REPUTATION SYSTEM =====
function modRep(amount,reason){
  S.reputation=clamp(S.reputation+amount,0,100);
  if(Math.abs(amount)>=5)addStory(`📊 声望${amount>0?'+'+amount:amount}：${reason}`,'system');
}
function repTitle(){
  const r=S.reputation;
  if(r>=90)return{icon:'👑',name:'传奇',d:'废土上无人不知你的名字'};
  if(r>=70)return{icon:'⭐',name:'闻名',d:'各个营地都听说过你的事迹'};
  if(r>=50)return{icon:'📢',name:'知名',d:'附近的幸存者都知道你的营地'};
  if(r>=30)return{icon:'👍',name:'有声誉',d:'有些人听说过你'};
  if(r>=15)return{icon:'🤝',name:'初识',d:'少数人知道你的存在'};
  if(r>=0)return{icon:'🌱',name:'无名',d:'废土上没人认识你'};
  if(r>=-10)return{icon:'👀',name:'可疑',d:'有些人觉得你不可信'};
  if(r>=-25)return{icon:'⚠️',name:'危险',d:'废土传言你很危险'};
  if(r>=-50)return{icon:'☠️',name:'恶名',d:'人们看到你就躲'};
  return{icon:'💀',name:'恐惧',d:'废土上最可怕的名字——能止小儿夜啼'};
}
function repAttackMod(){const r=S.reputation;if(r>=80)return 0.2;if(r>=60)return 0.5;if(r>=40)return 0.75;if(r<15)return 1.5;return 1;}
function checkAutoRecruit(){
  var alive=S.party.filter(function(p){return p.alive;}).length;
  if(alive>=getMaxParty())return; // population cap
  const r=S.reputation;let chance=0;if(r>=80)chance=0.12;else if(r>=60)chance=0.06;else if(r>=40)chance=0.03;else return;
  if(Math.random()>chance)return;
  const t=pick(NPC_DB.filter(n=>!S.party.find(p=>p.name===n.name&&p.alive)));
  if(!t)return;
  const npc={id:'n'+Date.now()+rand(0,999),...t,health:100,hunger:70+rand(0,20),thirst:75+rand(0,15),fatigue:rand(10,30),morale:rand(50,80),loyalty:rand(50,80),alive:true,inventory:{},activity:'idle',activityTurns:0};initNpcBody(npc);
  addItemToNpc(npc,'罐头',rand(1,2));S.party.push(npc);
  addStory(`👥 <strong>${npc.e} ${npc.name}慕名而来！</strong>"听说这里有个靠谱的营地，我想加入。" ${npc.gender}性 ${npc.age}岁 特长：${npc.sn}。`,'party');
  addStory(`📋 状态：❤️${npc.health} 🍖${npc.hunger} 💧${npc.thirst} 😊${npc.morale} 🤝${npc.loyalty} | 点击左侧队友查看详情`,'system');
  modRep(2,'新成员加入');
  updateUI();
}

// ===== BIOME & TRAVEL =====
function randomBiome(){return pickW(BIOMES.map(b=>({...b,w:b.danger<=4?2:b.danger<=7?3:1})));}
function biomeDesc(){
  const b=S.currentBiome;if(!b)return'';
  return `${b.icon} <strong>${b.name}</strong>：${b.desc}（食物${'⭐'.repeat(b.food)} 水源${'⭐'.repeat(b.water)} 危险${'⚠️'.repeat(b.danger)}）`;
}
function travelToBiome(){
  if(S.isDead||S.busy)return;const modal=document.getElementById('modal'),ov=document.getElementById('modal-overlay');
  let h='<h3>🗺️ 前往新区域</h3><p style="font-size:0.78em;">选择目的地（需要2-5天路程）：</p>';
  BIOMES.forEach(b=>{
    if(b.id===S.currentBiome?.id){h+=`<div class="wound-card" style="border-left-color:var(--success)"><strong>${b.icon} ${b.name}</strong> <span style="color:var(--success)">（当前位置）</span><br><span style="font-size:0.7em;color:var(--text-dim)">${b.desc} | 食物${b.food} 水源${b.water} 危险${b.danger}</span></div>`;}
    else h+=`<div class="wound-card"><strong>${b.icon} ${b.name}</strong><br><span style="font-size:0.7em;color:var(--text-dim)">${b.desc} | 食物${'⭐'.repeat(b.food)} 水源${'⭐'.repeat(b.water)} 危险${'⚠️'.repeat(b.danger)}</span><div class="treatment-row"><button class="treatment-btn" onclick="doTravelBiome('${b.id}')">🚶前往（2-5天）</button></div></div>`;
  });
  h+=`<div class="btn-row"><button class="btn small" onclick="closeModal()">关闭</button></div>`;modal.innerHTML=h;ov.classList.add('active');

function doTravelBiome(biomeId){
  closeModal();const b=BIOMES.find(x=>x.id===biomeId);if(!b||b.id===S.currentBiome?.id)return;
  S.busy=true;btnDisabled(true);setStatus(`前往${b.name}...`);setChoices([]);
  const days=rand(2,5);for(let d=0;d<days;d++){for(let h=0;h<24;h++)advanceHour(1);}
  S.currentBiome=b;S.distance=0;S.fatigue=clamp(S.fatigue+days*10,0,100);
  addStory(`🗺️ 经过${days}天的跋涉，你到达了<strong>${b.icon} ${b.name}</strong>。${b.desc}`,'system');
  // Generate enemy camps in new biome
  S.enemyCamps=[];const campCount=rand(1,3);
  for(let i=0;i<campCount;i++)S.enemyCamps.push(generateEnemyCamp());
  if(S.enemyCamps.length>0)addStory(`⚠️ 侦察发现附近有${S.enemyCamps.length}个敌对营地。点击「⚔️ 敌对营地」查看。`,'system');
  progressWounds();teammateTurn();updateUI();S.busy=false;btnDisabled(false);setChoices(['探索新区域','建立营地','搜索物资']);
}

// ===== ENEMY CAMP SYSTEM =====
function generateEnemyCamp(){
  const name=pick(ENEMY_CAMP_NAMES);const leader=pick(ENEMY_LEADERS);
  const traits=[];for(let i=0;i<rand(1,3);i++){const t=pick(ENEMY_TRAITS);if(!traits.includes(t))traits.push(t);}
  return{id:'ec'+Date.now()+rand(0,999),name,leader,size:rand(5,25),defense:rand(20,80),supplies:rand(30,100),loyalty:rand(30,90),traits,
    scouted:false, // has player gathered intel?
    spy:null, // NPC id of spy, if any
    sabotaged:false,poisoned:false,};
}
function showDiary(){
  var h='<h3>📖 废土日记</h3><div style="max-height:60vh;overflow-y:auto;font-size:0.82em;line-height:1.8;">';
  h+='<p style="color:var(--text-dim);margin-bottom:12px;">第'+S.day+'天 | '+repTitle().icon+' '+repTitle().name+' | 小队'+S.party.filter(function(p){return p.alive;}).length+'人 | 🏆成就'+S.achievements.length+'个</p>';
  if(S.history.length===0){h+='<p style="color:var(--text-dim);">日记空空如也——你还没来得及写下什么。</p>';}
  else{
    var shown=0;
    for(var i=S.history.length-1;i>=0&&shown<20;i--){
      var ev=S.history[i];if(!ev||!ev.summary)continue;
      h+='<p style="margin-bottom:4px;border-left:2px solid rgba(233,69,96,0.3);padding-left:10px;">';
      h+='<strong style="color:var(--text-dim);font-size:0.7em;">📅 第'+ev.day+'天</strong><br>'+ev.summary;
      h+='</p>';shown++;
    }
  }
  // Achievements section
  if(S.achievements.length>0){
    h+='<hr style="border-color:rgba(255,255,255,0.05);margin:12px 0;"><strong>🏆 已解锁成就：</strong><br>';
    S.achievements.forEach(function(aid){
      var a=ACHIEVEMENTS.find(function(x){return x.id===aid;});
      if(a)h+='<span style="margin-right:8px;font-size:0.9em;">'+a.icon+' '+a.name+'</span>';
    });
  }
  h+='</div><div class="btn-row"><button class="btn small" onclick="setChoices([\'😴 休息恢复体力\',\'🔧 整備营地\',\'🌍 外出探索废土\',\'⚔️ 查看敌对营地\',\'📖 翻看日记\']);document.getElementById(\'modal-overlay\').classList.remove(\'active\');">关闭</button></div>';
  var modal=document.getElementById('modal');var ov=document.getElementById('modal-overlay');
  modal.innerHTML=h;ov.classList.add('active');
}

function showEnemyCamps(){
  const modal=document.getElementById('modal'),ov=document.getElementById('modal-overlay');
  let h='<h3>⚔️ 敌对营地</h3>';
  if(S.enemyCamps.length===0)h+='<p style="color:var(--text-dim)">附近没有发现敌对营地。</p>';
  else S.enemyCamps.forEach(ec=>{
    h+=`<div class="wound-card" style="border-left-color:var(--danger)"><strong>🏴 ${ec.name}</strong>`;
    if(ec.scouted){h+=`<br><span style="font-size:0.7em;">👤首领：${ec.leader} | 👥规模：${ec.size}人 | 🛡️防御：${ec.defense} | 🎒物资：${ec.supplies} | 🤝忠诚：${ec.loyalty}`;if(ec.traits.length>0)h+=`<br>📋特征：${ec.traits.join('、')}`;}
    else h+=`<br><span style="color:var(--text-dim);font-size:0.7em;">👥规模：??? | 🛡️防御：??? | 🎒物资：??? | 🤝忠诚：???`;
    if(ec.spy)h+=`<br>🕵️ 卧底：<span style="color:var(--success)">${ec.spy}已潜入</span>`;
    if(ec.sabotaged)h+=`<br>💥 已破坏防御`;if(ec.poisoned)h+=`<br>☠️ 已下毒`;
    h+=`<div class="treatment-row">`;
    if(!ec.scouted)h+=`<button class="treatment-btn" onclick="scoutCamp('${ec.id}')">🔍侦察</button>`;
    h+=`<button class="treatment-btn" onclick="sendSpy('${ec.id}')">🕵️派卧底</button>`;
    if(ec.scouted)h+=`<button class="treatment-btn" onclick="sabotageCamp('${ec.id}')">💥破坏</button><button class="treatment-btn" onclick="poisonCamp('${ec.id}')">☠️下毒</button><button class="treatment-btn" onclick="attackCamp('${ec.id}')" style="color:var(--danger);border-color:var(--danger)">⚔️进攻</button>`;
    h+=`</div></div>`;
  });
  h+=`<div class="btn-row"><button class="btn small" onclick="closeModal()">关闭</button></div>`;modal.innerHTML=h;ov.classList.add('active');
}

function scoutCamp(ecid){
  const ec=S.enemyCamps.find(x=>x.id===ecid);if(!ec||ec.scouted)return;
  S.busy=true;setStatus('侦察中...');closeModal();
  advanceHour(rand(2,4));S.fatigue=clamp(S.fatigue+rand(5,10),0,100);
  ec.scouted=true;
  const acc=Math.random()>0.3; // 70% accuracy
  if(!acc){ec.size+=rand(-5,5);ec.defense+=rand(-15,15);} // inaccurate intel
  addStory(`🔍 对<strong>${ec.name}</strong>的侦察完成。${acc?'情报可靠。':'部分情报可能有误。'}首领${ec.leader}，约${ec.size}人，防御${ec.defense>=60?'坚固':ec.defense>=30?'一般':'薄弱'}。`,'party');
  updateUI();S.busy=false;showEnemyCamps();
}

function sendSpy(ecid){
  const ec=S.enemyCamps.find(x=>x.id===ecid);if(!ec||ec.spy)return;
  const available=S.party.filter(p=>p.alive&&p.loyalty>50);if(available.length===0){setStatus('没有忠诚度>50的队友可派');return;}
  const spy=pick(available);ec.spy=spy.name;spy.activity='spy';
  closeModal();addStory(`🕵️ <strong>${spy.name}</strong>被派往<strong>${ec.name}</strong>卧底。${spy.name}将暗中搜集情报。`,'party');
  // Spy gradually reveals info and may sabotage
  ec.scouted=true; // spy reveals intel
  updateUI();
}

function sabotageCamp(ecid){
  const ec=S.enemyCamps.find(x=>x.id===ecid);if(!ec||ec.sabotaged)return;
  closeModal();const success=ec.spy?Math.random()<0.7:Math.random()<0.3;
  if(success){ec.sabotaged=true;ec.defense=Math.max(0,ec.defense-rand(20,40));addStory(`💥 <strong>${ec.name}</strong>的防御被成功破坏！防御力大降。`,'party');}
  else{addStory(`💥 破坏<strong>${ec.name}</strong>的行动失败。对方加强了警戒。`,ec.spy?'party':'danger');if(ec.spy)ec.spy=null;}
  updateUI();
}

function poisonCamp(ecid){
  const ec=S.enemyCamps.find(x=>x.id===ecid);if(!ec||ec.poisoned)return;
  closeModal();const success=ec.spy?Math.random()<0.6:Math.random()<0.2;
  if(success){ec.poisoned=true;ec.loyalty=Math.max(0,ec.loyalty-rand(30,50));ec.size=Math.max(1,ec.size-rand(3,10));addStory(`☠️ 成功在<strong>${ec.name}</strong>的水源中下毒。敌方大量减员，士气崩溃。`,'party');}
  else{addStory(`☠️ 下毒<strong>${ec.name}</strong>的行动败露！${ec.spy?'卧底身份暴露！':''}`,'danger');if(ec.spy)ec.spy=null;}
  updateUI();
}

function attackCamp(ecid){
  const ec=S.enemyCamps.find(x=>x.id===ecid);if(!ec||!ec.scouted)return;
  closeModal();S.busy=true;btnDisabled(true);setStatus('⚔️ 战斗中...');setChoices([]);
  advanceHour(rand(3,6));
  // Calculate combat strength
  const myPower=(1+S.party.filter(p=>p.alive).length)*2+(S.camp.defense/10);
  let enemyPower=(ec.size/5)+(ec.defense/15);
  if(ec.sabotaged)enemyPower*=0.5;if(ec.poisoned)enemyPower*=0.6;
  if(ec.loyalty<30)enemyPower*=0.7; // low loyalty = easy to break
  const winChance=myPower/(myPower+enemyPower);
  const victory=Math.random()<winChance;

  if(victory){
    const lootCount=rand(3,8);const loots=[];
    for(let i=0;i<lootCount;i++){const items=['罐头','净水','弹药','医疗包','武器零件','金属片','军用口粮'];const n=pick(items);const q=rand(1,4);addItem(n,q);loots.push(`${ITEMS[n]?.e||''}${n}×${q}`);}
    addStory(`⚔️ <strong>胜利！</strong>你攻下了<strong>${ec.name}</strong>！${ec.leader}战败。战利品：${loots.join('、')}`,'party');modRep(15,'攻占敌营');
    S.enemyCamps=S.enemyCamps.filter(x=>x.id!==ecid); // remove defeated camp
    // Party injuries
    for(const n of S.party){if(!n.alive)continue;if(Math.random()<0.4)partyInjure(n.id,rand(10,30));}
    if(Math.random()<0.3){const pid=pick(BODY_PARTS);const sev=rand(1,3);const desc=`${['被','遭到','受到'][sev-1]}攻击受伤`;addWound(pid,sev,desc,sev>=2);S.blood=clamp(S.blood-sev*8,0,100);addStory(`🤕 <strong>${PL[pid]}在战斗中受伤！</strong>（-${sev*8}生命）`,'medical');}
  }else{
    addStory(`⚔️ <strong>战败！</strong>对<strong>${ec.name}</strong>的进攻被击退。${ec.leader}的防御比你预想的要强。`,'danger');modRep(-8,'战败');
    for(const n of S.party){if(!n.alive)continue;if(Math.random()<0.6)partyInjure(n.id,rand(20,40));}
    const rpid=pick(BODY_PARTS);addWound(rpid,rand(2,3),`撤退时${PL[rpid]}遭到重击`,true);S.blood=clamp(S.blood-rand(15,35),0,100);addStory(`🤕 <strong>${PL[rpid]}在撤退中受了重伤！</strong>`,'medical');
    // Lose items
    const myKeys=Object.keys(S.inventory);for(let i=0;i<Math.min(3,myKeys.length);i++){const k=myKeys[rand(0,myKeys.length-1)];removeItem(k,rand(1,2));}
  }
  progressWounds();teammateTurn();updateUI();checkDeath();
  S.busy=false;btnDisabled(false);setChoices(['继续推进']);
}

// ===== QUICK CAMP UPGRADE =====
function upgradeDefense(){
  if(!atCamp()){setStatus('你不在营地！');return;}
  if(!hasItem('木材',2)||!hasItem('金属片',1)){setStatus('需要木材×2 + 金属片×1 加固防御');return;}
  removeItem('木材',2);removeItem('金属片',1);S.camp.defense=clamp(S.camp.defense+10,0,100);
  addStory('🛡️ 使用木材和金属片加固了营地防御。','camp');updateUI();
}

// ===== STORAGE CHEST SYSTEM =====
S.chestLevel=0; // 0=no chest, 1=small(20 slots), 2=medium(35), 3=large(55)
const CHEST_BASE=25;const CHEST_WOOD=4; // 默认25格，4木板升1级+1格
function chestSlots(){return CHEST_BASE+(S.chestLevel||0);}
function chestCost(){return{'木材':CHEST_WOOD}};

function upgradeChest(){
  if(!atCamp()){setStatus('你不在营地！');return;}
  if(!hasItem('木材',CHEST_WOOD)){setStatus('需要木材×'+CHEST_WOOD+'升级储物箱');return;}
  removeItem('木材',CHEST_WOOD);
  S.chestLevel=(S.chestLevel||0)+1;
  var slots=chestSlots();
  addStory(`📦 营地储物箱升级！（${slots}格，+1）`,'camp');updateUI();
}

  if(!atCamp()){setStatus('你不在营地！');return;}
  const modal=document.getElementById('modal'),ov=document.getElementById('modal-overlay');

  let h=`<h3>📦 营地仓库管理</h3>`;
  h+=`<p style="font-size:0.72em;color:var(--text-dim)">储物箱：Lv${S.chestLevel||0}（${campSCount()}件/${chestSlots()}格）| 背包：${Object.keys(S.inventory).length}/${ms}格</p>`;

  // Backpack items (with deposit button)
  h+=`<div style="margin-bottom:8px;"><strong>🎒 背包物品：</strong>`;
  const bpItems=Object.entries(S.inventory);
  if(bpItems.length===0)h+=`<span style="color:var(--text-dim);font-size:0.72em;">空</span>`;
  else bpItems.forEach(([n,d])=>{
    h+=`<div class="wound-card" style="border-left-color:var(--accent);display:flex;justify-content:space-between;align-items:center;"><span>${d.e}${n}×${d.qty}</span><div class="treatment-row"><button class="treatment-btn" onclick="depositItem('${n}',1)">📥存1</button><button class="treatment-btn" onclick="depositItem('${n}',${d.qty})">📥全部</button></div></div>`;
  });h+=`</div>`;

  // Camp chest items (with withdraw + discard button)
  h+=`<div><strong>🏕️ 营地储物箱：</strong>`;
  const cpItems=Object.entries(S.camp.supplies);
  if(cpItems.length===0)h+=`<span style="color:var(--text-dim);font-size:0.72em;">空</span>`;
  else cpItems.forEach(([n,d])=>{
    h+=`<div class="wound-card" style="border-left-color:var(--success);display:flex;justify-content:space-between;align-items:center;"><span>${d.e||'📦'}${n}×${d.qty}</span><div class="treatment-row"><button class="treatment-btn" onclick="withdrawItem('${n}',1)">📤取1</button><button class="treatment-btn" onclick="withdrawItem('${n}',${d.qty})">📤全部</button><button class="treatment-btn" style="border-color:var(--danger);color:var(--danger);" onclick="discardCampItem('${n}',1)">🗑️弃1</button><button class="treatment-btn" style="border-color:var(--danger);color:var(--danger);" onclick="discardCampItem('${n}',${d.qty})">🗑️全部</button></div></div>`;
  });h+=`</div>`;

  h+=`<div class="btn-row"><button class="btn small" onclick="closeModal()">关闭</button></div>`;
  modal.innerHTML=h;ov.classList.add('active');
}

function depositItem(name,qty){
  if(!atCamp()||!hasItem(name,qty))return;
  const campItems=Object.keys(S.camp.supplies);
  if(campItems.length>=chestSlots()&&!S.camp.supplies[name]){setStatus('储物箱已满！升级箱子。');return;}
  qty=Math.min(qty,S.inventory[name].qty);removeItem(name,qty);addItem(name,qty,true);
  addStory(`📥 存入<strong>${name}×${qty}</strong>`,'camp');updateUI();openStorageUI();

function withdrawItem(name,qty){
  if(!atCamp()||!hasItem(name,qty,true))return;
  const bpCount=Object.keys(S.inventory).length;const newWt=S.backpackWeight+qty*itemWeight(name);
  if(bpCount>=maxSlots()&&!S.inventory[name]){setStatus('背包格子满了！先清理背包。');return;}
  if(newWt>S.backpackMaxWeight){setStatus('负重不足！先丢弃一些物品。');return;}
  qty=Math.min(qty,S.camp.supplies[name].qty);removeItem(name,qty,true);addItem(name,qty);
  addStory(`📤 取出<strong>${name}×${qty}</strong>`,'camp');updateUI();openStorageUI();
}
function discardCampItem(name,qty){
  if(!atCamp()||!hasItem(name,qty,true))return;
  qty=Math.min(qty,S.camp.supplies[name].qty);removeItem(name,qty,true);
  addStory(`🗑️ 从仓库丢弃了<strong>${name}×${qty}</strong>`,'camp');updateUI();openStorageUI();
}

function campStabilityCheck(){
  // Policy effects on stability
  var moraleDecay=getPolicyEffect('moraleDecay');
  if(moraleDecay>0)S.camp.stability=clamp(S.camp.stability-moraleDecay,0,100);
  var loyaltyDecay=getPolicyEffect('loyaltyDecay');
  if(loyaltyDecay>0)S.camp.stability=clamp(S.camp.stability-loyaltyDecay*0.5,0,100);
  var moraleBoost=getPolicyEffect('moraleBoost');
  if(moraleBoost>0)S.camp.stability=clamp(S.camp.stability+moraleBoost*0.5,0,100);
  // Default stability drift toward 60
  if(S.camp.stability<60)S.camp.stability=clamp(S.camp.stability+0.5,0,100);
  else if(S.camp.stability>60)S.camp.stability=clamp(S.camp.stability-0.3,0,100);
  const avgLoyalty=S.party.filter(p=>p.alive).reduce((s,p)=>s+p.loyalty,0)/Math.max(1,S.party.filter(p=>p.alive).length);
  S.camp.stability=clamp(S.camp.stability+(avgLoyalty-50)/10,0,100);
  // Rebellion check
  if(S.camp.stability<15&&S.party.filter(p=>p.alive).length>0&&Math.random()<0.1){
    const rebel=pick(S.party.filter(p=>p.alive&&p.loyalty<50));
    if(rebel){addStory(`⚔️ <strong>${rebel.name}发动了叛乱！</strong>"我们受够了你的统治！"`,'danger');
      if(Math.random()<0.5){rebel.alive=false;addStory(`${rebel.name}在叛乱中被镇压。营地付出了惨重代价。`,'danger');S.camp.stability=clamp(S.camp.stability-20,0,100);}
      else{const idx=S.party.indexOf(rebel);S.party.splice(idx,1);addStory(`${rebel.name}叛乱失败后逃离了营地。但带走了其他几个不满的人。`,'danger');S.camp.stability=clamp(S.camp.stability-30,0,100);}}}
  // Disobedience
  if(S.camp.governance==='democracy'&&S.camp.stability<30){const dis=pick(S.party.filter(p=>p.alive&&p.loyalty<40));if(dis)dis.activity='idle';}
}

function buildStructure(id){
  if(!atCamp()){setStatus('你不在营地！');return;}
  if(!structureCapacityOK()){setStatus('营地空间不足！扩建或拆除旧建筑。');return;}
  var b=BUILDINGS.find(function(x){return x.id===id;});if(!b)return;
  if(b.requireIdentity&&S.identity&&S.identity.id!==b.requireIdentity){setStatus('只有工程师才能建造实验室！');return;}
  var discount=S.identity&&S.identity.bonus&&S.identity.bonus.buildCost?S.identity.bonus.buildCost:1;
  var adjCost={};Object.entries(b.cost).forEach(function(e){adjCost[e[0]]=Math.max(1,Math.floor(e[1]*discount));});
  if(!Object.entries(adjCost).every(function(e){return hasItem(e[0],e[1]);})){setStatus('材料不足');return;}
  Object.entries(adjCost).forEach(function(e){removeItem(e[0],e[1]);});
  initCampStructures();
  S.campStructures.push({type:'building',id:b.id,icon:b.icon,name:b.name,def:b.def||0,_prodCounter:0});
  S._campDefMod=(S._campDefMod||0)+(b.def||0);
  addStory('🔨 建造了<strong>'+b.icon+' '+b.name+'</strong>（+'+(b.def||0)+'防御）','camp');modRep(3,'营地建设');
  updateUI();showCampView();
}

function demolishStructure(idx){

function assignToBuilding(structureIdx,npcId){

function tickStaffedBuildings(){

      });
    }

    else{removeItem('净水',1,true);}

      if(s._strikeCounter>3){addStory('⚠️ <strong>'+n.name+'罢工了！</strong>营地没有足够的食物和水来支付工资。','danger');s.staffedBy=null;n.assignedBuilding=null;s._strikeCounter=0;}
      return;} // no wages = no work
    s._strikeCounter=0;
    // Hospital: auto-heal all NPCs

      S.party.forEach(function(m){if(m.alive&&m.health<100){m.health=clamp(m.health+b.staffEffect.autoHeal,0,100);}});
      S.blood=clamp(S.blood+b.staffEffect.autoHeal*0.5,0,100);
    }

      S.children.forEach(function(c){if(c.alive)c.ageMonths=(c.ageMonths||0)+0.3;});
    }
    // Staff gets paid in food/water directly
    n.hunger=clamp(n.hunger+10,0,100);n.thirst=clamp(n.thirst+10,0,100);
    n.fatigue=clamp(n.fatigue+1,0,100);
  });
}

function calcTotalDefense(){
  var def=S.camp.defense+(S._campDefMod||0);
  (S.campStructures||[]).forEach(function(s){if(s.type==='building'){var b=BUILDINGS.find(function(x){return x.id===s.id;});if(b)def+=b.def||0;}});
  return def;
}

// ===== ENEMY ATTACK (OVERHAULED) =====
function enemyAttackPlayer(){
  if(S.enemyCamps.length===0)return;
  // If incoming attack already exists, check arrival
  if(S._incomingAttack){
    S._incomingAttack.arriveHour--;
    if(S._incomingAttack.arriveHour<=0){executeBattle(S._incomingAttack);S._incomingAttack=null;return;}
    return; // Don't spawn new attacks while one is incoming
  }
  // Can only detect attack if someone is at camp (player or teammate)
  const someoneAtCamp=atCamp()||S.party.some(p=>p.alive&&p.activity==='guard');
  if(!someoneAtCamp)return; // attack still happens but you won't know!
  var campAttackBase=0.08*(1+getEffectSum('campAttackMod'));if(Math.random()>campAttackBase*repAttackMod())return; // modified by effects & reputation
  const ec=pick(S.enemyCamps.filter(c=>c.alive!==false));if(!ec)return;
  const dirs=['N','S','E','W','NE','NW','SE','SW'];const dir=pick(dirs);
  const hours=rand(4,12);
  S._incomingAttack={enemyCamp:ec,arriveHour:hours,dir,alerted:false};
  addStory(`⚔️ <strong>侦察预警！${ec.name}来袭！</strong>预计<strong style="color:var(--danger)">${hours}小时</strong>后从<strong style="color:var(--danger)">${dir}方</strong>抵达营地！`,'danger');
  setChoices(['紧急返回营地防守','派队友回防自己在外面','不理会继续当前行动']);
  S._currentEvent={ev:{id:'attack_warning'},choices:[
    {text:'紧急返回营地防守',ch:{dist:-S.distance,outcome:'你全速赶回营地，准备迎战。'}},
    {text:'派队友回防自己在外面',ch:{outcome:'你让队友回去防守，自己留在外面。希望他们能守住。'}},
    {text:'不理会继续当前行动',ch:{outcome:'你选择相信营地的防御。如果营地失守，后果自负。'}},
  ]};
}

function executeBattle(attack){
  const{enemyCamp:ec,dir}=attack;const playerPresent=atCamp();
  addStory(`⚔️ <strong>${ec.name}抵达！战斗开始！</strong>${playerPresent?'你亲自指挥防御。':'你不在营地，队友独自应战！'}`,'danger');
  // Init battle state
  var bt={ec:ec,enemyPower:ec.size*2+ec.defense*0.5,playerPresent:playerPresent,round:1,maxRounds:rand(3,5),myLosses:0,enemyLosses:0,log:'',victory:false,trapsUsed:false};
  // Show tactical choices

}

function showBattleChoices(bt){
  var ch=[];
  // Aggressive
  var aggRisk=bt.playerPresent?0.3:0.15;
  ch.push({text:'⚔️ 全力猛攻',desc:'集中火力猛攻，伤敌更多但自身风险也更大',act:function(){resolveBattleRound(bt,'agg');}});
  // Defensive
  var defRisk=bt.playerPresent?0.1:0.05;
  ch.push({text:'🛡️ 稳守阵地',desc:'利用掩体和阵地防御，安全但推进慢',act:function(){resolveBattleRound(bt,'def');}});
  // Tactical
  if(!bt.trapsUsed&&getActiveTraps().length>0){
    ch.push({text:'💣 引爆陷阱',desc:'触发预设陷阱造成大量伤害，仅限第一轮',act:function(){resolveBattleRound(bt,'trap');}});

  }else{
    ch.push({text:'🧠 战术周旋',desc:'利用地形周旋消耗敌人，平衡风险收益',act:function(){resolveBattleRound(bt,'tactical');}});
  }

  h+=`我方：<span style="color:var(--success)">${bt.myLosses}损失</span></div>`;
  addStory(h,'danger');
  var btns=ch.map(function(c,i){return `<button class="choice-btn" onclick="(function(){var f=${c.act.toString()};f();})()" style="border-left:3px solid ${i===0?'#e94560':i===1?'#4a90d9':'#f0a040'}">${i+1}. ${c.text}<br><span style="font-size:0.65em;color:var(--text-dim)">${c.desc}</span></button>`;}).join('');
  document.getElementById('choices-area').innerHTML=btns;
  S._currentBattle=bt;
}

function resolveBattleRound(bt,tactic){
  var ec=bt.ec,playerPresent=bt.playerPresent;
  var enPwr=bt.enemyPower/5,myPwr=calcTotalDefense()/10+(playerPresent?3:1)+S.party.filter(function(p){return p.alive;}).length*(playerPresent?2:1);
  var myRoll,enRoll,log='';
  if(tactic==='trap'){
    bt.trapsUsed=true;
    var trapDmg=0;getActiveTraps().forEach(function(s){
      var t=TRAPS.find(function(x){return x.id===s.id;});if(!t)return;
      trapDmg+=t.dmg||0;s.dur=(s.dur||1)-1;if(s.dur<=0)s.active=false;
      log+='💥 '+t.icon+t.name+'触发！ ';
    });
    bt.enemyPower=Math.max(0,bt.enemyPower-trapDmg*3);
    log+='陷阱造成'+trapDmg+'伤害！';
    enRoll=rand(0,Math.floor(enPwr))*0.5;
  }else if(tactic==='agg'){
    myRoll=rand(0,Math.floor(myPwr*1.5));enRoll=rand(0,Math.floor(enPwr));
    if(myRoll>enRoll){bt.enemyLosses+=rand(2,6);bt.enemyPower-=rand(5,15);log+='🔫 猛攻奏效！';}
    else{bt.myLosses+=rand(1,3);log+='💢 猛攻受挫——敌方反击！';}
    if(Math.random()<0.25&&playerPresent){woundPlayer();}
  }else if(tactic==='def'){
    myRoll=rand(0,Math.floor(myPwr*0.7));enRoll=rand(0,Math.floor(enPwr*0.6));
    if(myRoll>enRoll){bt.enemyLosses+=rand(1,2);bt.enemyPower-=rand(2,6);log+='🛡️ 稳守反击——伤敌不多但阵脚稳固。';}
    else{log+='🛡️ 严密的防御挡住了进攻。';}
    if(Math.random()<0.08&&playerPresent){woundPlayer();}
  }else if(tactic==='suppress'){
    myRoll=rand(0,Math.floor(myPwr*1.2));enRoll=rand(0,Math.floor(enPwr*0.3));
    bt.enemyLosses+=rand(1,3);bt.enemyPower-=rand(3,8);
    log+='🎯 火力压制成功！敌方被压制，损失不小。';
  }else{
    myRoll=rand(0,Math.floor(myPwr));enRoll=rand(0,Math.floor(enPwr));
    if(myRoll>enRoll){bt.enemyLosses+=rand(1,3);bt.enemyPower-=rand(3,8);log+='🔫 战术奏效！';}
    else{bt.myLosses+=rand(0,2);log+='⚡ 势均力敌的一轮。';}
    if(Math.random()<0.15&&playerPresent){woundPlayer();}
  }
  // Teammate casualty check
  if(Math.random()<0.15){var n=S.party.find(function(p){return p.alive&&Math.random()<0.5;});if(n){partyInjure(n.id,rand(8,25));log+=' 🤕'+n.name+'受伤！';}}
  if(Math.random()<0.05){var n=S.party.find(function(p){return p.alive;});if(n){n.alive=false;n.health=0;log+=' 💀'+n.name+'战死！';setTimeout(function(){showCompanionDeath(n);},800);}}
  bt.log+=log;
  addStory(log,'medical');
  // Check end
  bt.round++;
  if(bt.enemyPower<=0){bt.victory=true;finishBattle(bt);return;}
  if(bt.round>bt.maxRounds){finishBattle(bt);return;}
  showBattleChoices(bt);
}

      const captured=S.party.filter(p=>p.alive);addStory(`🔗 ${captured.map(p=>p.name).join('、')}被敌人俘虏！`,'danger');

      else{c.health=clamp(c.health-rand(20,50),0,100);addStory(`😰 <strong>${c.name}</strong>在战斗中受了重伤。`,'medical');}
    });
    const fpid=pick(BODY_PARTS);addWound(fpid,rand(1,3),`营地攻防战中${PL[fpid]}受伤`,true);S.blood=clamp(S.blood-rand(10,25),0,100);
  }

function useDurability(name){

  if(!S._equipDura[name])S._equipDura[name]=info.dura;

function doBroadcast(band){
  closeModal();let msg='';
  if(band==='civilian'){
    if(Math.random()<0.7){msg='📻 广播发出后，几个幸存者循着信号找到了你的营地。';recruitNPC();}
    else{msg='⚠️ 广播被掠夺者截获！一队武装人员正在接近...';if(!S._incomingAttack&&S.enemyCamps.length>0){const ec=pick(S.enemyCamps.filter(c=>c.alive!==false));if(ec)S._incomingAttack={enemyCamp:ec,arriveHour:rand(2,5),dir:pick(['N','S','E','W']),alerted:false};}}
  }else if(band==='military'){
    if(Math.random()<0.5){msg='🔐 收到军方加密回复——附近有一个未被标记的物资空投点。';addItem('军用口粮',rand(2,4));addItem('弹药',rand(1,3));}
    else{msg='🔐 军用频段只有静电噪音。军方要么撤离了，要么沉默了。';}
  }else if(band==='raider'){
    if(!hasItem('弹药',2)){setStatus('需要弹药×2广播诱敌');return;}
    removeItem('弹药',2);
    if(S.enemyCamps.length>0){const ec=pick(S.enemyCamps.filter(c=>c.alive!==false));if(ec){ec.size=Math.max(1,ec.size-rand(2,5));msg=`💀 ${ec.name}的小队中了埋伏！敌方减员。`;}}
    else{msg='💀 广播发出，无人回应——附近没有敌对营地。';}
  }
  addStory(msg,'party');updateUI();
}

// ===== EVENT ENGINE =====
function selectEvent(){
  const ctx={minDist:S.distance,maxDist:S.distance,night:isNight(),day:isDaytime(),seasons:[S.season?.id],weather:[S.weather.precipType],atCamp:atCamp(),injured:S.blood<50||BODY_PARTS.some(p=>getPartStatus(p)!=='healthy'),hasParty:S.party.filter(p=>p.alive).length>0,hasCompanions:S.party.filter(p=>p.alive).length>0,lostCompanion:S.party.length>0&&S.party.filter(p=>!p.alive).length>0,pain:S.pain>30,tired:S.fatigue>55,hungry:S.nutrition<30,thirsty:S.hydration<30,reputation:S.reputation||10,partySize:S.party.filter(p=>p.alive).length};
  let candidates=EVENTS.filter(ev=>{
    const c=ev.ctx;if(c.atCamp!==undefined&&c.atCamp!==ctx.atCamp)return false;if(c.night&&!ctx.night)return false;if(c.day&&!ctx.day)return false;
    if(c.seasons&&!c.seasons.some(s=>ctx.seasons.includes(s)))return false;if(c.weather&&!c.weather.some(w=>ctx.weather.includes(w)))return false;
    if(c.injured&&!ctx.injured)return false;if(c.hasParty&&!ctx.hasParty)return false;if(c.hasCompanions&&!ctx.hasCompanions)return false;if(c.lostCompanion&&!ctx.lostCompanion)return false;
    if(c.minRep&&ctx.reputation<c.minRep)return false;if(c.maxRep&&ctx.reputation>c.maxRep)return false;if(c.partySize&&ctx.partySize<c.partySize)return false;
    if(c.quest==='signal'&&S.mainQuest&&S.mainQuest.signals>=S.mainQuest.totalNeeded)return false; // 信号已集齐则不再触发
    if(c.pain&&ctx.pain<c.pain)return false;
    if(c.tired&&!ctx.tired)return false;if(c.hungry&&!ctx.hungry)return false;if(c.thirsty&&!ctx.thirsty)return false;
    if(c.minDist!==undefined&&ctx.maxDist<c.minDist)return false;if(c.maxDist!==undefined&&ctx.minDist>c.maxDist)return false;
    return true;
  });
  // Filter out recently used events (keep memory of last 12)
  let fresh=candidates.filter(ev=>!S.recentEvents.includes(ev.id));
  if(fresh.length>0)candidates=fresh;
  // Prefer categories not recently used
  let diffCat=candidates.filter(ev=>!S.recentCats.includes(ev.cat));
  if(diffCat.length>0)candidates=diffCat;
  if(candidates.length===0){candidates=EVENTS.filter(ev=>!S.recentEvents.includes(ev.id));}
  if(candidates.length===0){candidates=EVENTS;}
  if(candidates.length===0)return EVENTS[0];
  const ev=pick(candidates);
  S.recentEvents.push(ev.id);if(S.recentEvents.length>12)S.recentEvents.shift();
  S.recentCats.push(ev.cat);if(S.recentCats.length>4)S.recentCats.shift();
  return ev;
}

function processEvent(ev){
  addStory(ev.narr,'ai');
  const choices=ev.choices.map((ch,i)=>{
    let disabled='';if(ch.need&&!hasItem(ch.need,1))disabled='disabled';
    return{text:ch.text,disabled:!!(ch.need&&!hasItem(ch.need,1)),idx:i,ch:ch};
  });
  // Always add "return to camp" option (hidden when already at camp)
  if(!atCamp())choices.push({text:'🏕️ 返回营地',disabled:false,idx:choices.length,ch:{outcome:'你决定先回营地再说。',dist:-S.distance,eff:{fatigue:S.distance*2}}});
  S._currentEvent={ev,choices};
  setChoices(choices.map(c=>c.disabled?`${c.text}（需要${c.ch.need}）`:c.text));
}

function applyEffects(eff,result){
  if(!eff)return;
  if(eff.health){S.blood=clamp(S.blood+(eff.health||0),0,100);result.effects.push({k:'health',v:eff.health});}
  if(eff.nutrition){S.nutrition=clamp(S.nutrition+(eff.nutrition||0),0,100);result.effects.push({k:'nutrition',v:eff.nutrition});}
  if(eff.hydration){S.hydration=clamp(S.hydration+(eff.hydration||0),0,100);result.effects.push({k:'hydration',v:eff.hydration});}
  if(eff.fatigue){S.fatigue=clamp(S.fatigue+(eff.fatigue||0),0,100);result.effects.push({k:'fatigue',v:eff.fatigue});}
  if(eff.infection){S.infectionLevel=clamp(S.infectionLevel+(eff.infection||0),0,100);}
  if(eff.pain){S.pain=clamp(S.pain+(eff.pain||0),0,100);}
  if(eff.bodyWet){S.bodyWetness=clamp(S.bodyWetness+(eff.bodyWet||0),0,100);}
  // Auto-wound: health loss >=5 creates a visible injury
  if(eff.health&&eff.health<=-5){
    var pids=BODY_PARTS.filter(p=>getPartStatus(p)==='healthy');if(pids.length===0)pids=BODY_PARTS;
    var pid=pids[rand(0,pids.length-1)];var sev=eff.health<=-15?3:eff.health<=-8?2:1;
    addWound(pid,sev,'战斗中受伤',sev>=2);
  }
}
function applyItems(items,result){
  if(!items)return false;
  for(const it of items){let n=it.n;let q=Array.isArray(it.q)?rand(it.q[0],it.q[1]):(it.q||1);
    if(q<0&&!hasItem(n,Math.abs(q)))return false;} // cost check failed
  for(const it of items){let n=it.n;let q=Array.isArray(it.q)?rand(it.q[0],it.q[1]):(it.q||1);
    if(q<0){removeItem(n,Math.abs(q));result.itemsLost.push({n,q:Math.abs(q)});}}
  for(const it of items){let n=it.n;let q=Array.isArray(it.q)?rand(it.q[0],it.q[1]):(it.q||1);
    if(q>0){addItem(n,q);result.itemsGained.push({n,q});if(canEquipItem(n))tryEquipBetter(n);if(!S._totalScavenged)S._totalScavenged=0;S._totalScavenged+=q;}}
  return true;
}

function resolveChoice(idx){
  const data=S._currentEvent;if(!data||!data.choices||!data.choices[idx])return null;
  const ch=data.choices[idx].ch;if(!ch||ch.disabled)return null;
  const result={itemsGained:[],itemsLost:[],effects:[],distChange:0};
  let selectedOutcome=null;

  // NEW: Multi-outcome system (randomized results)
  if(ch.outcomes&&Array.isArray(ch.outcomes)&&ch.outcomes.length>0){
    selectedOutcome=pickW(ch.outcomes);
    applyEffects(selectedOutcome.eff,result);
    if(selectedOutcome.wound){var w=selectedOutcome.wound;addWound(w.part||pick(BODY_PARTS),w.sev||1,w.desc||'受伤',w.bleed!==false);}
    if(selectedOutcome.adoptChild){const cgender=pick(['男','女']);const cnames=cgender==='男'?['小光','石头','阿勇','小杰','晨晨']:['小花','小草','阿美','小雪','星星'];S.children.push({name:pick(cnames),gender:cgender,ageMonths:rand(60,120),alive:true,hunger:60,thirst:70,health:100});modRep(3,'收养孤儿');addStory('💡 孩子需要食物和水。营地有存货时会自动喂养。点击孩子可手动喂食。','system');}
    if(selectedOutcome.recruit){recruitNPC();}
    if(selectedOutcome.dynamicLoot){selectedOutcome.items=getBiomeMaterialLoot(selectedOutcome.dynamicLoot);}
    if(selectedOutcome.items&&!applyItems(selectedOutcome.items,result)){
      addStory(`❌ <strong>运气不佳！</strong>事情没有按预期发展——物资不足无法完成。`,'danger');return null;}
    if(selectedOutcome.lose){const names=Object.keys(S.inventory);for(let i=0;i<selectedOutcome.lose&&names.length>0;i++){const ln=names[rand(0,names.length-1)];removeItem(ln,1);result.itemsLost.push({n:ln,q:1});}}
    if(selectedOutcome.repGain)modRep(selectedOutcome.repGain,'事件');
    if(selectedOutcome.questSignal||data.ev.questSignal){if(!S.mainQuest)S.mainQuest={signals:0,totalNeeded:5};S.mainQuest.signals++;addStory(`📡 <strong>信号碎片已收集！</strong>(${S.mainQuest.signals}/${S.mainQuest.totalNeeded})`,'party');checkMainQuest();}
    if(selectedOutcome.dist)S.distance=clamp(S.distance+(selectedOutcome.dist||0),0,20);
    if(selectedOutcome.need&&hasItem(selectedOutcome.need,1)){removeItem(selectedOutcome.need,1);result.itemsLost.push({n:selectedOutcome.need,q:1});}
    // Add randomness: sometimes lose a random item when searching/scavenging
    if(Math.random()<0.15&&Object.keys(S.inventory).length>0&&!selectedOutcome.lose){
      const rk=Object.keys(S.inventory)[rand(0,Object.keys(S.inventory).length-1)];
      if(Math.random()<0.5){removeItem(rk,1);result.itemsLost.push({n:rk,q:1});}
    }
    return selectedOutcome.desc||selectedOutcome.outcome||ch.outcome||buildOutcomeText(result);
  }

  // OLD: Deterministic format (backward compatible)
  applyEffects(ch.eff,result);
  if(ch.recruit)recruitNPC();
  if(ch.dynamicLoot){ch.items=getBiomeMaterialLoot(ch.dynamicLoot);}
  if(ch.items&&!applyItems(ch.items,result)){
    addStory(`❌ <strong>交易失败！</strong>背包中没有足够的物资。`,'danger');return null;}
  if(ch.lose){const names=Object.keys(S.inventory);for(let i=0;i<ch.lose&&names.length>0;i++){const ln=names[rand(0,names.length-1)];removeItem(ln,1);result.itemsLost.push({n:ln,q:1});}}
  if(ch.repGain)modRep(ch.repGain,'事件');
  if(ch.questSignal||data.ev.questSignal){if(!S.mainQuest)S.mainQuest={signals:0,totalNeeded:5};S.mainQuest.signals++;addStory(`📡 <strong>信号碎片已收集！</strong>(${S.mainQuest.signals}/${S.mainQuest.totalNeeded})`,'party');checkMainQuest();}
  if(ch.dist){S.distance=clamp(S.distance+(ch.dist||0),0,20);result.distChange=ch.dist;}
  if(ch.need&&hasItem(ch.need,1)){removeItem(ch.need,1);result.itemsLost.push({n:ch.need,q:1});}
  // Random mishap chance
  if(Math.random()<0.12&&Object.keys(S.inventory).length>0&&!ch.lose){
    const rk=Object.keys(S.inventory)[rand(0,Object.keys(S.inventory).length-1)];
    if(Math.random()<0.4){removeItem(rk,1);result.itemsLost.push({n:rk,q:1});}
  }

  return ch.outcome||ch.desc||buildOutcomeText(result);
}

function buildOutcomeText(result){
  let o='';
  if(result.itemsGained.length>0){const names=result.itemsGained.map(i=>`${ITEMS[i.n]?.e||''}${i.n}×${i.q}`).join('、');o+=`你找到了${names}。`;}
  if(result.itemsLost.length>0){const names=result.itemsLost.map(i=>`${i.n}×${i.q}`).join('、');o+=`你失去了${names}。`;}
  if(result.distChange>0)o+=`你向废土深处推进了${result.distChange.toFixed(1)}km。`;
  else if(result.distChange<0)o+=`你往营地返回了${Math.abs(result.distChange).toFixed(1)}km。`;
  const he=result.effects.find(e=>e.k==='health');if(he&&he.v<0)o+=`行动中受了些伤。`;
  const fe=result.effects.find(e=>e.k==='fatigue');if(fe&&fe.v>8)o+=`你感到相当疲惫。`;
  if(!o)o='你环顾四周，废土依旧沉默。';
  return o;
}

// ===== VITAL RATES =====
function getVitalRates(){
  let bloodRate=0,bleedCount=0;for(const pid of BODY_PARTS)for(const w of S.body[pid].wounds){if(w.bleeding&&!w.bandaged){bloodRate-=w.severity*3;bleedCount++;}}
  let hydRate=-5*(1+getEffectSum('waterConsumeMod'));if(S.weather.temperature>30)hydRate-=3;if(S.weather.temperature>38)hydRate-=3;if(S.weather.windSpeed>20)hydRate-=2;
  let nutRate=-4*(1+getEffectSum('foodConsumeMod'));if(S.weather.temperature<5)nutRate-=2;if(S.weather.temperature<-10)nutRate-=3;
  let fatRate=3;if(S.weather.temperature<5)fatRate+=2;if(S.pain>40)fatRate+=1;if(isNight())fatRate+=1;if(hasEffect('plague'))fatRate+=2;
  const feels=getFeelsLike();const tempDrift=(feels+2-S.coreTemp)*0.3;
  let wetRate=0;const p=S.weather.precipType;if(p==='drizzle')wetRate=5;else if(p==='rain')wetRate=15;else if(p==='heavy_rain')wetRate=30;else if(S.weather.isSnow)wetRate=8;else wetRate=-10;if(S.hasCampfire)wetRate-=15;
  let infRate=0;const hi=BODY_PARTS.some(p=>S.body[p].wounds.some(w=>w.infected));if(hi)infRate=2;if(!hi&&S.infectionLevel>0)infRate=-3;
  return{bloodRate,bleedCount,hydRate,nutRate,fatRate,tempRate:tempDrift,wetRate,infRate};
}
function vLabel(k,v){if(k==='blood')return v>80?'充足':v>60?'正常':v>40?'偏低':v>20?'不足':'危险';if(k==='nutrition')return v>80?'饱足':v>55?'正常':v>30?'偏低':v>15?'饥饿':'极度饥饿';if(k==='hydration')return v>80?'充足':v>55?'正常':v>30?'偏低':v>15?'口渴':'脱水';if(k==='fatigue')return v<20?'充沛':v<35?'正常':v<50?'略累':v<70?'疲惫':'极度疲惫';if(k==='pain')return v<10?'无':v<25?'轻微':v<45?'中度':v<65?'较重':v<85?'剧烈':'无法忍受';if(k==='infectionLevel')return v<5?'无':v<20?'轻微':v<45?'中度':v<70?'严重':'危急';return'';}
function vColor(k,v){if(k==='blood')return v>60?'v-good':v>30?'v-warn':'v-danger';if(k==='nutrition')return v>55?'v-good':v>25?'v-warn':'v-danger';if(k==='hydration')return v>55?'v-good':v>25?'v-warn':'v-danger';if(k==='fatigue')return v<50?'v-good':v<70?'v-warn':'v-danger';if(k==='coreTemp')return v>35.5&&v<38?'v-good':(v>33&&v<40)?'v-warn':'v-danger';if(k==='pain')return v<25?'v-good':v<50?'v-warn':'v-danger';if(k==='infectionLevel')return v<20?'v-good':v<45?'v-warn':'v-danger';return'v-info';}
function fmtRate(rate,unit=''){if(Math.abs(rate)<0.05)return'→稳定';const arrow=rate<0?'↓':'↑';const abs=Math.abs(rate);if(abs>=1)return`${arrow}${abs.toFixed(0)}${unit}/h`;return`${arrow}${abs.toFixed(1)}${unit}/h`;}
function timeToCritical(key,val,rate){if(rate>=0)return null;let th;if(key==='blood')th=20;if(key==='nutrition')th=15;if(key==='hydration')th=15;if(!th)return null;const h=Math.abs((val-th)/rate);if(h>48)return null;if(h<1)return'⚠️即将危急';return`≈${h.toFixed(0)}h后危急`;}

  const rates=getVitalRates();const feels=getFeelsLike();
  const vv=[{l:'🩸 血液',v:S.blood,lb:vLabel('blood',S.blood),c:vColor('blood',S.blood),rate:rates.bloodRate,rt:fmtRate(rates.bloodRate),ex:rates.bleedCount>0?`(${rates.bleedCount}处流血)`:''},
    {l:'🍖 营养',v:S.nutrition,lb:vLabel('nutrition',S.nutrition),c:vColor('nutrition',S.nutrition),rate:rates.nutRate,rt:fmtRate(rates.nutRate)},

  // 新手渐进解锁：过滤复杂体征
  var lv=noviceLevel();var shown=vv.filter(function(v){
    if(lv>=3)return true;
    if(lv===2)return !v.l.includes('感染')&&!v.l.includes('疼痛');

// ===== 孩子工具函数 =====
function childAgeStr(m){
  if(m<1)return'新生儿';
  if(m<12)return m+'个月';
  var y=Math.floor(m/12);var mo=m%12;
  if(mo===0)return y+'岁';
  return y+'岁'+mo+'个月';
}

  if(foodItems.length===0)h+=`<span style="color:var(--danger);font-size:0.7em;">⚠️ 背包中没有食物！</span>`;
  else foodItems.forEach(function(f){
    h+=`<button onclick="feedChild(${idx},'${f.n}',1)" style="padding:4px 8px;font-size:0.62em;background:#111;border:1px solid var(--success);color:var(--success);border-radius:4px;cursor:pointer;font-family:inherit;">${f.e}${f.n}×1</button>`;
  });
  // Water items
  var waterItems=[];
  inv.forEach(function(e){var n=e[0],d=e[1];if(['净水','咖啡','能量饮料'].includes(n))waterItems.push({n:n,e:d.e||'',q:d.qty});});
  h+=`<span style="color:var(--text-dim);margin:0 4px;">|</span>`;
  if(waterItems.length===0)h+=`<span style="color:var(--danger);font-size:0.7em;">⚠️ 背包中没有水！</span>`;

    h+=`<button onclick="feedChild(${idx},'${f.n}',1)" style="padding:4px 8px;font-size:0.62em;background:#111;border:1px solid #3498db;color:#3498db;border-radius:4px;cursor:pointer;font-family:inherit;">${f.e}${f.n}×1</button>`;

  h+=`<div style="margin-top:6px;font-size:0.7em;color:var(--text-dim);">`;

}
function feedChild(idx,itemName,qty){
  if(!hasItem(itemName,qty)){setStatus('背包中没有'+itemName+'！');return;}
  const c=S.children[idx];if(!c||!c.alive)return;
  removeItem(itemName,qty);
  // Determine if food or drink
  if(['罐头','干粮','军用口粮','变异兽肉','鱼干','蘑菇干','能量饮料'].includes(itemName)){
    c.hunger=clamp(c.hunger+25,0,100);
    setStatus(`✅ 喂了${itemName}×${qty}给${c.name}，饱食+25`);
  }else if(['净水','咖啡'].includes(itemName)){
    c.thirst=clamp(c.thirst+30,0,100);
    setStatus(`✅ 喂了${itemName}×${qty}给${c.name}，水分+30`);
  }
  updateUI();showChildDetail(idx);
}
