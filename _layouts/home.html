---
layout: default
---

<div class="cover-container">
  <div class="stars"></div>
  <div id="meteor-sky"></div>
  <div class="cover-card">
    <img class="avatar" src="/assets/img/avatar.jpg" alt="avatar" onerror="this.style.display='none'">
    <h1 class="name">{{ site.author.name | default: "SorryMcDonald" }}</h1>
    <p class="bio">{{ site.author.bio | default: "全栈开发者 / 游戏爱好者" }}</p>

    <div class="divider"></div>

    <div class="social-links">
      <a href="https://github.com/{{ site.github_username }}" target="_blank" title="GitHub">
        <i class="fab fa-github"></i>
      </a>
      {% if site.author.qq %}
      <a href="tencent://message/?uin={{ site.author.qq }}" title="QQ: {{ site.author.qq }}">
        <i class="fab fa-qq"></i>
      </a>
      {% endif %}
      {% if site.author.email %}
      <a href="mailto:{{ site.author.email }}" title="Email">
        <i class="fas fa-envelope"></i>
      </a>
      {% endif %}
      {% if site.author.csdn %}
      <a href="{{ site.author.csdn }}" target="_blank" title="CSDN">
        <i class="fas fa-blog"></i>
      </a>
      {% endif %}
    </div>

    <div class="nav-links">
      <a class="nav-btn" href="/blog/">
        <i class="fas fa-blog"></i> 博客
      </a>
      <a class="nav-btn" href="/game/">
        <i class="fas fa-gamepad"></i> 游戏
      </a>
      <a class="nav-btn" href="https://github.com/{{ site.github_username }}" target="_blank">
        <i class="fas fa-code"></i> 项目
      </a>
    </div>
  </div>
</div>

<script>
// 动态流星：每 1 秒生成 2 颗
(function() {
  var sky = document.getElementById('meteor-sky');
  if (!sky) return;

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function createMeteor() {
    var el = document.createElement('div');
    el.className = 'meteor';

    // 起始位置：右上区域随机
    var startX = rand(50, 90); // vw
    var startY = rand(5, 35);  // vh
    el.style.left = startX + 'vw';
    el.style.top = startY + 'vh';

    // 随机大小
    var s = rand(0.4, 0.9);
    el.style.transform = 'scale(' + s + ')';

    sky.appendChild(el);

    // 动画参数
    var duration = rand(600, 1200);
    var startTime = null;
    var endX = rand(-10, 30); // 落到左下
    var endY = rand(40, 70);

    function animate(ts) {
      if (!startTime) startTime = ts;
      var progress = (ts - startTime) / duration;
      if (progress > 1) progress = 1;

      // 缓动
      var ease = progress < 0.3
        ? (progress / 0.3) * (progress / 0.3)   // ease-in
        : 1 - Math.pow((1 - progress) / 0.7, 2); // ease-out

      var x = startX + (endX - startX) * ease;
      var y = startY + (endY - startY) * ease;

      // 透明度：淡入 → 停留 → 淡出
      var opacity;
      if (progress < 0.05) opacity = progress / 0.05 * 0.9;
      else if (progress < 0.85) opacity = 0.9;
      else opacity = (1 - progress) / 0.15 * 0.9;

      el.style.left = x + 'vw';
      el.style.top = y + 'vh';
      el.style.opacity = opacity;

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        el.remove();
      }
    }

    requestAnimationFrame(animate);
  }

  // 每 800-1200ms 生成 1-2 颗
  function spawn() {
    var count = Math.floor(rand(1, 3));
    for (var i = 0; i < count; i++) {
      setTimeout(function() { createMeteor(); }, rand(0, 300));
    }
    setTimeout(spawn, rand(800, 1200));
  }

  spawn();
})();
</script>
